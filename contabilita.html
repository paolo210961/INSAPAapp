<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>inSAPA - Agenti</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: #eef2f5;
            min-height: 100vh;
        }
        .header {
            background: white;
            padding: 15px 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo-area-sx { flex-shrink: 0; }
        .logo-rettangolo {
            width: 320px;
            height: 100px;
            background: transparent;
            border: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }
        .logo-rettangolo img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .logo-placeholder { text-align: center; padding: 10px; }
        .logo-placeholder span { font-size: 0.8rem; color: #7f8c8d; display: block; margin-bottom: 8px; }
        .btn-carica-logo { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; font-weight: bold; }
        .nav-box { background: #2c3e50; border-radius: 16px; padding: 12px 20px; display: inline-block; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .nav-grid { display: flex; gap: 10px; flex-wrap: wrap; }
        .nav-btn {
            background: #34495e; color: white; border: none; padding: 8px 18px;
            border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: bold;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: #1a252f; transform: translateY(-1px); }
        .main-container { display: flex; gap: 20px; padding: 20px; max-width: 1600px; margin: 0 auto; }
        .sidebar {
            width: 340px; background: white; border-radius: 16px; padding: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05); height: fit-content; position: sticky; top: 120px;
        }
        .content-area {
            flex: 1; background: white; border-radius: 16px; padding: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05); overflow-x: auto;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
        input, select { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 0.9rem; }
        button {
            background: #3498db; color: white; border: none; padding: 8px 12px;
            border-radius: 8px; cursor: pointer; font-size: 0.85rem; margin: 5px 0;
            font-weight: bold;
        }
        button:hover { opacity: 0.85; }
        .btn-success { background: #27ae60; }
        .tabella { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 15px; }
        .tabella th, .tabella td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: top; }
        .tabella th { background: #e9ecef; }
        .scadenze-box { background: #f8f9fa; border-left: 4px solid #27ae60; padding: 15px; margin-bottom: 25px; border-radius: 10px; overflow-x: auto; }
        .info-messaggio { color: #7f8c8d; font-style: italic; padding: 15px; text-align: center; }
        .search-box { margin-bottom: 15px; }
        .articolo-item { border: 1px solid #ddd; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
        .articolo-titolo { font-weight: bold; margin-bottom: 5px; }
        .articolo-prezzo { font-weight: bold; font-family: monospace; }
        .file-status { font-size: 0.7rem; color: #27ae60; margin-top: 5px; text-align: center; }
        .version { position: fixed; bottom: 10px; right: 10px; background: #27ae60; color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; z-index: 100; }
        footer { text-align: center; margin: 20px; font-size: 0.7rem; color: #95a5a6; }
        .password-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .password-modal { background: white; border-radius: 16px; padding: 20px; width: 90%; max-width: 350px; text-align: center; }
        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .sidebar { width: 100%; position: static; }
            .header { flex-direction: column; align-items: stretch; }
            .nav-box { width: 100%; }
            .nav-grid { justify-content: center; }
            .logo-rettangolo { width: 100%; margin: 0 auto; }
        }
    </style>
</head>
<body>

<div id="appContainer">
    <div class="header">
        <div class="logo-area-sx">
            <div id="logoRettangolo" class="logo-rettangolo">
                <div id="logoPlaceholder" class="logo-placeholder">
                    <span>🏢 LOGO AZIENDA</span>
                    <button id="btnCaricaLogo" class="btn-carica-logo">📁 CARICA LOGO</button>
                </div>
                <img id="logoImmagine" style="display: none;" alt="Logo">
            </div>
        </div>
        <div class="nav-box">
            <div class="nav-grid">
                <button id="btnTornaHome" class="nav-btn">🏠 HOME</button>
                <button id="btnVaiContabilita" class="nav-btn">📊 CONTABILITÀ</button>
                <button id="navLogout" class="nav-btn">🚪 ESCI</button>
            </div>
        </div>
    </div>

    <div class="version" id="appVersion">v2.03 - Agenti</div>

    <div class="main-container">
        <div id="sidebarAgenti" class="sidebar">
            <button id="btnCaricaFileAgenti" class="btn-success" style="width:100%">📂 Carica ORD + SCA</button>
            <div id="fileStatusAgenti" class="file-status"></div>
            <input type="file" id="fileInputMultiAgenti" multiple accept=".txt,.csv,.text/plain" style="display: none;">
            <div class="search-box" style="margin-top:15px;"><label>🔍 Cerca cliente</label><input type="text" id="cercaCliente" placeholder="Digita nome o codice cliente..."></div>
            <div class="filter-group" style="margin-top:15px;"><label>👥 Cliente</label><select id="selectClienteAgenti" disabled size="10" style="height: auto; min-height: 150px;"><option value="">-- Seleziona cliente --</option></select></div>
        </div>

        <div class="content-area">
            <div id="agentiContainer">
                <div id="scadenzeAgenti"></div>
                <div id="ricercaArticoloContainer" style="margin-bottom: 15px;"></div>
                <div id="dettaglioAgenti"></div>
            </div>
        </div>
    </div>
    <footer>Logo: clicca CARICA LOGO la prima volta. Per cambiarlo, tieni premuto 3 secondi sul logo.</footer>
</div>

<script>
// ==================== AGENTI - v2.03 ====================
let ADMIN_PASSWORD = localStorage.getItem('admin_password') || "insapa2026";
let datiAgenti = { ord: [], sca: [] };
let clientiUniciAgenti = [];
let clientiFiltrati = [];
let articoliFiltratiGlobali = [];

function formatNumber(n) { if (n === null || n === undefined || n === '') return ''; let num = parseFloat(n); if (isNaN(num)) return ''; return num.toLocaleString('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

// ==================== PARSER ====================
function parseORD(text) {
    const lines = text.split(/\r?\n/); const clienti = new Map(); let currentCliente = null;
    const reCliente = /^Cliente\s+:\s+(\d+)\s+(.+?)(?:\s{2,}|$)/; const reCoppia = /(\d+(?:,\d+)?)\s+(\d{2}\/\d{2}\/\d{4})/g;
    for (let line of lines) {
        line = line.trimEnd(); if (line === "") continue;
        let mCliente = line.match(reCliente);
        if (mCliente) { currentCliente = { codice: mCliente[1], ragione: mCliente[2].trim(), articoli: [] }; clienti.set(currentCliente.codice, currentCliente); continue; }
        if (!currentCliente) continue;
        if (line.startsWith("Destinaz.") || line.startsWith("Telefoni") || line.includes("INESISTENTE") || line.includes("ELIMINATO")) continue;
        let coppie = [], match; while ((match = reCoppia.exec(line)) !== null) coppie.push({ qta: parseFloat(match[1].replace(',', '.')), data: match[2], start: match.index, end: match.index + match[0].length });
        if (coppie.length === 0) continue;
        let firstCoppiaStart = coppie[0].start, descrizioneRaw = line.substring(0, firstCoppiaStart).trim(), tokens = descrizioneRaw.split(/\s+/), codice = tokens[0], descrizione = tokens.slice(1).join(" ");
        let lastCoppiaEnd = coppie[coppie.length-1].end, afterCoppie = line.substring(lastCoppiaEnd).trim(), numTokens = afterCoppie.split(/\s+/);
        let prezzo = 0, sconto1 = 0; if (numTokens.length >= 2) { prezzo = parseFloat(numTokens[0].replace(',', '.')); sconto1 = parseFloat(numTokens[1].replace(',', '.')); }
        coppie.sort((a,b) => new Date(b.data.split('/').reverse().join('-')) - new Date(a.data.split('/').reverse().join('-')));
        currentCliente.articoli.push({ codice, descrizione, coppie, prezzo, sconto1 });
    }
    return Array.from(clienti.values());
}

function parseSCA(text) {
    const lines = text.split(/\r?\n/); const clienti = new Map(); let currentCliente = null;
    const reCliente = /^CLIENTE:\s+(\d+)\s+(.+?)\s+Saldo\s+[\d\.,]+/; const reScadenza = /^(\d{2}\/\d{2}\/\d{4})\s+.*?(\d+)\s+(\d{2}\/\d{2}\/\d{4})\s+Euro\s+([\d\.,]+)/;
    for (let line of lines) {
        line = line.trim(); if (line === "") continue;
        let mCliente = line.match(reCliente);
        if (mCliente) { currentCliente = { codice: mCliente[1], ragione: mCliente[2].trim(), scadenze: [] }; clienti.set(currentCliente.codice, currentCliente); continue; }
        if (currentCliente) { let mScad = line.match(reScadenza); if (mScad) { currentCliente.scadenze.push({ scadenza: mScad[1], numDoc: mScad[2], dataDoc: mScad[3], importo: parseFloat(mScad[4].replace(/\./g, '').replace(',', '.')) }); } }
    }
    return Array.from(clienti.values());
}

// ==================== GESTIONE CLIENTI ====================
function aggiornaClientiUniciAgenti() {
    const mappa = new Map();
    for (let c of datiAgenti.ord) { let key = `${c.codice}|${c.ragione}`; if (!mappa.has(key)) mappa.set(key, { codice: c.codice, ragione: c.ragione, hasScadenze: false, hasOrdini: true }); else mappa.get(key).hasOrdini = true; }
    for (let c of datiAgenti.sca) { let key = `${c.codice}|${c.ragione}`; if (!mappa.has(key)) mappa.set(key, { codice: c.codice, ragione: c.ragione, hasScadenze: false, hasOrdini: false }); if (c.scadenze.length > 0 && c.scadenze.some(s => s.importo !== 0)) { let cli = mappa.get(key); if (cli) cli.hasScadenze = true; } }
    clientiUniciAgenti = Array.from(mappa.values()).sort((a,b) => a.ragione.localeCompare(b.ragione));
    clientiFiltrati = [...clientiUniciAgenti]; aggiornaTendinaClienti();
}

function aggiornaTendinaClienti() {
    const select = document.getElementById('selectClienteAgenti'); const searchText = document.getElementById('cercaCliente').value.toLowerCase();
    clientiFiltrati = clientiUniciAgenti.filter(cli => cli.codice.includes(searchText) || cli.ragione.toLowerCase().includes(searchText));
    select.innerHTML = '<option value="">-- Seleziona cliente --</option>';
    for (let cli of clientiFiltrati) { const option = document.createElement('option'); option.value = `${cli.codice}|${cli.ragione}`; option.textContent = `${cli.codice} - ${cli.ragione}`; if (cli.hasScadenze) { option.style.color = '#c0392b'; option.style.fontWeight = 'bold'; } select.appendChild(option); }
    select.disabled = (clientiFiltrati.length === 0);
}

function mostraScadenzeAgenti() {
    const clienteKey = document.getElementById('selectClienteAgenti').value; const container = document.getElementById('scadenzeAgenti');
    if (!clienteKey) { container.innerHTML = '<div class="info-messaggio">Seleziona un cliente.</div>'; return; }
    const [codice, ragione] = clienteKey.split('|'); const clienteSCA = datiAgenti.sca.find(c => c.codice === codice && c.ragione === ragione);
    if (!clienteSCA || clienteSCA.scadenze.length === 0) { container.innerHTML = `<div class="info-messaggio">Nessuna scadenza (SCA) per ${ragione}</div>`; return; }
    let html = `<div class="scadenze-box"><h3>📅 Scadenze - ${codice} ${ragione}</h3><table class="tabella"><thead><tr><th>Scadenza</th><th>N. Doc.</th><th>Data documento</th><th>Importo</th></tr></thead><tbody>`;
    for (let s of clienteSCA.scadenze) html += `<tr><td style="white-space:nowrap">${s.scadenza}</td><td>${s.numDoc}</td><td style="white-space:nowrap">${s.dataDoc}</td><td style="text-align:right">${formatNumber(s.importo)} €</td></tr>`;
    html += `</tbody>}</div>`; container.innerHTML = html;
}

function mostraDettaglioAgenti() {
    const clienteKey = document.getElementById('selectClienteAgenti').value; const container = document.getElementById('dettaglioAgenti');
    if (!clienteKey) { container.innerHTML = '<div class="info-messaggio">Seleziona un cliente.</div>'; return; }
    const [codice, ragione] = clienteKey.split('|'); let clienteORD = datiAgenti.ord.find(c => c.codice === codice && c.ragione === ragione);
    if (!clienteORD) clienteORD = datiAgenti.ord.find(c => c.codice === codice);
    if (!clienteORD || clienteORD.articoli.length === 0) { container.innerHTML = `<div class="info-messaggio">Nessun ordine (ORD) per il cliente ${codice}</div>`; document.getElementById('ricercaArticoloContainer').innerHTML = ''; return; }
    document.getElementById('ricercaArticoloContainer').innerHTML = `<div class="search-box"><label>🔍 Cerca articolo</label><input type="text" id="cercaArticolo" placeholder="Digita codice o descrizione articolo..."></div>`;
    articoliFiltratiGlobali = [...clienteORD.articoli];
    const searchInput = document.getElementById('cercaArticolo'); if (searchInput) { searchInput.removeEventListener('input', filtraArticoli); searchInput.addEventListener('input', filtraArticoli); }
    filtraArticoli();
}

function filtraArticoli() {
    const searchText = document.getElementById('cercaArticolo')?.value.toLowerCase() || ''; const articoliFiltrati = articoliFiltratiGlobali.filter(art => art.codice.toLowerCase().includes(searchText) || art.descrizione.toLowerCase().includes(searchText));
    const container = document.getElementById('dettaglioAgenti'); const clienteKey = document.getElementById('selectClienteAgenti').value;
    if (!clienteKey) return; const [codice, ragione] = clienteKey.split('|');
    let html = `<h3>📋 ORD - ${codice} ${ragione}</h3>`;
    for (let art of articoliFiltrati) html += `<div class="articolo-item"><div class="articolo-titolo"><strong>${art.codice} ${art.descrizione}</strong></div><div class="articolo-prezzo"><strong>€. ${formatNumber(art.prezzo)}     Sc.% ${formatNumber(art.sconto1)}</strong></div></div>`;
    if (articoliFiltrati.length === 0) html += `<div class="info-messaggio">Nessun articolo trovato.</div>`;
    container.innerHTML = html;
}

function mostraPasswordOverlay(callback) {
    const overlay = document.createElement('div'); overlay.className = 'password-overlay';
    overlay.innerHTML = `<div class="password-modal"><h3>🔐 Accesso Contabilità</h3><p>Inserisci la password amministratore</p><input type="password" id="pwdInput" style="width:100%; margin:10px 0;"><div class="btn-group"><button id="pwdOkBtn" class="btn-success">OK</button><button id="pwdCancelBtn" class="btn-danger">ANNULLA</button></div></div>`;
    document.body.appendChild(overlay);
    document.getElementById('pwdOkBtn').onclick = () => { const pwd = document.getElementById('pwdInput').value; if (pwd === ADMIN_PASSWORD) { overlay.remove(); callback(true); } else { alert("Password errata!"); overlay.remove(); callback(false); } };
    document.getElementById('pwdCancelBtn').onclick = () => { overlay.remove(); callback(false); };
}

// ==================== GESTIONE LOGO ====================
function caricaLogoSalvato() {
    const logoSalvato = localStorage.getItem('logo_azienda');
    if (logoSalvato) {
        document.getElementById('logoImmagine').src = logoSalvato;
        document.getElementById('logoImmagine').style.display = 'block';
        document.getElementById('logoPlaceholder').style.display = 'none';
    }
}

function salvaLogo(url) { localStorage.setItem('logo_azienda', url); }

function caricaLogoDaFile() {
    const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
    input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const logoUrl = ev.target.result;
                document.getElementById('logoImmagine').src = logoUrl;
                document.getElementById('logoImmagine').style.display = 'block';
                document.getElementById('logoPlaceholder').style.display = 'none';
                salvaLogo(logoUrl);
            };
            reader.readAsDataURL(file);
        }
    };
    input.click();
}

document.getElementById('btnCaricaLogo').onclick = (e) => { e.stopPropagation(); caricaLogoDaFile(); };
let pressTimer = null;
const logoDiv = document.getElementById('logoRettangolo');
logoDiv.addEventListener('mousedown', () => { pressTimer = setTimeout(() => { if (document.getElementById('logoImmagine').style.display === 'block') caricaLogoDaFile(); pressTimer = null; }, 3000); });
logoDiv.addEventListener('mouseup', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
logoDiv.addEventListener('mouseleave', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
caricaLogoSalvato();

// ==================== EVENTI ====================
document.getElementById('btnCaricaFileAgenti').onclick = () => document.getElementById('fileInputMultiAgenti').click();
document.getElementById('fileInputMultiAgenti').onchange = (e) => {
    const files = Array.from(e.target.files); if (files.length === 0) return;
    let loaded = 0; let ordText = null, scaText = null;
    for (let file of files) {
        const reader = new FileReader();
        reader.onload = (ev) => { const content = ev.target.result; const nome = file.name.toLowerCase(); if (nome.includes('ord')) ordText = content; else if (nome.includes('sca')) scaText = content; loaded++; if (loaded === files.length) { if (ordText) datiAgenti.ord = parseORD(ordText); if (scaText) datiAgenti.sca = parseSCA(scaText); aggiornaClientiUniciAgenti(); document.getElementById('fileStatusAgenti').innerHTML = `✅ Caricati: ORD (${datiAgenti.ord.length} clienti), SCA (${datiAgenti.sca.length} clienti)`; if (document.getElementById('selectClienteAgenti').options.length > 1) document.getElementById('selectClienteAgenti').value = document.getElementById('selectClienteAgenti').options[1].value; mostraScadenzeAgenti(); mostraDettaglioAgenti(); } };
        reader.readAsText(file, "UTF-8");
    }
    e.target.value = '';
};

document.getElementById('cercaCliente').oninput = () => aggiornaTendinaClienti();
document.getElementById('selectClienteAgenti').onchange = () => { mostraScadenzeAgenti(); mostraDettaglioAgenti(); };

// ==================== NAVIGAZIONE ====================
document.getElementById('btnTornaHome').onclick = () => { window.location.href = 'index.html'; };
document.getElementById('btnVaiContabilita').onclick = () => {
    mostraPasswordOverlay((success) => {
        if (success) { window.location.href = 'contabilita.html'; }
    });
};
document.getElementById('navLogout').onclick = () => { window.location.href = 'index.html'; };

// Inizializza
aggiornaClientiUniciAgenti();
</script>
</body>
</html>

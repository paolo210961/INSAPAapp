<script>
// Firebase configuration
const firebaseConfig = {
    apiKey: "AIzaSyBAqGSqRE7xfH5YGgPOmTInv24ESU3jkvQ",
    authDomain: "insapa-database.firebaseapp.com",
    projectId: "insapa-database",
    storageBucket: "insapa-database.firebasestorage.app",
    messagingSenderId: "331230245928",
    appId: "1:331230245928:web:2ee43d9209e43c3c89b11d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let agentiLista = [];
let agenteCorrente = null;
let datiOrd = [];
let datiSca = [];
let clientiUnici = [];
let clienteScadenzeCorrente = null;
let modificheNonSalvate = false;

let linkPrincipale = "", linkSecondario = "";
let listinoGlobale = [];
let listinoCaricato = false;

// Gestione modali minimizzabili
let modaliAperti = []; // traccia { id, tipo, modalElement, modalData }
let nextModalId = 1;

function aggiungiBarrettaMinimizzata(id, titolo, tipo) {
    const container = document.getElementById('minimizedBarContainer');
    if (!container) return;
    
    // Evita duplicati
    if (document.getElementById(`minimized-bar-${id}`)) return;
    
    const bar = document.createElement('div');
    bar.className = 'minimized-bar';
    bar.id = `minimized-bar-${id}`;
    bar.innerHTML = `
        <span class="bar-title">${titolo}</span>
        <button class="bar-restore" data-id="${id}">↑</button>
    `;
    bar.onclick = (e) => {
        if (e.target.classList.contains('bar-restore')) return;
        ripristinaModale(id);
    };
    bar.querySelector('.bar-restore').onclick = (e) => {
        e.stopPropagation();
        ripristinaModale(id);
    };
    container.appendChild(bar);
}

function rimuoviBarrettaMinimizzata(id) {
    const bar = document.getElementById(`minimized-bar-${id}`);
    if (bar) bar.remove();
}

function minimizzaModale(id) {
    const modale = modaliAperti.find(m => m.id === id);
    if (!modale) return;
    
    // Nascondi il modale
    if (modale.modalElement) {
        modale.modalElement.style.display = 'none';
    }
    
    // Aggiungi barretta
    let titolo = "";
    if (modale.tipo === 'ordine') titolo = "📝 Ordine in corso";
    else if (modale.tipo === 'listino') titolo = "📋 Listino";
    else titolo = "Modal";
    
    aggiungiBarrettaMinimizzata(id, titolo, modale.tipo);
    modale.minimizzato = true;
}

function ripristinaModale(id) {
    const modale = modaliAperti.find(m => m.id === id);
    if (!modale) return;
    
    // Mostra il modale
    if (modale.modalElement) {
        modale.modalElement.style.display = 'flex';
    }
    
    // Rimuovi barretta
    rimuoviBarrettaMinimizzata(id);
    modale.minimizzato = false;
}

function chiudiModale(id) {
    const modale = modaliAperti.find(m => m.id === id);
    if (!modale) return;
    
    // Rimuovi barretta se presente
    rimuoviBarrettaMinimizzata(id);
    
    // Rimuovi il modale dal DOM
    if (modale.modalElement && modale.modalElement.parentNode) {
        modale.modalElement.parentNode.removeChild(modale.modalElement);
    }
    
    // Rimuovi dal registro
    const index = modaliAperti.findIndex(m => m.id === id);
    if (index !== -1) modaliAperti.splice(index, 1);
}
    function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlightText(text, searchTerm) {
    if (!searchTerm || searchTerm.trim() === "") return escapeHtml(text);
    const regex = new RegExp(`(${escapeRegex(searchTerm)})`, 'gi');
    return escapeHtml(text).replace(regex, `<span class="highlight">$1</span>`);
}

async function caricaLinkDaFile() {
    try {
        const response = await fetch('link.html');
        if (response.ok) {
            const text = await response.text();
            const lines = text.split(/\r?\n/).filter(line => line.trim() && !line.trim().startsWith('<'));
            if (lines.length >= 1) linkPrincipale = lines[0].trim();
            if (lines.length >= 2) linkSecondario = lines[1].trim();
        }
    } catch(e) {}
}

function apriLinkPrincipale() { if (linkPrincipale) { window.open(linkPrincipale, '_blank'); showToast("Link principale"); } else showToast("Link principale non configurato", true); }
function apriLinkSecondario() { if (linkSecondario) { window.open(linkSecondario, '_blank'); showToast("Link secondario"); } else showToast("Link secondario non configurato", true); }

function caricaLogoSaved() {

async function salvaDatiAgente() {
    if (!agenteCorrente) return;
    try {
        const ordRef = db.collection('agenti_dati').doc('ord_' + agenteCorrente.codice).collection('clienti');
        const batch = db.batch();
        const vecchiOrd = await ordRef.get();
        vecchiOrd.forEach(doc => batch.delete(doc.ref));
        for (let cliente of datiOrd) {
            const docRef = ordRef.doc(cliente.codice.toString());
            batch.set(docRef, { codice: cliente.codice, ragione: cliente.ragione, articoli: cliente.articoli });
        }
        const scaRef = db.collection('agenti_dati').doc('sca_' + agenteCorrente.codice).collection('clienti');
        const vecchiSca = await scaRef.get();
        vecchiSca.forEach(doc => batch.delete(doc.ref));
        for (let cliente of datiSca) {
            const docRef = scaRef.doc(cliente.codice.toString());
            batch.set(docRef, { codice: cliente.codice, ragione: cliente.ragione, scadenze: cliente.scadenze });
        }
        await batch.commit();
        await pulisciVecchiDocumentiMonolitici(agenteCorrente.codice);
        document.getElementById('fileStatusInline').innerHTML = "OK ORD: "+datiOrd.length+" | SCA: "+datiSca.length;
        resetModificheNonSalvate();
        showToast("Dati salvati!");
        return true;
    } catch(e) { alert("Errore salvataggio: "+e.message); return false; }
}

function convertiImportoItaliano(importoStr) {
    if (!importoStr) return 0;
    let isNegative = importoStr.endsWith('-');
    if (isNegative) importoStr = importoStr.slice(0, -1);
    let importoPulito = importoStr.replace(/\./g, '').replace(',', '.');
    let importo = parseFloat(importoPulito);
    if (isNegative && !isNaN(importo)) importo = -importo;
    return isNaN(importo) ? 0 : importo;
}

function parseORD(text) {
    const lines = text.split(/\r?\n/);
    const clienti = new Map();
    let currentCliente = null;
    const reCliente = /^Cliente\s+:\s+(\d+)\s+(.+?)(?:\s{2,}|$)/;
    const reCoppia = /(\d+(?:,\d+)?)\s+(\d{2}\/\d{2}\/\d{4})/g;
    for (let line of lines) {
        line = line.trimEnd();
        if (line === "") continue;
        let mCliente = line.match(reCliente);
        if (mCliente) { 
            currentCliente = { codice: mCliente[1].toString(), ragione: mCliente[2].trim(), articoli: [] }; 
            clienti.set(currentCliente.codice, currentCliente); 
            continue; 
        }
        if (!currentCliente) continue;
        if (line.startsWith("Destinaz.") || line.startsWith("Telefoni") || line.includes("INESISTENTE") || line.includes("ELIMINATO")) continue;
        let coppie = [], match;
        while ((match = reCoppia.exec(line)) !== null) { let qta = parseFloat(match[1].replace(',', '.')); let data = match[2]; coppie.push({ qta, data, start: match.index, end: match.index + match[0].length }); }
        if (coppie.length === 0) continue;
        let firstCoppiaStart = coppie[0].start;
        let descrizioneRaw = line.substring(0, firstCoppiaStart).trim();
        let tokens = descrizioneRaw.split(/\s+/);
        let codice = tokens[0].toString();
        let descrizione = tokens.slice(1).join(" ");
        let lastCoppiaEnd = coppie[coppie.length-1].end;
        let afterCoppie = line.substring(lastCoppiaEnd).trim();
        let numTokens = afterCoppie.split(/\s+/);
        let prezzo = 0, sconto1 = 0;
        if (numTokens.length >= 2) { prezzo = parseFloat(numTokens[0].replace(',', '.')); sconto1 = parseFloat(numTokens[1].replace(',', '.')); }
        coppie.sort((a,b) => new Date(b.data.split('/').reverse().join('-')) - new Date(a.data.split('/').reverse().join('-')));
        currentCliente.articoli.push({ codice, descrizione, coppie, prezzo, sconto1 });
    }
    return Array.from(clienti.values());
}

function parseSCA(text) {
    const lines = text.split(/\r?\n/);
    const clienti = new Map();
    let currentCliente = null;
    const reCliente = /^CLIENTE:\s+(\d+)\s+(.+?)\s+Saldo\s+[\d\.,]+-?/;
    for (let lineOriginale of lines) {
        let line = lineOriginale.replace(/\uFEFF/g, '').replace(/\f/g, ' ').replace(/\t/g, ' ').replace(/\*/g, ' ').trim();
        if (!line) continue;
        if (/^=+/.test(line)) continue;
        if (/^-+/.test(line)) continue;
        if (line.startsWith("Scadenza")) continue;
        if (line.startsWith("VOSTRO DARE")) continue;
        if (line.startsWith("TOTALE") || line.startsWith("TOT.")) continue;
        if (line.startsWith("AGENTE:")) continue;
        if (line.startsWith("TUTTE")) continue;
        if (line.startsWith("inSAPA")) continue;
        if (line.startsWith("STAMPA")) continue;
        let mCliente = line.match(reCliente);
        if (mCliente) {
            let codice = mCliente[1].toString();
            let ragione = mCliente[2].trim();
            currentCliente = { codice, ragione, scadenze: [] };
            clienti.set(codice, currentCliente);
            continue;
        }
        if (currentCliente) {
            line = line.replace(/\s+/g, ' ').trim();
            let parts = line.split(' ');
            let euroIndex = parts.findIndex(p => p.toLowerCase() === "euro");
            if (euroIndex === -1) continue;
            let scadenza = parts[0] || '';
            if (!/^\d{2}\/\d{2}\/\d{4}$/.test(scadenza)) continue;
            let importoStr = parts[euroIndex + 1] || '0';
            let importo = convertiImportoItaliano(importoStr);
            let dataDoc = parts[euroIndex - 1] || '';
            let numDoc = parts[euroIndex - 2] || '';
            let descrizione = parts.slice(1, euroIndex - 2).join(" ");
            currentCliente.scadenze.push({ scadenza, descrizione, numDoc, dataDoc, importo });
        }
    }
    return Array.from(clienti.values());
}

function calcolaUltimaDataArticolo(articolo) {
    if (!articolo.coppie || articolo.coppie.length === 0) return null;
    let dateObj = articolo.coppie.map(c => ({ data: c.data, timestamp: new Date(c.data.split('/').reverse().join('-')).getTime() }));
    dateObj.sort((a,b) => b.timestamp - a.timestamp);
    return dateObj[0];
}

function setupQuantitaInput(inputElement, articoloCodice, quantitaInputs) {
    inputElement.value = '';
    inputElement.placeholder = '0';
    inputElement.addEventListener('focus', function() { if (this.value === '0') this.value = ''; });
    inputElement.addEventListener('blur', function() {
        let val = this.value.trim();
        if (val === '' || val === '0') { this.value = ''; quantitaInputs[articoloCodice] = 0; }
        else { let num = parseInt(val, 10); if (isNaN(num) || num < 0) num = 0; this.value = num; quantitaInputs[articoloCodice] = num; }
    });
    inputElement.addEventListener('input', function() {
        let val = this.value.trim();
        if (val === '') { quantitaInputs[articoloCodice] = 0; }
        else { let num = parseInt(val, 10); if (!isNaN(num) && num >= 0) { quantitaInputs[articoloCodice] = num; } }
    });
}

            const descrizioneEvidenziata = searchTerm ? highlightText(art.descrizione, searchTerm) : escapeHtml(art.descrizione);
            html += `
                <div class="listino-card">
                    <div class="listino-card-codice">${codiceEvidenziato}</div>
                    <div class="listino-card-descrizione">${descrizioneEvidenziata}</div>
                    <div class="listino-card-dettagli">
                        <span class="listino-card-prezzo">€ ${parseFloat(art.prezzo).toFixed(2)}</span>
                        <span class="listino-card-um">${escapeHtml(art.um)}</span>
                        <span class="info-text">GM: ${escapeHtml(art.gm)} | <strong class="mord-bold">M.Ord: ${art.m_ord}</strong></span>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        document.getElementById(`listinoStats_${modalId}`).innerHTML = `📋 ${filtrati.length} articoli su ${listinoGlobale.length} totali`;
    }
    
    renderListino();
    
    const searchInput = document.getElementById(`searchListinoInput_${modalId}`);
    searchInput.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderListino();
    });
    
    modal.querySelector('.minimize-btn').onclick = () => {
        minimizzaModale(modalId);
    };
    
    modal.querySelector('.close-btn').onclick = () => {
        chiudiModale(modalId);
    };
}

function aggiornaClienti() {
    let mappa = new Map();
    for (let c of datiOrd) {
        let codiceNorm = c.codice.toString();
        mappa.set(codiceNorm, { codice: codiceNorm, ragione: c.ragione, hasScadenze: false, scadenze: [], ordini: c.articoli });
    }
    for (let c of datiSca) {
        let codiceNormalizzato = c.codice.toString();
        let match = mappa.get(codiceNormalizzato);
        if (match) { match.hasScadenze = true; match.scadenze = c.scadenze; }
        else { mappa.set(codiceNormalizzato, { codice: codiceNormalizzato, ragione: c.ragione, hasScadenze: true, scadenze: c.scadenze, ordini: [] }); }
    }
    clientiUnici = Array.from(mappa.values());
    filtraClienti();
}

function filtraClienti() {
    let searchText = document.getElementById('cercaCliente').value.toLowerCase();
    let clientiFiltrati = clientiUnici.filter(c => c.codice.toLowerCase().includes(searchText) || c.ragione.toLowerCase().includes(searchText));
    clientiFiltrati.sort((a,b) => { 
        let aHas = a.hasScadenze && a.scadenze.length; 
        let bHas = b.hasScadenze && b.scadenze.length; 
        if (aHas && !bHas) return -1; 
        if (!aHas && bHas) return 1; 
        return a.ragione.localeCompare(b.ragione); 
    });
    let select = document.getElementById('selectClienteAgenti');
    select.innerHTML = '<option value="">-- Seleziona cliente --</option>';
    for (let c of clientiFiltrati) {
        let opt = document.createElement('option');
        opt.value = c.codice;
        let hasScad = c.hasScadenze && c.scadenze.length;
        if (hasScad) { 
            opt.style.color = '#c0392b'; 
            opt.style.fontWeight = 'bold'; 
            opt.textContent = "[R] " + c.codice + " - " + c.ragione + " (" + c.scadenze.length + " scad.)"; 
        } else { 
            opt.textContent = c.codice + " - " + c.ragione; 
        }
        select.appendChild(opt);
    }
    if (clientiFiltrati.length === 0) document.getElementById('dettaglioAgenti').innerHTML = '<div class="scadenze-box">Nessun cliente trovato</div>';
}

    html += '<button class="btn-whatsapp" onclick="inviaScadenzeWhatsApp(clienteScadenzeCorrente)"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.47 3.45 1.35 4.95L2 22l5.25-1.38c1.45.85 3.1 1.3 4.79 1.3 5.46 0 9.91-4.45 9.91-9.91 0-2.66-1.04-5.16-2.93-7.05A9.87 9.87 0 0 0 12.04 2z"/></svg> Invia Scadenze</button>';
    html += '</div><table style="width:100%; border-collapse:collapse;"><thead><tr style="background:#e9ecef"><th>Scadenza</th><th>Data Doc.</th><th>N.Doc</th><th>Importo</th></tr></thead><tbody>';
    for (let s of cliente.scadenze) {
        let classeImporto = s.importo < 0 ? 'style="color:#e74c3c"' : '';
        html += '<tr><td style="white-space:nowrap">' + s.scadenza + '</td><td style="white-space:nowrap">' + (s.dataDoc || '') + '</td><td>' + s.numDoc + '</td><td style="text-align:right" ' + classeImporto + '>' + s.importo.toFixed(2) + ' €</td></tr>';
    }
    html += '</tbody></table></div>';
    return html;
}

function nomeFileCorrisponde(nomeFile, codiceAgente, tipo) {
    let baseName = nomeFile.replace(/\.[a-zA-Z0-9]+$/, '');
    let match = baseName.match(/^([A-Z]+)(\d+)$/i);
    if (!match) return false;
    if (match[1].toUpperCase() !== tipo) return false;
    return parseInt(match[2],10) === parseInt(codiceAgente,10);
}

async function caricaFile(files) {
    if (!agenteCorrente) { alert("Seleziona un agente!"); return false; }
    if (files.length !== 2) { alert("Servono ESATTAMENTE 2 file (ORD e SCA)!"); return false; }
    let codAgente = agenteCorrente.codice;
    let trovati = { ord: false, sca: false };
    let ordText = null, scaText = null, errori = [];
    for (let file of files) {
        let nome = file.name;
        if (nomeFileCorrisponde(nome, codAgente, 'ORD')) { trovati.ord = true; ordText = await file.text(); }
        else if (nomeFileCorrisponde(nome, codAgente, 'SCA')) { trovati.sca = true; scaText = await file.text(); }
        else errori.push(nome);
    }
    if (errori.length) { alert("FILE NON VALIDI: " + errori.join(', ')); return false; }
    if (!trovati.ord || !trovati.sca) { alert("FILE MANCANTI: ORD" + codAgente + ".txt e SCA" + codAgente + ".txt"); return false; }
    datiOrd = []; datiSca = [];
    if (ordText) { datiOrd = parseORD(ordText); }
    if (scaText) { datiSca = parseSCA(scaText); }
    await salvaDatiAgente();
    aggiornaClienti();
    document.getElementById('fileStatusInline').innerHTML = "ORD: " + datiOrd.length + " | SCA: " + datiSca.length;
    alert("CARICAMENTO COMPLETATO!\nORD: " + datiOrd.length + " clienti\nSCA: " + datiSca.length + " clienti");
    return true;
}

async function caricaListinoGlobale(file) {
    if (!file) { alert("Seleziona un file listino.txt"); return false; }
    try {
        const text = await file.text();
        const lines = text.split(/\r?\n/);
        const articoli = [];
        for (let line of lines) {
            line = line.trim();
            if (line === "" || line.startsWith("===") || line.startsWith("---") || line.startsWith("Codice")) continue;
            const parts = line.split(/\s+/);
            if (parts.length < 5) continue;
            let codice = parts[0];
            let prezzoStr = parts[1].replace(',', '.');
            let prezzo = parseFloat(prezzoStr);
            let descrizione = parts.slice(2, -4).join(" ");
            let um = parts[parts.length - 4];
            let gm = parts[parts.length - 3];
            let mord = parts[parts.length - 2];
            let iva = parts[parts.length - 1];
            if (isNaN(prezzo)) continue;
            articoli.push({ codice, prezzo, descrizione, um, gm, m_ord: mord, iva });
        }
        if (articoli.length === 0) { alert("Nessun articolo valido trovato!"); return false; }
        const listinoRef = db.collection('listini_generali').doc('listino_globale');
        await listinoRef.set({ articoli: articoli, ultimoAggiornamento: new Date().toISOString(), numeroArticoli: articoli.length });
        listinoGlobale = articoli;
        listinoCaricato = true;
        showToast("Listino caricato! " + articoli.length + " articoli");
        alert("CARICAMENTO LISTINO COMPLETATO!\n" + articoli.length + " articoli salvati.");
        return true;
    } catch(e) { alert("Errore: " + e.message); return false; }
}

async function caricaListinoDaDB() {
    try {
        const docSnap = await db.collection('listini_generali').doc('listino_globale').get();
        if (docSnap.exists) {
            listinoGlobale = docSnap.data().articoli || [];
            listinoCaricato = true;
            console.log("Listino caricato: " + listinoGlobale.length + " articoli");
        } else { listinoGlobale = []; listinoCaricato = false; }
    } catch(e) { console.error("Errore:", e); listinoGlobale = []; }
}

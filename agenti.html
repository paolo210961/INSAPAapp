<script>
// ==================== FIREBASE ====================
const firebaseConfig = {
    apiKey: "AIzaSyBAqGSqRE7xfH5YGgPOmTInv24ESU3jkvQ",
    authDomain: "insapa-database.firebaseapp.com",
    projectId: "insapa-database",
    storageBucket: "insapa-database.firebasestorage.app",
    messagingSenderId: "331230245928",
    appId: "1:331230245928:web:2ee43d9209e43c3c89b11d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ==================== VARIABILI ====================
let agentiLista = [];
let agenteCorrente = null;
let datiOrd = [];
let datiSca = [];
let clientiUnici = [];

// ==================== FUNZIONI AGENTI ====================
async function caricaAgenti() {
    console.log("📥 Caricamento agenti da Firebase...");
    try {
        const snapshot = await db.collection('agenti_lista').get();
        agentiLista = [];
        snapshot.forEach(doc => agentiLista.push(doc.data()));
        agentiLista.sort((a,b) => a.codice.localeCompare(b.codice));
        console.log(`✅ Trovati ${agentiLista.length} agenti`);
        aggiornaSelectAgenti();
    } catch(e) { console.error("❌ ERRORE: "+e.message); alert("Errore caricamento agenti: "+e.message); }
}

function aggiornaSelectAgenti() {
    let select = document.getElementById('selectAgente');
    let oldValue = select.value;
    select.innerHTML = '<option value="">-- Seleziona agente --</option>';
    for (let a of agentiLista) {
        let opt = document.createElement('option');
        opt.value = a.codice;
        opt.textContent = `${a.codice} - ${a.nome}`;
        select.appendChild(opt);
    }
    if (oldValue && agentiLista.find(a => a.codice === oldValue)) {
        select.value = oldValue;
        selezionaAgente(oldValue);
    }
}

async function selezionaAgente(codice) {
    agenteCorrente = agentiLista.find(a => a.codice === codice);
    if (!agenteCorrente) return;
    console.log(`👤 Agente selezionato: ${codice} - ${agenteCorrente.nome}`);
    
    try {
        let ordDoc = await db.collection('agenti_dati').doc(`ord_${codice}`).get();
        let scaDoc = await db.collection('agenti_dati').doc(`sca_${codice}`).get();
        datiOrd = ordDoc.exists ? ordDoc.data().dati : [];
        datiSca = scaDoc.exists ? scaDoc.data().dati : [];
        console.log(`📊 Dati caricati: ORD ${datiOrd.length} clienti, SCA ${datiSca.length} clienti`);
        document.getElementById('fileStatus').innerHTML = `ORD: ${datiOrd.length} clienti | SCA: ${datiSca.length} clienti`;
        aggiornaClienti();
        // Reset campi ricerca
        document.getElementById('cercaCliente').value = '';
        document.getElementById('cercaArticolo').value = '';
        document.getElementById('scadenzeAgenti').innerHTML = '';
        document.getElementById('dettaglioAgenti').innerHTML = '';
    } catch(e) { console.error("❌ ERRORE: "+e.message); alert("Errore caricamento dati: "+e.message); }
}

async function salvaDatiAgente() {
    if (!agenteCorrente) return;
    try {
        await db.collection('agenti_dati').doc(`ord_${agenteCorrente.codice}`).set({ dati: datiOrd });
        await db.collection('agenti_dati').doc(`sca_${agenteCorrente.codice}`).set({ dati: datiSca });
        console.log(`💾 Dati salvati per ${agenteCorrente.codice}`);
    } catch(e) { console.error("❌ ERRORE salvataggio: "+e.message); alert("Errore salvataggio: "+e.message); }
}

async function creaAgente(codice, nome) {
    if (!codice || !nome) { alert("Inserisci codice e nome!"); return false; }
    if (agentiLista.find(a => a.codice === codice)) { alert("Codice già esistente!"); return false; }
    try {
        await db.collection('agenti_lista').doc(codice).set({ codice, nome });
        console.log(`✅ Agente ${codice} - ${nome} creato`);
        await caricaAgenti();
        return true;
    } catch(e) { alert("ERRORE: "+e.message); return false; }
}

// ==================== PARSER ORD ====================
function parseORD(text) {
    console.log(`📄 Parsing ORD: ${text.length} caratteri`);
    const lines = text.split(/\r?\n/);
    const clienti = new Map();
    let currentCliente = null;
    const reCliente = /^Cliente\s+:\s+(\d+)\s+(.+?)(?:\s{2,}|$)/;
    const reCoppia = /(\d+(?:,\d+)?)\s+(\d{2}\/\d{2}\/\d{4})/g;
    
    for (let line of lines) {
        line = line.trimEnd();
        if (line === "") continue;
        
        let mCliente = line.match(reCliente);
        if (mCliente) {
            currentCliente = { 
                codice: mCliente[1], 
                ragione: mCliente[2].trim(), 
                articoli: [] 
            };
            clienti.set(currentCliente.codice, currentCliente);
            continue;
        }
        
        if (!currentCliente) continue;
        
        if (line.startsWith("Destinaz.") || line.startsWith("Telefoni") || 
            line.includes("INESISTENTE") || line.includes("ELIMINATO")) continue;
        
        let coppie = [];
        let match;
        while ((match = reCoppia.exec(line)) !== null) {
            let qta = parseFloat(match[1].replace(',', '.'));
            let data = match[2];
            coppie.push({ qta, data, start: match.index, end: match.index + match[0].length });
        }
        
        if (coppie.length === 0) continue;
        
        let firstCoppiaStart = coppie[0].start;
        let descrizioneRaw = line.substring(0, firstCoppiaStart).trim();
        let tokens = descrizioneRaw.split(/\s+/);
        let codice = tokens[0];
        let descrizione = tokens.slice(1).join(" ");
        
        let lastCoppiaEnd = coppie[coppie.length-1].end;
        let afterCoppie = line.substring(lastCoppiaEnd).trim();
        let numTokens = afterCoppie.split(/\s+/);
        let prezzo = 0, sconto1 = 0;
        
        if (numTokens.length >= 2) {
            prezzo = parseFloat(numTokens[0].replace(',', '.'));
            sconto1 = parseFloat(numTokens[1].replace(',', '.'));
        }
        
        coppie.sort((a,b) => new Date(b.data.split('/').reverse().join('-')) - 
                           new Date(a.data.split('/').reverse().join('-')));
        
        currentCliente.articoli.push({ 
            codice, 
            descrizione, 
            coppie, 
            prezzo, 
            sconto1 
        });
    }
    
    console.log(`✅ ORD parsato: ${clienti.size} clienti`);
    return Array.from(clienti.values());
}

// ==================== PARSER SCA ====================
function parseSCA(text) {
    console.log(`📄 Parsing SCA: ${text.length} caratteri`);
    const lines = text.split(/\r?\n/);
    const clienti = new Map();
    let currentCliente = null;
    const reCliente = /^CLIENTE:\s+(\d+)\s+(.+?)\s+Saldo\s+[\d\.,]+/;
    const reScadenza = /^(\d{2}\/\d{2}\/\d{4})\s+.*?(\d+)\s+(\d{2}\/\d{2}\/\d{4})\s+Euro\s+([\d\.,]+)/;
    
    for (let line of lines) {
        line = line.trim();
        if (line === "") continue;
        
        let mCliente = line.match(reCliente);
        if (mCliente) {
            currentCliente = { 
                codice: mCliente[1], 
                ragione: mCliente[2].trim(), 
                scadenze: [] 
            };
            clienti.set(currentCliente.codice, currentCliente);
            continue;
        }
        
        if (currentCliente) {
            let mScad = line.match(reScadenza);
            if (mScad) {
                let importoStr = mScad[4].replace(/\./g, '').replace(',', '.');
                currentCliente.scadenze.push({
                    scadenza: mScad[1],
                    numDoc: mScad[2],
                    dataDoc: mScad[3],
                    importo: parseFloat(importoStr)
                });
            }
        }
    }
    
    console.log(`✅ SCA parsato: ${clienti.size} clienti`);
    return Array.from(clienti.values());
}

// ==================== GESTIONE CLIENTI ====================
function aggiornaClienti() {
    let mappa = new Map();
    
    for (let c of datiOrd) {
        mappa.set(c.codice, { 
            codice: c.codice, 
            ragione: c.ragione, 
            hasScadenze: false, 
            scadenze: [],
            ordini: c.articoli 
        });
    }
    
    for (let c of datiSca) {
        if (mappa.has(c.codice)) {
            mappa.get(c.codice).hasScadenze = true;
            mappa.get(c.codice).scadenze = c.scadenze;
        } else {
            mappa.set(c.codice, { 
                codice: c.codice, 
                ragione: c.ragione, 
                hasScadenze: true, 
                scadenze: c.scadenze,
                ordini: [] 
            });
        }
    }
    
    clientiUnici = Array.from(mappa.values()).sort((a,b) => a.ragione.localeCompare(b.ragione));
    
    // Applica filtro cerca cliente
    filtraClienti();
}

function filtraClienti() {
    let searchText = document.getElementById('cercaCliente').value.toLowerCase();
    let clientiFiltrati = clientiUnici.filter(c => 
        c.codice.toLowerCase().includes(searchText) || 
        c.ragione.toLowerCase().includes(searchText)
    );
    
    let select = document.getElementById('selectClienteAgenti');
    select.innerHTML = '<option value="">-- Seleziona cliente --</option>';
    for (let c of clientiFiltrati) {
        let opt = document.createElement('option');
        opt.value = c.codice;
        opt.textContent = `${c.codice} - ${c.ragione}`;
        if (c.hasScadenze && c.scadenze.length > 0) {
            opt.style.color = '#c0392b';
            opt.style.fontWeight = 'bold';
        }
        select.appendChild(opt);
    }
    
    console.log(`📋 Clienti filtrati: ${clientiFiltrati.length}/${clientiUnici.length}`);
    
    // Reset contenuti quando si filtra
    if (clientiFiltrati.length === 0) {
        document.getElementById('scadenzeAgenti').innerHTML = '<div class="scadenze-box">Nessun cliente trovato</div>';
        document.getElementById('dettaglioAgenti').innerHTML = '';
    }
}

function mostraDettaglioCliente(codice) {
    let cliente = clientiUnici.find(c => c.codice === codice);
    if (!cliente) return;
    
    let containerScadenze = document.getElementById('scadenzeAgenti');
    let containerArticoli = document.getElementById('dettaglioAgenti');
    
    // Mostra scadenze
    if (cliente.hasScadenze && cliente.scadenze && cliente.scadenze.length > 0) {
        let html = `<div class="scadenze-box">
                    <h3>📅 Scadenze - ${cliente.codice} ${cliente.ragione}</h3>
                    <table style="width:100%; border-collapse:collapse;">
                    <thead><tr style="background:#e9ecef"><th>Scadenza</th><th>N.Doc</th><th>Importo</th></tr></thead><tbody>`;
        for (let s of cliente.scadenze) {
            html += `<tr><td style="white-space:nowrap">${s.scadenza}</td><td>${s.numDoc}</td><td style="text-align:right">${s.importo.toFixed(2)} €</td></tr>`;
        }
        html += `</tbody></table></div>`;
        containerScadenze.innerHTML = html;
    } else {
        containerScadenze.innerHTML = `<div class="scadenze-box">Nessuna scadenza per ${cliente.ragione}</div>`;
    }
    
    // Mostra articoli
    if (cliente.ordini && cliente.ordini.length > 0) {
        let html = `<div class="scadenze-box">
                    <h3>📋 ORD - ${cliente.codice} ${cliente.ragione} (${cliente.ordini.length} articoli)</h3>`;
        for (let art of cliente.ordini) {
            let storicoHtml = '';
            if (art.coppie && art.coppie.length > 0) {
                let mostrati = art.coppie.slice(0, 4);
                storicoHtml = `<div class="storico-ordini" data-articolo="${art.codice}">
                                <strong>📋 STORICO ORDINI (ultimi 4):</strong><br>`;
                for (let ord of mostrati) {
                    storicoHtml += `<span>📅 ${ord.data} → Q.tà: ${ord.qta}</span> `;
                }
                storicoHtml += `</div>`;
            } else {
                storicoHtml = `<div class="storico-ordini" data-articolo="${art.codice}">📭 Nessun ordine registrato</div>`;
            }
            
            html += `<div class="articolo-item" data-codice="${art.codice}">
                        <div class="articolo-titolo"><strong>${art.codice} ${art.descrizione}</strong></div>
                        <div>€ ${art.prezzo.toFixed(2)} - Sc. ${art.sconto1.toFixed(2)}%</div>
                        ${storicoHtml}
                    </div>`;
        }
        html += `</div>`;
        containerArticoli.innerHTML = html;
        
        // Aggiungi eventi click per toggle storico
        document.querySelectorAll('.articolo-item').forEach(el => {
            el.onclick = (e) => {
                e.stopPropagation();
                let storicoDiv = el.querySelector('.storico-ordini');
                if (storicoDiv) {
                    storicoDiv.classList.toggle('visible');
                }
            };
        });
    } else {
        containerArticoli.innerHTML = `<div class="scadenze-box">Nessun ordine per ${cliente.ragione}</div>`;
    }
}

function filtraArticoli() {
    let clienteCodice = document.getElementById('selectClienteAgenti').value;
    if (!clienteCodice) return;
    
    let cliente = clientiUnici.find(c => c.codice === clienteCodice);
    if (!cliente || !cliente.ordini) return;
    
    let searchText = document.getElementById('cercaArticolo').value.toLowerCase();
    let filtrati = cliente.ordini.filter(art => 
        art.codice.toLowerCase().includes(searchText) || 
        art.descrizione.toLowerCase().includes(searchText)
    );
    
    let container = document.getElementById('dettaglioAgenti');
    let html = `<div class="scadenze-box">
                <h3>📋 ORD - ${cliente.codice} ${cliente.ragione} (${filtrati.length} articoli)</h3>`;
    
    for (let art of filtrati) {
        let storicoHtml = '';
        if (art.coppie && art.coppie.length > 0) {
            let mostrati = art.coppie.slice(0, 4);
            storicoHtml = `<div class="storico-ordini" data-articolo="${art.codice}">
                            <strong>📋 STORICO ORDINI (ultimi 4):</strong><br>`;
            for (let ord of mostrati) {
                storicoHtml += `<span>📅 ${ord.data} → Q.tà: ${ord.qta}</span> `;
            }
            storicoHtml += `</div>`;
        } else {
            storicoHtml = `<div class="storico-ordini" data-articolo="${art.codice}">📭 Nessun ordine registrato</div>`;
        }
        
        html += `<div class="articolo-item" data-codice="${art.codice}">
                    <div class="articolo-titolo"><strong>${art.codice} ${art.descrizione}</strong></div>
                    <div>€ ${art.prezzo.toFixed(2)} - Sc. ${art.sconto1.toFixed(2)}%</div>
                    ${storicoHtml}
                </div>`;
    }
    html += `</div>`;
    container.innerHTML = html;
    
    // Riapplica eventi click
    document.querySelectorAll('.articolo-item').forEach(el => {
        el.onclick = (e) => {
            e.stopPropagation();
            let storicoDiv = el.querySelector('.storico-ordini');
            if (storicoDiv) {
                storicoDiv.classList.toggle('visible');
            }
        };
    });
}

// ==================== VALIDAZIONE FILE ====================
async function caricaFile(files) {
    if (!agenteCorrente) {
        alert("Seleziona prima un agente!");
        return false;
    }
    
    if (files.length !== 2) {
        alert("Devi selezionare ESATTAMENTE 2 file (ORD e SCA)!");
        return false;
    }
    
    let codAgente = agenteCorrente.codice;
    let trovati = { ord: false, sca: false };
    let ordText = null, scaText = null;
    
    for (let file of files) {
        let nome = file.name;
        
        // Validazione: deve essere ORD + codice oppure SCA + codice
        let regexOrd = new RegExp(`^ORD${codAgente}\\.`, 'i');
        let regexSca = new RegExp(`^SCA${codAgente}\\.`, 'i');
        
        if (regexOrd.test(nome)) {
            trovati.ord = true;
            ordText = await file.text();
            console.log(`✅ File ORD valido: ${nome}`);
        } 
        else if (regexSca.test(nome)) {
            trovati.sca = true;
            scaText = await file.text();
            console.log(`✅ File SCA valido: ${nome}`);
        }
        else {
            alert(`❌ File non valido: ${nome}\n\nI file DEVONO essere nominati esattamente:\nORD${codAgente}.txt\nSCA${codAgente}.txt`);
            return false;
        }
    }
    
    if (!trovati.ord || !trovati.sca) {
        alert("Devi selezionare ENTRAMBI i file: ORD e SCA con il codice agente corretto!\n\nEsempio: ORD0001.txt e SCA0001.txt");
        return false;
    }
    
    // Pulisci i vecchi dati dell'agente
    datiOrd = [];
    datiSca = [];
    console.log(`🗑️ Vecchi dati cancellati per agente ${agenteCorrente.codice}`);
    
    // Parsing dei nuovi file
    if (ordText) {
        datiOrd = parseORD(ordText);
        console.log(`✅ ORD caricato: ${datiOrd.length} clienti`);
    }
    if (scaText) {
        datiSca = parseSCA(scaText);
        console.log(`✅ SCA caricato: ${datiSca.length} clienti`);
    }
    
    await salvaDatiAgente();
    aggiornaClienti();
    document.getElementById('fileStatus').innerHTML = `✅ ORD: ${datiOrd.length} clienti | SCA: ${datiSca.length} clienti`;
    alert(`Caricamento completato!\nORD: ${datiOrd.length} clienti\nSCA: ${datiSca.length} clienti`);
    return true;
}

document.getElementById('selectAgente').onchange = (e) => { if (e.target.value) selezionaAgente(e.target.value); };
document.getElementById('selectClienteAgenti').onchange = (e) => { if (e.target.value) mostraDettaglioCliente(e.target.value); };
document.getElementById('cercaCliente').oninput = () => filtraClienti();
document.getElementById('cercaArticolo').oninput = () => filtraArticoli();
document.getElementById('btnCaricaFile').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = async (e) => {
    await caricaFile(Array.from(e.target.files));
    e.target.value = '';
};

// MODALE CREA AGENTE
document.getElementById('btnCreaAgente').onclick = () => {
    let modal = document.createElement('div'); modal.className = 'modal-overlay';
    modal.innerHTML = `<div class="modal-content"><h3>➕ NUOVO AGENTE</h3><label>Codice</label><input type="text" id="nuovoCodice" placeholder="es. 001"><label>Nome</label><input type="text" id="nuovoNome" placeholder="es. Mario Rossi"><div class="btn-group-modal"><button id="btnConferma" class="btn-success">CREA</button><button id="btnAnnulla" class="btn-danger">ANNULLA</button></div></div>`;
    document.body.appendChild(modal);
    document.getElementById('btnConferma').onclick = async () => {
        let cod = document.getElementById('nuovoCodice').value.trim();
        let nom = document.getElementById('nuovoNome').value.trim();
        if (cod && nom) {
            if (await creaAgente(cod, nom)) {
                alert(`Agente ${cod} - ${nom} creato!`);
                modal.remove();
            }
        } else alert("Compila tutti i campi!");
    };
    document.getElementById('btnAnnulla').onclick = () => modal.remove();
};

// ==================== LOGO ====================
function caricaLogo() { let l = localStorage.getItem('logo'); if(l) { document.getElementById('logoImmagine').src = l; document.getElementById('logoImmagine').style.display = 'block'; document.getElementById('logoSpan').style.display = 'none'; } }
function salvaLogo(u) { localStorage.setItem('logo', u); }
function caricaLogoFile() { let inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*'; inp.onchange = e => { let f = e.target.files[0]; if(f){ let r = new FileReader(); r.onload = ev => { let url = ev.target.result; document.getElementById('logoImmagine').src = url; document.getElementById('logoImmagine').style.display = 'block'; document.getElementById('logoSpan').style.display = 'none'; salvaLogo(url); }; r.readAsDataURL(f); } }; inp.click(); }
let logoDiv = document.getElementById('logoRettangolo'); let timer = null;
logoDiv.addEventListener('mousedown', () => { timer = setTimeout(() => { caricaLogoFile(); timer = null; }, 3000); });
logoDiv.addEventListener('mouseup', () => { if(timer) { clearTimeout(timer); timer = null; } });
logoDiv.addEventListener('mouseleave', () => { if(timer) { clearTimeout(timer); timer = null; } });
caricaLogo();

// ==================== AVVIO ====================
caricaAgenti();
console.log("🚀 App avviata - v5.02");

<script>
// Firebase configuration
const firebaseConfig = {
    apiKey: "AIzaSyBAqGSqRE7xfH5YGgPOmTInv24ESU3jkvQ",
    authDomain: "insapa-database.firebaseapp.com",
    projectId: "insapa-database",
    storageBucket: "insapa-database.firebasestorage.app",
    messagingSenderId: "331230245928",
    appId: "1:331230245928:web:2ee43d9209e43c3c89b11d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let agentiLista = [];
let agenteCorrente = null;
let datiOrd = [];
let datiSca = [];
let clientiUnici = [];
let clienteScadenzeCorrente = null;
let modificheNonSalvate = false;

let linkPrincipale = "", linkSecondario = "";
let listinoGlobale = [];
let listinoCaricato = false;

// Gestione modali minimizzabili
let modaliAperti = [];
let nextModalId = 1;

function aggiungiBarrettaMinimizzata(id, titolo) {
    const container = document.getElementById('minimizedBarContainer');
    if (!container) return;
    if (document.getElementById(`minimized-bar-${id}`)) return;
    const bar = document.createElement('div');
    bar.className = 'minimized-bar';
    bar.id = `minimized-bar-${id}`;
    bar.innerHTML = `<span class="bar-title">${titolo}</span><button class="bar-restore" data-id="${id}">↑</button>`;
    bar.onclick = (e) => { if (!e.target.classList.contains('bar-restore')) ripristinaModale(id); };
    bar.querySelector('.bar-restore').onclick = (e) => { e.stopPropagation(); ripristinaModale(id); };
    container.appendChild(bar);
}

function rimuoviBarrettaMinimizzata(id) {
    const bar = document.getElementById(`minimized-bar-${id}`);
    if (bar) bar.remove();
}

function minimizzaModale(id) {
    const modale = modaliAperti.find(m => m.id === id);
    if (!modale || modale.minimizzato) return;
    if (modale.modalElement) modale.modalElement.style.display = 'none';
    let titolo = modale.tipo === 'ordine' ? '📝 Ordine in corso' : '📋 Listino';
    aggiungiBarrettaMinimizzata(id, titolo);
    modale.minimizzato = true;
}

function ripristinaModale(id) {
    const modale = modaliAperti.find(m => m.id === id);
    if (!modale) return;
    if (modale.modalElement) modale.modalElement.style.display = 'flex';
    rimuoviBarrettaMinimizzata(id);
    modale.minimizzato = false;
}

function chiudiModale(id) {
    const modale = modaliAperti.find(m => m.id === id);
    if (!modale) return;
    rimuoviBarrettaMinimizzata(id);
    if (modale.modalElement && modale.modalElement.parentNode) modale.modalElement.remove();
    const index = modaliAperti.findIndex(m => m.id === id);
    if (index !== -1) modaliAperti.splice(index, 1);
}

function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
function escapeRegex(str) { return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function highlightText(text, searchTerm) {
    if (!searchTerm || !searchTerm.trim()) return escapeHtml(text);
    const regex = new RegExp(`(${escapeRegex(searchTerm)})`, 'gi');
    return escapeHtml(text).replace(regex, `<span class="highlight">$1</span>`);
}

async function caricaLinkDaFile() {
    try {
        const response = await fetch('link.html');
        if (response.ok) {
            const text = await response.text();
            const lines = text.split(/\r?\n/).filter(l => l.trim() && !l.trim().startsWith('<'));
            if (lines.length >= 1) linkPrincipale = lines[0].trim();
            if (lines.length >= 2) linkSecondario = lines[1].trim();
        }
    } catch(e) {}
}
function apriLinkPrincipale() { if (linkPrincipale) { window.open(linkPrincipale, '_blank'); showToast("Link principale"); } else showToast("Link principale non configurato", true); }
function apriLinkSecondario() { if (linkSecondario) { window.open(linkSecondario, '_blank'); showToast("Link secondario"); } else showToast("Link secondario non configurato", true); }

function caricaLogoSaved() {
    const logoImg = document.getElementById('logoImmagine');
    const logoSpan = document.getElementById('logoSpan');
    fetch('icons/logo.jpg').then(r => { if (r.ok) { logoImg.src = 'icons/logo.jpg'; logoImg.style.display = 'block'; logoSpan.style.display = 'none'; } else { fetch('icons/logo.png').then(r2 => { if (r2.ok) { logoImg.src = 'icons/logo.png'; logoImg.style.display = 'block'; logoSpan.style.display = 'none'; } else { logoImg.style.display = 'none'; logoSpan.style.display = 'block'; } }).catch(() => { logoImg.style.display = 'none'; logoSpan.style.display = 'block'; }); } }).catch(() => { logoImg.style.display = 'none'; logoSpan.style.display = 'block'; });
}
const logoDiv = document.getElementById('logoRettangolo');
let lastTap = 0;
logoDiv.addEventListener('click', (e) => {
    const now = Date.now();
    if (now - lastTap < 300) { e.stopPropagation(); apriLinkSecondario(); lastTap = 0; }
    else { lastTap = now; setTimeout(() => { if (lastTap && Date.now() - lastTap > 300) { apriLinkPrincipale(); lastTap = 0; } }, 300); }
});
caricaLogoSaved();

function showToast(msg, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.style.backgroundColor = isError ? '#e74c3c' : '#27ae60';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}
function aggiornaAvvisoModifiche() { document.getElementById('avvisoModifiche').classList.toggle('show', modificheNonSalvate); }
function marcaModificheNonSalvate() { modificheNonSalvate = true; aggiornaAvvisoModifiche(); }
function resetModificheNonSalvate() { modificheNonSalvate = false; aggiornaAvvisoModifiche(); }
function normalizzaCodiceAgente(c) { return c.toString(); }

async function pulisciVecchiDocumentiMonolitici(codice) {
    try {
        const ordOld = await db.collection('agenti_dati').doc('ord_'+codice).get();
        if (ordOld.exists && ordOld.data().dati) await db.collection('agenti_dati').doc('ord_'+codice).delete();
        const scaOld = await db.collection('agenti_dati').doc('sca_'+codice).get();
        if (scaOld.exists && scaOld.data().dati) await db.collection('agenti_dati').doc('sca_'+codice).delete();
    } catch(e) {}
}

async function caricaAgenti() {
    try {
        const snap = await db.collection('agenti_lista').get();
        agentiLista = [];
        snap.forEach(doc => { let d = doc.data(); d.codice = normalizzaCodiceAgente(d.codice); agentiLista.push(d); });
        agentiLista.sort((a,b) => a.codice.localeCompare(b.codice));
        const select = document.getElementById('selectAgente');
        select.innerHTML = '<option value="">-- Seleziona agente --</option>';
        for (let a of agentiLista) { let opt = document.createElement('option'); opt.value = a.codice; opt.textContent = a.codice+" - "+a.nome; select.appendChild(opt); }
        const last = localStorage.getItem('ultimoAgenteSelezionato');
        if (last && agentiLista.find(a => a.codice === last)) { select.value = last; selezionaAgente(last); }
    } catch(e) { alert("Errore caricamento agenti: "+e.message); }
}

async function caricaDatiAgente(codice) {
    try {
        const ordSnap = await db.collection('agenti_dati').doc('ord_'+codice).collection('clienti').get();
        datiOrd = []; ordSnap.forEach(doc => datiOrd.push(doc.data()));
        const scaSnap = await db.collection('agenti_dati').doc('sca_'+codice).collection('clienti').get();
        datiSca = []; scaSnap.forEach(doc => datiSca.push(doc.data()));
        document.getElementById('fileStatusInline').innerHTML = "ORD: "+datiOrd.length+" | SCA: "+datiSca.length;
        return true;
    } catch(e) { return false; }
}

async function selezionaAgente(codice) {
    agenteCorrente = agentiLista.find(a => a.codice === codice);
    if (!agenteCorrente) return;
    localStorage.setItem('ultimoAgenteSelezionato', codice);
    await caricaDatiAgente(codice);
    aggiornaClienti();
    document.getElementById('cercaCliente').value = '';
    document.getElementById('cercaArticoloInline').value = '';
    document.getElementById('dettaglioAgenti').innerHTML = '';
    resetModificheNonSalvate();
}

async function salvaDatiAgente() {
    if (!agenteCorrente) return;
    try {
        const ordRef = db.collection('agenti_dati').doc('ord_' + agenteCorrente.codice).collection('clienti');
        const batch = db.batch();
        const oldOrd = await ordRef.get();
        oldOrd.forEach(doc => batch.delete(doc.ref));
        for (let cl of datiOrd) { batch.set(ordRef.doc(cl.codice.toString()), { codice: cl.codice, ragione: cl.ragione, articoli: cl.articoli }); }
        const scaRef = db.collection('agenti_dati').doc('sca_' + agenteCorrente.codice).collection('clienti');
        const oldSca = await scaRef.get();
        oldSca.forEach(doc => batch.delete(doc.ref));
        for (let cl of datiSca) { batch.set(scaRef.doc(cl.codice.toString()), { codice: cl.codice, ragione: cl.ragione, scadenze: cl.scadenze }); }
        await batch.commit();
        await pulisciVecchiDocumentiMonolitici(agenteCorrente.codice);
        document.getElementById('fileStatusInline').innerHTML = "OK ORD: "+datiOrd.length+" | SCA: "+datiSca.length;
        resetModificheNonSalvate();
        showToast("Dati salvati!");
        return true;
    } catch(e) { alert("Errore salvataggio: "+e.message); return false; }
}

function convertiImportoItaliano(s) {
    if (!s) return 0;
    let neg = s.endsWith('-');
    if (neg) s = s.slice(0,-1);
    let num = parseFloat(s.replace(/\./g,'').replace(',','.'));
    if (neg && !isNaN(num)) num = -num;
    return isNaN(num) ? 0 : num;
}

function parseORD(text) {
    const lines = text.split(/\r?\n/);
    const clienti = new Map();
    let curr = null;
    const reCliente = /^Cliente\s+:\s+(\d+)\s+(.+?)(?:\s{2,}|$)/;
    const reCoppia = /(\d+(?:,\d+)?)\s+(\d{2}\/\d{2}\/\d{4})/g;
    for (let line of lines) {
        line = line.trimEnd();
        if (!line) continue;
        let m = line.match(reCliente);
        if (m) { curr = { codice: m[1].toString(), ragione: m[2].trim(), articoli: [] }; clienti.set(curr.codice, curr); continue; }
        if (!curr) continue;
        if (line.startsWith("Destinaz.") || line.startsWith("Telefoni") || line.includes("INESISTENTE") || line.includes("ELIMINATO")) continue;
        let coppie = [], match;
        while ((match = reCoppia.exec(line)) !== null) { let qta = parseFloat(match[1].replace(',','.')); let data = match[2]; coppie.push({ qta, data, start: match.index, end: match.index+match[0].length }); }
        if (!coppie.length) continue;
        let first = coppie[0].start;
        let descRaw = line.substring(0, first).trim();
        let tokens = descRaw.split(/\s+/);
        let codice = tokens[0];
        let descrizione = tokens.slice(1).join(" ");
        let lastEnd = coppie[coppie.length-1].end;
        let after = line.substring(lastEnd).trim().split(/\s+/);
        let prezzo = 0, sconto1 = 0;
        if (after.length >= 2) { prezzo = parseFloat(after[0].replace(',','.')); sconto1 = parseFloat(after[1].replace(',','.')); }
        coppie.sort((a,b) => new Date(b.data.split('/').reverse().join('-')) - new Date(a.data.split('/').reverse().join('-')));
        curr.articoli.push({ codice, descrizione, coppie, prezzo, sconto1 });
    }
    return Array.from(clienti.values());
}

function parseSCA(text) {
    const lines = text.split(/\r?\n/);
    const clienti = new Map();
    let curr = null;
    const reCliente = /^CLIENTE:\s+(\d+)\s+(.+?)\s+Saldo\s+[\d\.,]+-?/;
    for (let orig of lines) {
        let line = orig.replace(/\uFEFF/g,'').replace(/\f/g,' ').replace(/\t/g,' ').replace(/\*/g,' ').trim();
        if (!line || /^=+/.test(line) || /^-+/.test(line) || line.startsWith("Scadenza") || line.startsWith("VOSTRO DARE") || line.startsWith("TOTALE") || line.startsWith("TOT.") || line.startsWith("AGENTE:") || line.startsWith("TUTTE") || line.startsWith("inSAPA") || line.startsWith("STAMPA")) continue;
        let m = line.match(reCliente);
        if (m) { curr = { codice: m[1].toString(), ragione: m[2].trim(), scadenze: [] }; clienti.set(curr.codice, curr); continue; }
        if (curr) {
            let parts = line.replace(/\s+/g,' ').split(' ');
            let euroIdx = parts.findIndex(p => p.toLowerCase() === "euro");
            if (euroIdx === -1) continue;
            let scadenza = parts[0];
            if (!/^\d{2}\/\d{2}\/\d{4}$/.test(scadenza)) continue;
            let importo = convertiImportoItaliano(parts[euroIdx+1] || '0');
            let dataDoc = parts[euroIdx-1] || '';
            let numDoc = parts[euroIdx-2] || '';
            let descrizione = parts.slice(1, euroIdx-2).join(" ");
            curr.scadenze.push({ scadenza, descrizione, numDoc, dataDoc, importo });
        }
    }
    return Array.from(clienti.values());
}

function inviaScadenzeWhatsApp(cliente) {
    if (!cliente || !cliente.scadenze || !cliente.scadenze.length) { alert("Nessuna scadenza"); return; }
    let msg = "SCADENZE CLIENTE\n"+cliente.codice+" - "+cliente.ragione+"\n\n";
    let tot = 0;
    for (let s of cliente.scadenze) { msg += "Scadenza: "+s.scadenza+"\nData Doc: "+s.dataDoc+"\nN.Doc: "+s.numDoc+"\nImporto: EUR "+s.importo.toFixed(2)+"\n---\n"; tot += s.importo; }
    msg += "\nTOTALE: EUR "+tot.toFixed(2);
    window.open("https://wa.me/?text="+encodeURIComponent(msg), '_blank');
}
function inviaScadenzeClienteCorrente() { if (clienteScadenzeCorrente) inviaScadenzeWhatsApp(clienteScadenzeCorrente); else alert("Seleziona un cliente"); }

function calcolaUltimaDataArticolo(art) {
    if (!art.coppie || !art.coppie.length) return null;
    let dates = art.coppie.map(c => ({ data: c.data, ts: new Date(c.data.split('/').reverse().join('-')).getTime() }));
    dates.sort((a,b) => b.ts - a.ts);
    return dates[0];
}

function setupQuantitaInput(inp, codice, qMap) {
    inp.value = '';
    inp.placeholder = '0';
    inp.onfocus = () => { if (inp.value === '0') inp.value = ''; };
    inp.onblur = () => { let v = inp.value.trim(); if (v === '' || v === '0') { inp.value = ''; qMap[codice] = 0; } else { let n = parseInt(v,10); if (isNaN(n) || n<0) n=0; inp.value = n; qMap[codice] = n; } };
    inp.oninput = () => { let v = inp.value.trim(); if (v === '') qMap[codice] = 0; else { let n = parseInt(v,10); if (!isNaN(n) && n>=0) qMap[codice] = n; } };
}

function apriModaleOrdine(cliente) {
    if (!cliente) { alert("Seleziona un cliente!"); return; }
    if (!cliente.ordini || !cliente.ordini.length) { alert("Nessun articolo disponibile per questo cliente."); return; }
    let articoli = [...cliente.ordini];
    articoli.sort((a,b) => {
        let da = calcolaUltimaDataArticolo(a), db = calcolaUltimaDataArticolo(b);
        if (!da && !db) return 0;
        if (!da) return 1;
        if (!db) return -1;
        return db.ts - da.ts;
    });
    const id = nextModalId++;
    const isDesktop = window.matchMedia("(pointer: fine)").matches && window.innerWidth > 768;
    const btnText = isDesktop ? "🖨️ STAMPA PDF" : "📧 INVIA EMAIL";
    const modalDiv = document.createElement('div');
    modalDiv.className = 'modal-overlay';
    modalDiv.style.display = 'flex';
    modalDiv.innerHTML = `
        <div class="modal-content">
            <button class="minimize-btn" title="Minimizza">−</button>
            <button class="close-modal-btn" title="Chiudi">✕</button>
            <h3>📝 ORDINE DA CLIENTE</h3>
            <div class="cliente-info-modale">
                <p><strong>Codice:</strong> ${escapeHtml(cliente.codice)}</p>
                <p><strong>Ragione Sociale:</strong> ${escapeHtml(cliente.ragione)}</p>
                <p><strong>Scadenze:</strong> ${cliente.scadenze ? cliente.scadenze.length : 0} in sospeso</p>
            </div>
            <div class="ricerca-articolo-ordine">
                <input type="text" id="ricercaOrd_${id}" placeholder="🔍 Cerca articolo...">
            </div>
            <div class="lista-articoli-ordine" id="listaOrd_${id}"></div>
            <div class="btn-group-modal">
                <button id="btnConferma_${id}" class="btn-success">${btnText}</button>
                <button id="btnApriListino_${id}" class="btn-primary">📋 APRI LISTINO</button>
            </div>
        </div>
    `;
    document.body.appendChild(modalDiv);
    let qMap = {};
    modaliAperti.push({ id, tipo: 'ordine', modalElement: modalDiv, minimizzato: false, cliente, articoli, qMap });

    function renderLista(search = '') {
        const container = document.getElementById(`listaOrd_${id}`);
        let filtered = articoli;
        if (search) { const low = search.toLowerCase(); filtered = articoli.filter(a => a.codice.toLowerCase().includes(low) || a.descrizione.toLowerCase().includes(low)); }
        if (!filtered.length) { container.innerHTML = '<p style="text-align:center;color:#999;">Nessun articolo</p>'; return; }
        let html = '';
        for (let a of filtered) {
            const ultimo = calcolaUltimaDataArticolo(a);
            const ultimoTesto = ultimo ? "Ultimo acquisto: "+ultimo.data : "Mai acquistato";
            html += `<div class="ordine-articolo-item"><div class="ordine-articolo-info"><div class="ordine-articolo-codice">${escapeHtml(a.codice)}</div><div class="ordine-articolo-desc">${escapeHtml(a.descrizione)}</div><div class="ordine-articolo-desc" style="font-size:0.7rem;color:#888;">${ultimoTesto}</div></div><div class="ordine-articolo-qta"><label>Quantità:</label><input type="number" id="qta_${id}_${a.codice.replace(/[^a-zA-Z0-9]/g,'_')}" min="0" step="1" style="text-align:center;"></div></div>`;
        }
        container.innerHTML = html;
        for (let a of filtered) {
            const inp = document.getElementById(`qta_${id}_${a.codice.replace(/[^a-zA-Z0-9]/g,'_')}`);
            if (inp) { if (qMap[a.codice] === undefined) qMap[a.codice] = 0; setupQuantitaInput(inp, a.codice, qMap); }
        }
    }
    renderLista();
    document.getElementById(`ricercaOrd_${id}`).addEventListener('input', e => renderLista(e.target.value));
    document.getElementById(`btnConferma_${id}`).onclick = () => {
        let selected = [];
        for (let a of articoli) { let q = qMap[a.codice] || 0; if (q > 0) selected.push({ codice: a.codice, descrizione: a.descrizione, quantita: q }); }
        if (!selected.length) { alert("Inserisci almeno una quantità > 0"); return; }
        if (isDesktop) stampaPDF(cliente, selected);
        else inviaEmailOrdine(cliente, selected);
        chiudiModale(id);
    };
    document.getElementById(`btnApriListino_${id}`).onclick = () => { apriModaleListino(); };
    modalDiv.querySelector('.minimize-btn').onclick = () => minimizzaModale(id);
    modalDiv.querySelector('.close-modal-btn').onclick = () => chiudiModale(id);
}

function aggiornaClienti() {
    const map = new Map();
    for (let c of datiOrd) { map.set(c.codice.toString(), { codice: c.codice.toString(), ragione: c.ragione, hasScadenze: false, scadenze: [], ordini: c.articoli }); }
    for (let c of datiSca) {
        let k = c.codice.toString();
        let existing = map.get(k);
        if (existing) { existing.hasScadenze = true; existing.scadenze = c.scadenze; }
        else { map.set(k, { codice: k, ragione: c.ragione, hasScadenze: true, scadenze: c.scadenze, ordini: [] }); }
    }
    clientiUnici = Array.from(map.values());
    filtraClienti();
}

function filtraClienti() {
    let txt = document.getElementById('cercaCliente').value.toLowerCase();
    let filtrati = clientiUnici.filter(c => c.codice.toLowerCase().includes(txt) || c.ragione.toLowerCase().includes(txt));
    filtrati.sort((a,b) => {
        let aHas = a.hasScadenze && a.scadenze.length;
        let bHas = b.hasScadenze && b.scadenze.length;
        if (aHas && !bHas) return -1;
        if (!aHas && bHas) return 1;
        return a.ragione.localeCompare(b.ragione);
    });
    let sel = document.getElementById('selectClienteAgenti');
    sel.innerHTML = '<option value="">-- Seleziona cliente --</option>';
    for (let c of filtrati) {
        let opt = document.createElement('option');
        opt.value = c.codice;
        let has = c.hasScadenze && c.scadenze.length;
        if (has) { opt.style.color = '#c0392b'; opt.style.fontWeight = 'bold'; opt.textContent = "[R] " + c.codice + " - " + c.ragione + " (" + c.scadenze.length + " scad.)"; }
        else opt.textContent = c.codice + " - " + c.ragione;
        sel.appendChild(opt);
    }
    if (!filtrati.length) document.getElementById('dettaglioAgenti').innerHTML = '<div class="scadenze-box">Nessun cliente trovato</div>';
}

function buildScadenzeHtml(cliente) {
    let html = `<div class="scadenze-box"><div class="scadenze-header"><h3 style="margin:0;">📅 Scadenze - ${cliente.codice} ${cliente.ragione}</h3>
                <button class="btn-whatsapp" onclick="inviaScadenzeWhatsApp(clienteScadenzeCorrente)"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.47 3.45 1.35 4.95L2 22l5.25-1.38c1.45.85 3.1 1.3 4.79 1.3 5.46 0 9.91-4.45 9.91-9.91 0-2.66-1.04-5.16-2.93-7.05A9.87 9.87 0 0 0 12.04 2z"/></svg> Invia Scadenze</button></div>
                <table style="width:100%;border-collapse:collapse;"><thead><tr bgcolor="#e9ecef"><th>Scadenza</th><th>Data Doc.</th><th>N.Doc</th><th>Importo</th></tr></thead><tbody>`;
    for (let s of cliente.scadenze) {
        let cls = s.importo < 0 ? 'style="color:#e74c3c"' : '';
        html += `<tr><td>${s.scadenza}</td><td>${s.dataDoc || ''}</td><td>${s.numDoc}</td><td align="right" ${cls}>${s.importo.toFixed(2)} €</td></tr>`;
    }
    html += `</tbody></table></div>`;
    return html;
}

function mostraDettaglioCliente(codice) {
    let cliente = clientiUnici.find(c => c.codice === codice);
    if (!cliente) return;
    clienteScadenzeCorrente = cliente;
    let html = '';
    if (cliente.hasScadenze && cliente.scadenze.length) html += buildScadenzeHtml(cliente);
    else html += '<div class="scadenze-box">Nessuna scadenza per ' + cliente.ragione + '</div>';
    if (cliente.ordini && cliente.ordini.length) {
        html += `<div class="scadenze-box"><h3>ORD - ${cliente.codice} ${cliente.ragione} (${cliente.ordini.length} articoli)</h3>`;
        for (let art of cliente.ordini) {
            let storico = '';
            if (art.coppie && art.coppie.length) {
                let ultimi = art.coppie.slice(0,4);
                storico = `<div class="storico-ordini"><strong>STORICO ORDINI (ultimi 4):</strong><br>${ultimi.map(o => `<span>${o.data} Q.ta: ${o.qta}</span>`).join(' ')}</div>`;
            } else { storico = '<div class="storico-ordini">Nessun ordine registrato</div>'; }
            html += `<div class="articolo-item"><div class="articolo-titolo"><strong>${art.codice} ${art.descrizione}</strong></div><div>EUR ${art.prezzo.toFixed(2)} - Sc. ${art.sconto1.toFixed(2)}%</div>${storico}</div>`;
        }
        html += `</div>`;
    } else { html += '<div class="scadenze-box">Nessun ordine per ' + cliente.ragione + '</div>'; }
    document.getElementById('dettaglioAgenti').innerHTML = html;
    document.querySelectorAll('.articolo-item').forEach(el => {
        el.onclick = (e) => { e.stopPropagation(); let sd = el.querySelector('.storico-ordini'); if (sd) sd.classList.toggle('visible'); };
    });
}

function filtraArticoli() {
    let cod = document.getElementById('selectClienteAgenti').value;
    if (!cod) return;
    let cliente = clientiUnici.find(c => c.codice === cod);
    if (!cliente || !cliente.ordini) return;
    let search = document.getElementById('cercaArticoloInline').value.toLowerCase();
    let filtrati = cliente.ordini.filter(a => a.codice.toLowerCase().includes(search) || a.descrizione.toLowerCase().includes(search));
    let html = '';
    if (cliente.hasScadenze && cliente.scadenze.length) html += buildScadenzeHtml(cliente);
    if (filtrati.length) {
        html += `<div class="scadenze-box"><h3>ORD - ${cliente.codice} ${cliente.ragione} (${filtrati.length} articoli)</h3>`;
        for (let art of filtrati) {
            let storico = '';
            if (art.coppie && art.coppie.length) {
                let ultimi = art.coppie.slice(0,4);
                storico = `<div class="storico-ordini"><strong>STORICO ORDINI (ultimi 4):</strong><br>${ultimi.map(o => `<span>${o.data} Q.ta: ${o.qta}</span>`).join(' ')}</div>`;
            } else { storico = '<div class="storico-ordini">Nessun ordine registrato</div>'; }
            html += `<div class="articolo-item"><div class="articolo-titolo"><strong>${art.codice} ${art.descrizione}</strong></div><div>EUR ${art.prezzo.toFixed(2)} - Sc. ${art.sconto1.toFixed(2)}%</div>${storico}</div>`;
        }
        html += `</div>`;
    } else { html += '<div class="scadenze-box">Nessun articolo trovato</div>'; }
    document.getElementById('dettaglioAgenti').innerHTML = html;
    document.querySelectorAll('.articolo-item').forEach(el => {
        el.onclick = (e) => { e.stopPropagation(); let sd = el.querySelector('.storico-ordini'); if (sd) sd.classList.toggle('visible'); };
    });
}

function nomeFileCorrisponde(nome, codice, tipo) {
    let base = nome.replace(/\.[a-zA-Z0-9]+$/, '');
    let m = base.match(/^([A-Z]+)(\d+)$/i);
    if (!m) return false;
    if (m[1].toUpperCase() !== tipo) return false;
    return parseInt(m[2],10) === parseInt(codice,10);
}

async function caricaFile(files) {
    if (!agenteCorrente) { alert("Seleziona un agente!"); return false; }
    if (files.length !== 2) { alert("Servono ESATTAMENTE 2 file (ORD e SCA)!"); return false; }
    let cod = agenteCorrente.codice;
    let trovati = { ord: false, sca: false };
    let ordText = null, scaText = null, errori = [];
    for (let f of files) {
        if (nomeFileCorrisponde(f.name, cod, 'ORD')) { trovati.ord = true; ordText = await f.text(); }
        else if (nomeFileCorrisponde(f.name, cod, 'SCA')) { trovati.sca = true; scaText = await f.text(); }
        else errori.push(f.name);
    }
    if (errori.length) { alert("File non validi: "+errori.join(', ')); return false; }
    if (!trovati.ord || !trovati.sca) { alert("Mancano ORD"+cod+".txt o SCA"+cod+".txt"); return false; }
    datiOrd = ordText ? parseORD(ordText) : [];
    datiSca = scaText ? parseSCA(scaText) : [];
    await salvaDatiAgente();
    aggiornaClienti();
    document.getElementById('fileStatusInline').innerHTML = "ORD: "+datiOrd.length+" | SCA: "+datiSca.length;
    alert("Caricato! ORD: "+datiOrd.length+" clienti, SCA: "+datiSca.length+" clienti");
    return true;
}

async function caricaListinoGlobale(file) {
    if (!file) { alert("Seleziona file listino.txt"); return false; }
    try {
        const text = await file.text();
        const lines = text.split(/\r?\n/);
        const articoli = [];
        for (let line of lines) {
            line = line.trim();
            if (!line || line.startsWith("===") || line.startsWith("---") || line.startsWith("Codice")) continue;
            const parts = line.split(/\s+/);
            if (parts.length < 5) continue;
            let codice = parts[0];
            let prezzo = parseFloat(parts[1].replace(',', '.'));
            let descrizione = parts.slice(2, -4).join(" ");
            let um = parts[parts.length-4];
            let gm = parts[parts.length-3];
            let mord = parts[parts.length-2];
            let iva = parts[parts.length-1];
            if (isNaN(prezzo)) continue;
            articoli.push({ codice, prezzo, descrizione, um, gm, m_ord: mord, iva });
        }
        if (!articoli.length) { alert("Nessun articolo valido"); return false; }
        await db.collection('listini_generali').doc('listino_globale').set({ articoli, ultimoAggiornamento: new Date().toISOString(), numeroArticoli: articoli.length });
        listinoGlobale = articoli;
        listinoCaricato = true;
        showToast("Listino caricato! "+articoli.length+" articoli");
        alert("Listino salvato. Ora disponibile a tutti gli agenti.");
        return true;
    } catch(e) { alert("Errore: "+e.message); return false; }
}

async function caricaListinoDaDB() {
    try {
        const doc = await db.collection('listini_generali').doc('listino_globale').get();
        if (doc.exists) { listinoGlobale = doc.data().articoli || []; listinoCaricato = true; }
        else { listinoGlobale = []; listinoCaricato = false; }
    } catch(e) { listinoGlobale = []; }
}

document.getElementById('hamburgerBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('navGrid').classList.toggle('open'); };
document.addEventListener('click', (e) => { let nav = document.getElementById('navGrid'); if (!nav.contains(e.target) && !document.getElementById('hamburgerBtn').contains(e.target)) nav.classList.remove('open'); });
document.getElementById('selectAgente').onchange = (e) => {
    if (e.target.value && modificheNonSalvate) {

        else selezionaAgente(e.target.value);

};
document.getElementById('selectClienteAgenti').onchange = (e) => { if (e.target.value) mostraDettaglioCliente(e.target.value); };
document.getElementById('cercaCliente').oninput = () => filtraClienti();
document.getElementById('cercaArticoloInline').oninput = () => { if (document.getElementById('selectClienteAgenti').value) filtraArticoli(); };
document.getElementById('btnCaricaFile').onclick = () => document.getElementById('fileInput').click();
document.getElementById('btnCaricaListino').onclick = () => document.getElementById('fileListinoInput').click();

    let cod = document.getElementById('selectClienteAgenti').value;
    if (!cod) { alert("Seleziona prima un cliente!"); return; }
    let cliente = clientiUnici.find(c => c.codice === cod);
    if (cliente) apriModaleOrdine(cliente);

document.getElementById('fileInput').onchange = async (e) => { if (e.target.files.length) await caricaFile(Array.from(e.target.files)); e.target.value = ''; };
document.getElementById('fileListinoInput').onchange = async (e) => { if (e.target.files.length) { await caricaListinoGlobale(e.target.files[0]); e.target.value = ''; } };

Promise.all([caricaLinkDaFile(), caricaAgenti(), caricaListinoDaDB()]).then(() => caricaLogoSaved());

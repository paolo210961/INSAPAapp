        @media (max-width: 768px) { .main-container { flex-direction: column; } .sidebar { width: 100%; position: static; } .header { flex-direction: column; align-items: stretch; } .nav-box { width: 100%; } .logo-rettangolo { width: 100%; margin: 0 auto; } .content-area { width: 100%; } }

<body>
<div id="appContainer">
    <div class="header">
        <div class="logo-area-sx">
            <div id="logoRettangolo" class="logo-rettangolo">

    <div class="main-container">
        <div id="sidebarAgenti" class="sidebar">
            <div class="agente-selector">
                <label>👤 Seleziona Agente</label>
                <select id="selectAgente" style="width:100%; padding:10px; border-radius:8px;">
                    <option value="">-- Seleziona agente --</option>
                </select>
                <button id="btnCreaAgente" class="btn-success" style="margin-top:10px;">➕ CREA AGENTE</button>
            </div>

            <div id="fileStatusAgenti" class="file-status"></div>
            <input type="file" id="fileInputMultiAgenti" multiple accept=".txt,.csv,.text/plain" style="display: none;">
            
            <button id="btnForzaVisualizza" style="background:#f39c12; color:#2c3e50; margin-top:10px;">🔍 FORZA VISUALIZZAZIONE DATI</button>
            
            <div class="search-box" style="margin-top:15px;"><label>🔍 Cerca cliente</label><input type="text" id="cercaCliente" placeholder="Digita nome o codice cliente..."></div>
            <div class="filter-group" style="margin-top:15px;">
                <label>👥 Cliente</label>
                <select id="selectClienteAgenti" size="10" style="height: auto; min-height: 150px; width:100%; padding:8px; border-radius:8px;">
                    <option value="">-- Seleziona cliente --</option>
                </select>

<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
    apiKey: "AIzaSyBAqGSqRE7xfH5YGgPOmTInv24ESU3jkvQ",
    authDomain: "insapa-database.firebaseapp.com",
    projectId: "insapa-database",
    storageBucket: "insapa-database.firebasestorage.app",
    messagingSenderId: "331230245928",
    appId: "1:331230245928:web:2ee43d9209e43c3c89b11d",
    measurementId: "G-DZJFCRD96M"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ==================== AGENTI - VERSIONE FIREBASE ====================
let ADMIN_PASSWORD = localStorage.getItem('admin_password') || "insapa2026";
let agentiLista = [];
let agenteCorrente = null;
let datiAgenti = { ord: [], sca: [] };
let clientiUniciAgenti = [];
let clientiFiltrati = [];
let articoliFiltratiGlobali = [];

function debugLog(msg) {
    let consoleDiv = document.getElementById('debugConsole');
    if(consoleDiv) {
        let time = new Date().toLocaleTimeString();
        consoleDiv.innerHTML += `<div>${time} - ${msg}</div>`;
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
        if(consoleDiv.children.length > 50) {
            consoleDiv.innerHTML = `<div>${time} - Console pulita</div>`;
        }
    }
    console.log(msg);
}

function formatNumber(n) { if (n === null || n === undefined || n === '') return ''; let num = parseFloat(n); if (isNaN(num)) return ''; return num.toLocaleString('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

// ==================== GESTIONE AGENTI SU FIREBASE ====================
async function caricaAgenti() {
    debugLog("Caricamento agenti da Firebase...");
    try {
        const snapshot = await db.collection('agenti_lista').get();
        agentiLista = [];
        snapshot.forEach(doc => agentiLista.push(doc.data()));
        agentiLista.sort((a,b) => a.codice.localeCompare(b.codice));
        debugLog(`Caricati ${agentiLista.length} agenti`);
        aggiornaSelectAgenti();
        return agentiLista.length;
    } catch(e) { 
        debugLog("ERRORE caricamento agenti: "+e.message);
        return 0;
    }
}

async function salvaAgenti() {
    debugLog("Salvataggio agenti su Firebase...");
    try {
        const batch = db.batch();
        const snapshot = await db.collection('agenti_lista').get();
        snapshot.forEach(doc => batch.delete(doc.ref));
        agentiLista.forEach(a => {
            const ref = db.collection('agenti_lista').doc(a.codice);
            batch.set(ref, a);
        });
        await batch.commit();
        debugLog("Agenti salvati");
    } catch(e) { debugLog("ERRORE salvataggio agenti: "+e.message); }
}

function aggiornaSelectAgenti() {
    let select = document.getElementById('selectAgente');
    let valoreCorrente = select.value;
    select.innerHTML = '<option value="">-- Seleziona agente --</option>';
    for (let a of agentiLista) { 
        let opt = document.createElement('option'); 
        opt.value = a.codice; 
        opt.textContent = `${a.codice} - ${a.nome}`; 
        select.appendChild(opt); 
    }
    if (valoreCorrente && agentiLista.find(a => a.codice === valoreCorrente)) {
        select.value = valoreCorrente;
    } else if (agenteCorrente) {
        select.value = agenteCorrente.codice;
    }
    debugLog(`Select aggiornata: ${select.options.length} opzioni`);
}

async function selezionaAgente(codice) {
    agenteCorrente = agentiLista.find(a => a.codice === codice);
    if (agenteCorrente) { 
        debugLog(`Agente selezionato: ${agenteCorrente.codice} - ${agenteCorrente.nome}`); 
        await caricaDatiAgente(); 
    } else { 
        datiAgenti = { ord: [], sca: [] }; 
        aggiornaClientiUniciAgenti(); 
        document.getElementById('fileStatusAgenti').innerHTML = ''; 
        debugLog("Nessun agente selezionato"); 
    }
}

async function caricaDatiAgente() {
    if (!agenteCorrente) return;
    debugLog(`Caricamento dati per agente ${agenteCorrente.codice}...`);
    try {
        const docOrd = await db.collection('agenti_dati').doc(`ord_${agenteCorrente.codice}`).get();
        const docSca = await db.collection('agenti_dati').doc(`sca_${agenteCorrente.codice}`).get();
        
        datiAgenti.ord = docOrd.exists ? docOrd.data().dati : [];
        datiAgenti.sca = docSca.exists ? docSca.data().dati : [];
        
        debugLog(`Dati caricati: ORD ${datiAgenti.ord.length} clienti, SCA ${datiAgenti.sca.length} clienti`);
        document.getElementById('fileStatusAgenti').innerHTML = `📁 ORD: ${datiAgenti.ord.length} clienti | SCA: ${datiAgenti.sca.length} clienti`;
        aggiornaClientiUniciAgenti();
    } catch(e) { debugLog("ERRORE caricamento dati agente: "+e.message); }
}

async function salvaDatiAgente() {
    if (!agenteCorrente) return;
    debugLog(`Salvataggio dati per agente ${agenteCorrente.codice}...`);
    try {
        await db.collection('agenti_dati').doc(`ord_${agenteCorrente.codice}`).set({ dati: datiAgenti.ord });
        await db.collection('agenti_dati').doc(`sca_${agenteCorrente.codice}`).set({ dati: datiAgenti.sca });
        debugLog("Dati salvati su Firebase");
    } catch(e) { debugLog("ERRORE salvataggio dati agente: "+e.message); }
}

async function creaAgente(codice, nome) {
    if (!codice || !nome) {
        alert("Inserisci codice e nome!");
        return false;
    }
    if (agentiLista.find(a => a.codice === codice)) { 
        alert("Codice agente già esistente!"); 
        return false; 
    }
    agentiLista.push({ codice: codice, nome: nome });
    await salvaAgenti();
    aggiornaSelectAgenti();
    debugLog(`Agente creato: ${codice} - ${nome}`);
    return true;
}

// ==================== PARSER ORD/SCA ====================
function parseORD(text) {
    debugLog(`Parsing ORD: ${text.length} caratteri`);
    const lines = text.split(/\r?\n/); const clienti = new Map(); let currentCliente = null;
    const reCliente = /^Cliente\s+:\s+(\d+)\s+(.+?)(?:\s{2,}|$)/; const reCoppia = /(\d+(?:,\d+)?)\s+(\d{2}\/\d{2}\/\d{4})/g;
    for (let line of lines) {
        line = line.trimEnd(); if (line === "") continue;
        let mCliente = line.match(reCliente);
        if (mCliente) { currentCliente = { codice: mCliente[1], ragione: mCliente[2].trim(), articoli: [] }; clienti.set(currentCliente.codice, currentCliente); continue; }
        if (!currentCliente) continue;
        if (line.startsWith("Destinaz.") || line.startsWith("Telefoni") || line.includes("INESISTENTE") || line.includes("ELIMINATO")) continue;
        let coppie = [], match; while ((match = reCoppia.exec(line)) !== null) coppie.push({ qta: parseFloat(match[1].replace(',', '.')), data: match[2], start: match.index, end: match.index + match[0].length });
        if (coppie.length === 0) continue;
        let firstCoppiaStart = coppie[0].start, descrizioneRaw = line.substring(0, firstCoppiaStart).trim(), tokens = descrizioneRaw.split(/\s+/), codice = tokens[0], descrizione = tokens.slice(1).join(" ");
        let lastCoppiaEnd = coppie[coppie.length-1].end, afterCoppie = line.substring(lastCoppiaEnd).trim(), numTokens = afterCoppie.split(/\s+/);
        let prezzo = 0, sconto1 = 0; if (numTokens.length >= 2) { prezzo = parseFloat(numTokens[0].replace(',', '.')); sconto1 = parseFloat(numTokens[1].replace(',', '.')); }
        coppie.sort((a,b) => new Date(b.data.split('/').reverse().join('-')) - new Date(a.data.split('/').reverse().join('-')));
        currentCliente.articoli.push({ codice, descrizione, coppie, prezzo, sconto1 });
    }
    debugLog(`ORD parsato: ${clienti.size} clienti`);
    return Array.from(clienti.values());
}

function parseSCA(text) {
    debugLog(`Parsing SCA: ${text.length} caratteri`);
    const lines = text.split(/\r?\n/); const clienti = new Map(); let currentCliente = null;
    const reCliente = /^CLIENTE:\s+(\d+)\s+(.+?)\s+Saldo\s+[\d\.,]+/; const reScadenza = /^(\d{2}\/\d{2}\/\d{4})\s+.*?(\d+)\s+(\d{2}\/\d{2}\/\d{4})\s+Euro\s+([\d\.,]+)/;
    for (let line of lines) {
        line = line.trim(); if (line === "") continue;
        let mCliente = line.match(reCliente);
        if (mCliente) { currentCliente = { codice: mCliente[1], ragione: mCliente[2].trim(), scadenze: [] }; clienti.set(currentCliente.codice, currentCliente); continue; }
        if (currentCliente) { let mScad = line.match(reScadenza); if (mScad) { currentCliente.scadenze.push({ scadenza: mScad[1], numDoc: mScad[2], dataDoc: mScad[3], importo: parseFloat(mScad[4].replace(/\./g, '').replace(',', '.')) }); } }
    }
    debugLog(`SCA parsato: ${clienti.size} clienti`);
    return Array.from(clienti.values());
}

// ==================== GESTIONE CLIENTI ====================
function aggiornaClientiUniciAgenti() {
    const mappa = new Map();
    for (let c of datiAgenti.ord) { let key = `${c.codice}|${c.ragione}`; if (!mappa.has(key)) mappa.set(key, { codice: c.codice, ragione: c.ragione, hasScadenze: false, hasOrdini: true }); else mappa.get(key).hasOrdini = true; }
    for (let c of datiAgenti.sca) { let key = `${c.codice}|${c.ragione}`; if (!mappa.has(key)) mappa.set(key, { codice: c.codice, ragione: c.ragione, hasScadenze: false, hasOrdini: false }); if (c.scadenze.length > 0 && c.scadenze.some(s => s.importo !== 0)) { let cli = mappa.get(key); if (cli) cli.hasScadenze = true; } }
    clientiUniciAgenti = Array.from(mappa.values()).sort((a,b) => a.ragione.localeCompare(b.ragione));
    clientiFiltrati = [...clientiUniciAgenti]; 
    aggiornaTendinaClienti();
    debugLog(`Clienti unici: ${clientiUniciAgenti.length}`);
}

function aggiornaTendinaClienti() {
    let select = document.getElementById('selectClienteAgenti'), searchText = document.getElementById('cercaCliente').value.toLowerCase();
    clientiFiltrati = clientiUniciAgenti.filter(cli => cli.codice.includes(searchText) || cli.ragione.toLowerCase().includes(searchText));
    select.innerHTML = '<option value="">-- Seleziona cliente --</option>';
    for (let cli of clientiFiltrati) { let opt = document.createElement('option'); opt.value = `${cli.codice}|${cli.ragione}`; opt.textContent = `${cli.codice} - ${cli.ragione}`; if (cli.hasScadenze) { opt.style.color = '#c0392b'; opt.style.fontWeight = 'bold'; } select.appendChild(opt); }
    select.disabled = (clientiFiltrati.length === 0);
    debugLog(`Tendina clienti aggiornata: ${select.options.length} opzioni`);
}

function mostraScadenzeAgenti() {
    let clienteKey = document.getElementById('selectClienteAgenti').value, container = document.getElementById('scadenzeAgenti');
    if (!clienteKey) { container.innerHTML = '<div class="info-messaggio">Seleziona un cliente.</div>'; return; }
    let [codice, ragione] = clienteKey.split('|'), clienteSCA = datiAgenti.sca.find(c => c.codice === codice && c.ragione === ragione);
    if (!clienteSCA || clienteSCA.scadenze.length === 0) { container.innerHTML = `<div class="info-messaggio">Nessuna scadenza (SCA) per ${ragione}</div>`; return; }
    let html = `<div class="scadenze-box"><h3>📅 Scadenze - ${codice} ${ragione}</h3><table class="tabella"><thead><tr><th>Scadenza</th><th>N. Doc.</th><th>Data documento</th><th>Importo</th></tr></thead><tbody>`;
    for (let s of clienteSCA.scadenze) html += `<tr><td style="white-space:nowrap">${s.scadenza}</td><td>${s.numDoc}</td><td style="white-space:nowrap">${s.dataDoc}</td><td style="text-align:right">${formatNumber(s.importo)} €</td></tr>`;
    html += `</tbody>}</div>`; container.innerHTML = html;
    debugLog(`Mostrate scadenze per ${codice} - ${ragione}`);
}

function mostraDettaglioAgenti() {
    let clienteKey = document.getElementById('selectClienteAgenti').value, container = document.getElementById('dettaglioAgenti');
    if (!clienteKey) { container.innerHTML = '<div class="info-messaggio">Seleziona un cliente.</div>'; return; }
    let [codice, ragione] = clienteKey.split('|'), clienteORD = datiAgenti.ord.find(c => c.codice === codice && c.ragione === ragione);
    if (!clienteORD) clienteORD = datiAgenti.ord.find(c => c.codice === codice);
    if (!clienteORD || clienteORD.articoli.length === 0) { container.innerHTML = `<div class="info-messaggio">Nessun ordine (ORD) per il cliente ${codice}</div>`; document.getElementById('ricercaArticoloContainer').innerHTML = ''; return; }
    document.getElementById('ricercaArticoloContainer').innerHTML = `<div class="search-box"><label>🔍 Cerca articolo</label><input type="text" id="cercaArticolo" placeholder="Codice o descrizione"></div>`;
    articoliFiltratiGlobali = [...clienteORD.articoli];
    let inp = document.getElementById('cercaArticolo'); if (inp) { inp.removeEventListener('input', filtraArticoli); inp.addEventListener('input', filtraArticoli); }
    filtraArticoli();
    debugLog(`Mostrato dettaglio per ${codice} - ${ragione} con ${clienteORD.articoli.length} articoli`);
}

function filtraArticoli() {
    let searchText = document.getElementById('cercaArticolo')?.value.toLowerCase() || '', clienteKey = document.getElementById('selectClienteAgenti').value;
    if (!clienteKey) return;
    let [codice, ragione] = clienteKey.split('|'), filtrati = articoliFiltratiGlobali.filter(a => a.codice.toLowerCase().includes(searchText) || a.descrizione.toLowerCase().includes(searchText));
    let html = `<h3>📋 ORD - ${codice} ${ragione}</h3>`;
    for (let art of filtrati) {
        html += `<div class="articolo-item" data-codice="${art.codice}" data-descrizione="${art.descrizione}" data-prezzo="${art.prezzo}" data-sconto="${art.sconto1}" data-coppie='${JSON.stringify(art.coppie)}'>
                    <div class="articolo-titolo"><strong>${art.codice} ${art.descrizione}</strong></div>
                    <div class="articolo-prezzo"><strong>€ ${formatNumber(art.prezzo)} - Sc. ${formatNumber(art.sconto1)}%</strong></div>
                </div>`;
    }
    if (filtrati.length === 0) html += `<div class="info-messaggio">Nessun articolo trovato.</div>`;
    document.getElementById('dettaglioAgenti').innerHTML = html;
    document.querySelectorAll('.articolo-item').forEach(el => {
        el.addEventListener('click', (e) => {
            e.stopPropagation();
            let coppie = JSON.parse(el.dataset.coppie);
            let storicoHtml = '<div class="storico-ordini" style="margin-top:10px; padding-top:10px; border-top:2px solid #3498db;"><strong>📋 STORICO ORDINI (ultimi 4):</strong><br>';
            let mostrati = coppie.slice(0, 4);
            for (let ord of mostrati) { storicoHtml += `<span style="display:inline-block; background:#ecf0f1; padding:4px 8px; margin:3px; border-radius:6px;">📅 ${ord.data} → Q.tà: ${ord.qta}</span> `; }
            if (mostrati.length === 0) storicoHtml += '<span>Nessun ordine precedente</span>';
            storicoHtml += '</div>';
            let existing = el.querySelector('.storico-ordini');
            if (existing) { existing.remove(); }
            else { el.insertAdjacentHTML('beforeend', storicoHtml); }
        });
    });
}

function mostraPasswordOverlay(callback) {
    let ov = document.createElement('div'); ov.className = 'password-overlay';
    ov.innerHTML = `<div class="password-modal"><h3>🔐 Accesso Contabilità</h3><p>Inserisci password amministratore</p><input type="password" id="pwdInput" style="width:100%; margin:10px 0;"><div class="btn-group"><button id="pwdOkBtn" class="btn-success">OK</button><button id="pwdCancelBtn" class="btn-danger">ANNULLA</button></div></div>`;
    document.body.appendChild(ov);
    document.getElementById('pwdOkBtn').onclick = () => { let pwd = document.getElementById('pwdInput').value; if (pwd === ADMIN_PASSWORD) { ov.remove(); callback(true); } else { alert("Password errata!"); ov.remove(); callback(false); } };
    document.getElementById('pwdCancelBtn').onclick = () => { ov.remove(); callback(false); };
}

// ==================== GESTIONE LOGO ====================
function caricaLogoSalvato() { let ls = localStorage.getItem('logo_azienda'); if (ls) { document.getElementById('logoImmagine').src = ls; document.getElementById('logoImmagine').style.display = 'block'; document.getElementById('logoPlaceholder').style.display = 'none'; } }
function salvaLogo(u) { localStorage.setItem('logo_azienda', u); }
function caricaLogoDaFile() { let inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*'; inp.onchange = e => { let f = e.target.files[0]; if (f) { let r = new FileReader(); r.onload = ev => { let url = ev.target.result; document.getElementById('logoImmagine').src = url; document.getElementById('logoImmagine').style.display = 'block'; document.getElementById('logoPlaceholder').style.display = 'none'; salvaLogo(url); }; r.readAsDataURL(f); } }; inp.click(); }
document.getElementById('btnCaricaLogo').onclick = e => { e.stopPropagation(); caricaLogoDaFile(); };
let pt = null; let ld = document.getElementById('logoRettangolo'); ld.addEventListener('mousedown', () => { pt = setTimeout(() => { if (document.getElementById('logoImmagine').style.display === 'block') caricaLogoDaFile(); pt = null; }, 3000); }); ld.addEventListener('mouseup', () => { if (pt) { clearTimeout(pt); pt = null; } }); ld.addEventListener('mouseleave', () => { if (pt) { clearTimeout(pt); pt = null; } }); caricaLogoSalvato();

// ==================== CARICAMENTO FILE ====================
document.getElementById('btnCaricaFileAgenti').onclick = () => { if (!agenteCorrente) { alert("Seleziona prima un agente!"); return; } document.getElementById('fileInputMultiAgenti').click(); };
document.getElementById('fileInputMultiAgenti').onchange = async (e) => {
    let files = Array.from(e.target.files); if (files.length === 0 || !agenteCorrente) return;
    debugLog(`Caricamento di ${files.length} file`);
    let loaded = 0, ordText = null, scaText = null;
    for (let file of files) {
        let reader = new FileReader();
        reader.onload = async (ev) => { 
            let content = ev.target.result, nome = file.name.toLowerCase(); 
            debugLog(`Letto file: ${nome}, ${content.length} caratteri`);
            if (nome.includes('ord')) ordText = content; 
            if (nome.includes('sca')) scaText = content; 
            loaded++; 
            if (loaded === files.length) { 
                if (ordText) { datiAgenti.ord = parseORD(ordText); debugLog(`ORD caricato: ${datiAgenti.ord.length} clienti`); }
                if (scaText) { datiAgenti.sca = parseSCA(scaText); debugLog(`SCA caricato: ${datiAgenti.sca.length} clienti`); }
                await salvaDatiAgente(); 
                aggiornaClientiUniciAgenti(); 
                document.getElementById('fileStatusAgenti').innerHTML = `✅ ORD:${datiAgenti.ord.length} clienti | SCA:${datiAgenti.sca.length} clienti`;
                alert(`Caricamento completato e salvato su Firebase! ORD: ${datiAgenti.ord.length} clienti, SCA: ${datiAgenti.sca.length} clienti`);
            } 
        };
        reader.onerror = (err) => { debugLog(`ERRORE lettura file: ${file.name}`); loaded++; };
        reader.readAsText(file, "UTF-8");
    }
    e.target.value = '';
};

document.getElementById('selectAgente').onchange = (e) => { if (e.target.value) selezionaAgente(e.target.value); else { agenteCorrente = null; datiAgenti = { ord: [], sca: [] }; aggiornaClientiUniciAgenti(); } };

document.getElementById('btnCreaAgente').onclick = () => {

    let modal = document.createElement('div'); 
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content">
            <h3>➕ NUOVO AGENTE</h3>

                <button id="btnConferma" class="btn-success">CREA</button>
                <button id="btnAnnulla" class="btn-danger">ANNULLA</button>
            </div>

    `;

    document.getElementById('btnConferma').onclick = async () => {

    document.getElementById('btnAnnulla').onclick = () => { 
        modal.remove(); 
    };
};

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>inSAPA - Agenti</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #eef2f5; }
        .header { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; position: sticky; top: 0; z-index: 1000; }
        .logo-rettangolo { width: 300px; height: 80px; background: transparent; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
        .logo-rettangolo img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .nav-box { background: #2c3e50; border-radius: 16px; padding: 10px 20px; }
        .nav-grid { display: flex; gap: 10px; }
        .nav-btn { background: #34495e; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .main-container { display: flex; gap: 20px; padding: 20px; flex-wrap: wrap; }
        .sidebar { width: 320px; background: white; border-radius: 16px; padding: 20px; }
        .content-area { flex: 1; background: white; border-radius: 16px; padding: 20px; }
        button { background: #3498db; color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; width: 100%; margin: 5px 0; }
        .btn-success { background: #27ae60; }
        select, input { width: 100%; padding: 8px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; }
        .scadenze-box { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .articolo-item { border: 1px solid #ddd; border-radius: 8px; padding: 10px; margin-bottom: 10px; cursor: pointer; }
        .articolo-item:hover { background: #fff3cd; }
        .file-status { font-size: 0.7rem; color: green; margin-top: 5px; text-align: center; }
        .debug-box { background: #2c3e50; color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; margin-top: 15px; border-radius: 8px; max-height: 200px; overflow-y: auto; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; border-radius: 16px; padding: 25px; width: 90%; max-width: 350px; text-align: center; }
        .modal-content input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-group-modal { display: flex; gap: 10px; margin-top: 15px; }
        .btn-group-modal button { margin: 0; }
        .version { position: fixed; bottom: 10px; right: 10px; background: #27ae60; color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; z-index: 100; }
        footer { text-align: center; margin: 20px; font-size: 0.7rem; color: #95a5a6; }
        @media (max-width: 768px) { .main-container { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
<div class="header">
    <div id="logoRettangolo" class="logo-rettangolo">
        <img id="logoImmagine" style="display:none;">
        <span id="logoSpan">🏢 LOGO</span>
    </div>
    <div class="nav-box">
        <div class="nav-grid">
            <button class="nav-btn" onclick="window.location.href='contabilita.html'">📊 CONTABILITÀ</button>
            <button class="nav-btn disabled" style="background:#7f8c8d">👥 AGENTI</button>
            <button class="nav-btn" onclick="window.location.href='index.html'">🚪 ESCI</button>
        </div>
    </div>
</div>
<div class="main-container">
    <div class="sidebar">
        <h3>👤 Seleziona Agente</h3>
        <select id="selectAgente">
            <option value="">-- Seleziona --</option>
        </select>
        <button id="btnCreaAgente" class="btn-success">➕ CREA AGENTE</button>
        <button id="btnCaricaFile" class="btn-success">📂 Carica ORD + SCA</button>
        <input type="file" id="fileInput" multiple accept=".txt,.csv">
        <div id="fileStatus" class="file-status"></div>
        <button id="btnRicarica" style="background:#f39c12; color:#2c3e50;">🔄 RICARICA AGENTI</button>
        <div id="debugBox" class="debug-box">🔍 Console debug:<br></div>
    </div>
    <div class="content-area">
        <div id="scadenze"></div>
        <div id="dettaglio"></div>
    </div>
</div>
<footer>Logo: tieni premuto 3 secondi per cambiarlo</footer>
<div class="version">v4.02 - Agenti (Firebase)</div>

<script>
function debugLog(msg) {
    let box = document.getElementById('debugBox');
    if(box) {
        let time = new Date().toLocaleTimeString();
        box.innerHTML += `<div>${time} - ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
        if(box.children.length > 50) box.innerHTML = `<div>${time} - Console pulita</div>`;
    }
    console.log(msg);
}

// ==================== FIREBASE ====================
const firebaseConfig = {
    apiKey: "AIzaSyBAqGSqRE7xfH5YGgPOmTInv24ESU3jkvQ",
    authDomain: "insapa-database.firebaseapp.com",
    projectId: "insapa-database",
    storageBucket: "insapa-database.firebasestorage.app",
    messagingSenderId: "331230245928",
    appId: "1:331230245928:web:2ee43d9209e43c3c89b11d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ==================== VARIABILI ====================
let agentiLista = [];
let agenteCorrente = null;
let datiOrd = [];
let datiSca = [];

// ==================== FUNZIONI AGENTI ====================
async function caricaAgenti() {
    debugLog("📥 Caricamento agenti da Firebase...");
    try {
        const snapshot = await db.collection('agenti_lista').get();
        agentiLista = [];
        snapshot.forEach(doc => agentiLista.push(doc.data()));
        agentiLista.sort((a,b) => a.codice.localeCompare(b.codice));
        debugLog(`✅ Trovati ${agentiLista.length} agenti`);
        aggiornaSelect();
    } catch(e) { debugLog("❌ ERRORE: "+e.message); }
}

function aggiornaSelect() {
    let select = document.getElementById('selectAgente');
    let oldValue = select.value;
    select.innerHTML = '<option value="">-- Seleziona agente --</option>';
    for (let a of agentiLista) {
        let opt = document.createElement('option');
        opt.value = a.codice;
        opt.textContent = `${a.codice} - ${a.nome}`;
        select.appendChild(opt);
    }
    if (oldValue && agentiLista.find(a => a.codice === oldValue)) {
        select.value = oldValue;
    }
    debugLog(`📋 Select: ${select.options.length-1} agenti`);
}

async function selezionaAgente(codice) {
    agenteCorrente = agentiLista.find(a => a.codice === codice);
    if (!agenteCorrente) return;
    debugLog(`👤 Selezionato: ${codice} - ${agenteCorrente.nome}`);
    
    try {
        let ordDoc = await db.collection('agenti_dati').doc(`ord_${codice}`).get();
        let scaDoc = await db.collection('agenti_dati').doc(`sca_${codice}`).get();
        datiOrd = ordDoc.exists ? ordDoc.data().dati : [];
        datiSca = scaDoc.exists ? scaDoc.data().dati : [];
        debugLog(`📊 Dati caricati: ORD ${datiOrd.length} clienti, SCA ${datiSca.length} clienti`);
        document.getElementById('fileStatus').innerHTML = `ORD: ${datiOrd.length} clienti | SCA: ${datiSca.length} clienti`;
        aggiornaClienti();
    } catch(e) { debugLog("❌ ERRORE caricamento dati: "+e.message); }
}

async function salvaDatiAgente() {
    if (!agenteCorrente) return;
    try {
        await db.collection('agenti_dati').doc(`ord_${agenteCorrente.codice}`).set({ dati: datiOrd });
        await db.collection('agenti_dati').doc(`sca_${agenteCorrente.codice}`).set({ dati: datiSca });
        debugLog(`💾 Dati salvati per ${agenteCorrente.codice}`);
    } catch(e) { debugLog("❌ ERRORE salvataggio: "+e.message); }
}

async function creaAgente(codice, nome) {
    if (!codice || !nome) { alert("Inserisci codice e nome!"); return false; }
    if (agentiLista.find(a => a.codice === codice)) { alert("Codice già esistente!"); return false; }
    try {
        await db.collection('agenti_lista').doc(codice).set({ codice, nome });
        debugLog(`✅ Agente ${codice} - ${nome} creato`);
        await caricaAgenti();
        return true;
    } catch(e) { alert("ERRORE: "+e.message); return false; }
}

// ==================== PARSER ORD (VERSIONE FUNZIONANTE) ====================
function parseORD(text) {
    debugLog(`📄 Parsing ORD: ${text.length} caratteri`);
    const lines = text.split(/\r?\n/);
    const clienti = new Map();
    let currentCliente = null;
    const reCliente = /^Cliente\s+:\s+(\d+)\s+(.+?)(?:\s{2,}|$)/;
    const reCoppia = /(\d+(?:,\d+)?)\s+(\d{2}\/\d{2}\/\d{4})/g;
    
    for (let line of lines) {
        line = line.trimEnd();
        if (line === "") continue;
        
        let mCliente = line.match(reCliente);
        if (mCliente) {
            currentCliente = { 
                codice: mCliente[1], 
                ragione: mCliente[2].trim(), 
                articoli: [] 
            };
            clienti.set(currentCliente.codice, currentCliente);
            continue;
        }
        
        if (!currentCliente) continue;
        
        if (line.startsWith("Destinaz.") || line.startsWith("Telefoni") || 
            line.includes("INESISTENTE") || line.includes("ELIMINATO")) continue;
        
        let coppie = [];
        let match;
        while ((match = reCoppia.exec(line)) !== null) {
            let qta = parseFloat(match[1].replace(',', '.'));
            let data = match[2];
            coppie.push({ qta, data, start: match.index, end: match.index + match[0].length });
        }
        
        if (coppie.length === 0) continue;
        
        let firstCoppiaStart = coppie[0].start;
        let descrizioneRaw = line.substring(0, firstCoppiaStart).trim();
        let tokens = descrizioneRaw.split(/\s+/);
        let codice = tokens[0];
        let descrizione = tokens.slice(1).join(" ");
        
        let lastCoppiaEnd = coppie[coppie.length-1].end;
        let afterCoppie = line.substring(lastCoppiaEnd).trim();
        let numTokens = afterCoppie.split(/\s+/);
        let prezzo = 0, sconto1 = 0;
        
        if (numTokens.length >= 2) {
            prezzo = parseFloat(numTokens[0].replace(',', '.'));
            sconto1 = parseFloat(numTokens[1].replace(',', '.'));
        }
        
        coppie.sort((a,b) => new Date(b.data.split('/').reverse().join('-')) - 
                           new Date(a.data.split('/').reverse().join('-')));
        
        currentCliente.articoli.push({ 
            codice, 
            descrizione, 
            coppie, 
            prezzo, 
            sconto1 
        });
    }
    
    debugLog(`✅ ORD parsato: ${clienti.size} clienti`);
    return Array.from(clienti.values());
}

// ==================== PARSER SCA ====================
function parseSCA(text) {
    debugLog(`📄 Parsing SCA: ${text.length} caratteri`);
    const lines = text.split(/\r?\n/);
    const clienti = new Map();
    let currentCliente = null;
    const reCliente = /^CLIENTE:\s+(\d+)\s+(.+?)\s+Saldo\s+[\d\.,]+/;
    const reScadenza = /^(\d{2}\/\d{2}\/\d{4})\s+.*?(\d+)\s+(\d{2}\/\d{2}\/\d{4})\s+Euro\s+([\d\.,]+)/;
    
    for (let line of lines) {
        line = line.trim();
        if (line === "") continue;
        
        let mCliente = line.match(reCliente);
        if (mCliente) {
            currentCliente = { 
                codice: mCliente[1], 
                ragione: mCliente[2].trim(), 
                scadenze: [] 
            };
            clienti.set(currentCliente.codice, currentCliente);
            continue;
        }
        
        if (currentCliente) {
            let mScad = line.match(reScadenza);
            if (mScad) {
                let importoStr = mScad[4].replace(/\./g, '').replace(',', '.');
                currentCliente.scadenze.push({
                    scadenza: mScad[1],
                    numDoc: mScad[2],
                    dataDoc: mScad[3],
                    importo: parseFloat(importoStr)
                });
            }
        }
    }
    
    debugLog(`✅ SCA parsato: ${clienti.size} clienti`);
    return Array.from(clienti.values());
}

// ==================== VISUALIZZAZIONE ====================
function aggiornaClienti() {
    let select = document.getElementById('selectClienteAgenti');
    if (!select) {
        document.getElementById('scadenze').innerHTML = '<div class="scadenze-box"><select id="selectClienteAgenti" style="width:100%"><option value="">-- Seleziona cliente --</option></select></div>';
        select = document.getElementById('selectClienteAgenti');
        select.onchange = () => { mostraScadenze(); mostraDettaglio(); };
    }
    
    let mappa = new Map();
    for (let c of datiOrd) {
        mappa.set(c.codice, { codice: c.codice, ragione: c.ragione, hasScadenze: false, articoli: c.articoli });
    }
    for (let c of datiSca) {
        if (mappa.has(c.codice)) {
            mappa.get(c.codice).hasScadenze = c.scadenze.length > 0;
        } else {
            mappa.set(c.codice, { codice: c.codice, ragione: c.ragione, hasScadenze: c.scadenze.length > 0, articoli: [] });
        }
    }
    
    let lista = Array.from(mappa.values()).sort((a,b) => a.ragione.localeCompare(b.ragione));
    select.innerHTML = '<option value="">-- Seleziona cliente --</option>';
    for (let c of lista) {
        let opt = document.createElement('option');
        opt.value = `${c.codice}|${c.ragione}`;
        let testo = `${c.codice} - ${c.ragione}`;
        if (c.articoli && c.articoli.length > 0) testo += ` [${c.articoli.length}]`;
        opt.textContent = testo;
        if (c.hasScadenze) opt.style.color = '#c0392b';
        select.appendChild(opt);
    }
    debugLog(`📋 Clienti: ${select.options.length-1} clienti nella tendina`);
}

function mostraScadenze() {
    let key = document.getElementById('selectClienteAgenti')?.value;
    if (!key) return;
    let [codice, ragione] = key.split('|');
    let cliente = datiSca.find(c => c.codice === codice);
    let container = document.getElementById('scadenze');
    if (!cliente || !cliente.scadenze.length) {
        container.innerHTML = `<div class="scadenze-box">Nessuna scadenza per ${ragione}</div>`;
        return;
    }
    let html = `<div class="scadenze-box"><h3>📅 Scadenze - ${codice} ${ragione}</h3>
                <table style="width:100%; border-collapse:collapse;">
                <thead><tr style="background:#e9ecef"><th>Scadenza</th><th>N.Doc</th><th>Importo</th></tr></thead><tbody>`;
    for (let s of cliente.scadenze) html += `<tr><td style="white-space:nowrap">${s.scadenza}</td><td>${s.numDoc}</td><td style="text-align:right">${s.importo.toFixed(2)} €</td></tr>`;
    html += `</tbody>}</div>`;
    container.innerHTML = html;
}

function mostraDettaglio() {
    let key = document.getElementById('selectClienteAgenti')?.value;
    if (!key) return;
    let [codice, ragione] = key.split('|');
    let cliente = datiOrd.find(c => c.codice === codice);
    let container = document.getElementById('dettaglio');
    if (!cliente || !cliente.articoli.length) {
        container.innerHTML = `<div class="scadenze-box">Nessun ordine per ${ragione}</div>`;
        return;
    }
    let html = `<div class="scadenze-box"><h3>📋 ORD - ${codice} ${ragione} (${cliente.articoli.length} articoli)</h3>`;
    for (let art of cliente.articoli) {
        let ultimiOrdini = art.coppie.slice(0, 4).map(o => `${o.data} (q.${o.qta})`).join(', ');
        html += `<div class="articolo-item" style="border:1px solid #ddd; border-radius:8px; padding:10px; margin-bottom:10px; cursor:pointer;">
                    <strong>${art.codice} ${art.descrizione}</strong><br>
                    € ${art.prezzo.toFixed(2)} - Sc. ${art.sconto1.toFixed(2)}%<br>
                    <small>📦 Ultimi ordini: ${ultimiOrdini || 'nessuno'}</small>
                </div>`;
    }
    html += `</div>`;
    container.innerHTML = html;
    document.querySelectorAll('.articolo-item').forEach(el => {
        el.onclick = () => {
            alert("Storico dettagliato ordini:\n" + el.querySelector('small')?.innerText);
        };
    });
}

// ==================== EVENTI ====================
document.getElementById('selectAgente').onchange = (e) => { if (e.target.value) selezionaAgente(e.target.value); };
document.getElementById('btnRicarica').onclick = () => caricaAgenti();
document.getElementById('btnCaricaFile').onclick = () => document.getElementById('fileInput').click();

document.getElementById('fileInput').onchange = async (e) => {
    let files = Array.from(e.target.files);
    if (!agenteCorrente) { alert("Seleziona prima un agente!"); return; }
    debugLog(`📁 Caricamento di ${files.length} file`);
    
    let ord = null, sca = null;
    for (let f of files) {
        let text = await f.text();
        let nome = f.name.toLowerCase();
        debugLog(`📄 File: ${nome} (${text.length} caratteri)`);
        
        if (nome.includes('ord') || nome.includes('ordine')) {
            ord = parseORD(text);
            debugLog(`📄 RICONOSCIUTO come ORD: ${nome}`);
        }
        if (nome.includes('sca')) {
            sca = parseSCA(text);
            debugLog(`📄 RICONOSCIUTO come SCA: ${nome}`);
        }
    }
    
    if (ord) {
        datiOrd = ord;
        debugLog(`✅ ORD aggiornato: ${datiOrd.length} clienti`);
    }
    if (sca) {
        datiSca = sca;
        debugLog(`✅ SCA aggiornato: ${datiSca.length} clienti`);
    }
    
    if (!ord && !sca) {
        alert("Nessun file ORD o SCA riconosciuto! I file devono contenere 'ord' o 'sca' nel nome.");
        return;
    }
    
    await salvaDatiAgente();
    aggiornaClienti();
    document.getElementById('fileStatus').innerHTML = `✅ ORD: ${datiOrd.length} clienti | SCA: ${datiSca.length} clienti`;
    alert(`Caricato! ORD: ${datiOrd.length} clienti, SCA: ${datiSca.length} clienti`);
};

// MODALE CREA AGENTE
document.getElementById('btnCreaAgente').onclick = () => {
    let modal = document.createElement('div'); modal.className = 'modal-overlay';
    modal.innerHTML = `<div class="modal-content"><h3>➕ NUOVO AGENTE</h3><label>Codice</label><input type="text" id="nuovoCodice" placeholder="es. 001"><label>Nome</label><input type="text" id="nuovoNome" placeholder="es. Mario Rossi"><div class="btn-group-modal"><button id="btnConferma" class="btn-success">CREA</button><button id="btnAnnulla" class="btn-danger">ANNULLA</button></div></div>`;
    document.body.appendChild(modal);
    document.getElementById('btnConferma').onclick = async () => {
        let cod = document.getElementById('nuovoCodice').value.trim();
        let nom = document.getElementById('nuovoNome').value.trim();
        if (cod && nom) {
            if (await creaAgente(cod, nom)) {
                alert(`Agente ${cod} - ${nom} creato!`);
                modal.remove();
            }
        } else alert("Compila tutti i campi!");
    };
    document.getElementById('btnAnnulla').onclick = () => modal.remove();
};

// ==================== LOGO ====================
function caricaLogo() { let l = localStorage.getItem('logo'); if(l) { document.getElementById('logoImmagine').src = l; document.getElementById('logoImmagine').style.display = 'block'; document.getElementById('logoSpan').style.display = 'none'; } }
function salvaLogo(u) { localStorage.setItem('logo', u); }
function caricaLogoFile() { let inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*'; inp.onchange = e => { let f = e.target.files[0]; if(f){ let r = new FileReader(); r.onload = ev => { let url = ev.target.result; document.getElementById('logoImmagine').src = url; document.getElementById('logoImmagine').style.display = 'block'; document.getElementById('logoSpan').style.display = 'none'; salvaLogo(url); }; r.readAsDataURL(f); } }; inp.click(); }
let logoDiv = document.getElementById('logoRettangolo'); let timer = null;
logoDiv.addEventListener('mousedown', () => { timer = setTimeout(() => { caricaLogoFile(); timer = null; }, 3000); });
logoDiv.addEventListener('mouseup', () => { if(timer) { clearTimeout(timer); timer = null; } });
logoDiv.addEventListener('mouseleave', () => { if(timer) { clearTimeout(timer); timer = null; } });
caricaLogo();

// ==================== AVVIO ====================
caricaAgenti();
debugLog("🚀 App avviata - v4.02");
</script>
</body>
</html>

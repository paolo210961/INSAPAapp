<script>
// Firebase config
const firebaseConfig = {
    apiKey: "AIzaSyBAqGSqRE7xfH5YGgPOmTInv24ESU3jkvQ",
    authDomain: "insapa-database.firebaseapp.com",
    projectId: "insapa-database",
    storageBucket: "insapa-database.firebasestorage.app",
    messagingSenderId: "331230245928",
    appId: "1:331230245928:web:2ee43d9209e43c3c89b11d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let agentiLista = [];
let agenteCorrente = null;
let datiOrd = [];
let datiSca = [];
let clientiUnici = [];
let clienteScadenzeCorrente = null;
let modificheNonSalvate = false;
let linkPrincipale = "", linkSecondario = "";

// ========== NUOVA FUNZIONE: Parser per LIST.txt ==========
function parseListinoLine(line) {
    if (!line.trim() || line.startsWith('===') || line.startsWith('Codice Artic.') || line.startsWith('---') || line.includes('LISTINO ARTICOLI')) return null;
    let cleanLine = line.replace(/\r?\n/, '').trim();
    if (cleanLine.length === 0) return null;
    if (cleanLine.match(/^\\/) || cleanLine === '0,0000' || cleanLine === '0') return null;
    let parts = cleanLine.split(/\s{2,}/);
    if (parts.length < 4) return null;
    let codice = parts[0].trim();
    let idx = 1;
    let ean = '';
    if (parts.length > idx && /^\d{8,14}$/.test(parts[idx].trim())) { ean = parts[idx].trim(); idx++; }
    let stockRaw = (parts.length > idx) ? parts[idx].trim() : '0';
    if (!/^[0-9,]+\s*$/.test(stockRaw.replace(',', ''))) stockRaw = '0';
    idx++;
    let remaining = parts.slice(idx);
    if (remaining.length < 3) return null;
    let umIndex = -1;
    for (let i = 0; i < remaining.length; i++) {
        let token = remaining[i].trim();
        if (/^[A-Z]{2,5}$/.test(token) && token.length <= 5 && token !== 'N.') { umIndex = i; break; }
    }
    if (umIndex === -1) return null;
    let descParts = remaining.slice(0, umIndex);
    let descrizione = descParts.join(' ').trim().replace(/\s+/g, ' ');
    descrizione = descrizione.replace(/N\.\s*$/, '').trim();
    let um = remaining[umIndex].trim();
    let gmRaw = (remaining.length > umIndex + 1) ? remaining[umIndex + 1].trim() : '0';
    let mOrdRaw = (remaining.length > umIndex + 2) ? remaining[umIndex + 2].trim() : '0';
    let ivaRaw = (remaining.length > umIndex + 3) ? remaining[umIndex + 3].trim() : '22';
    if (mOrdRaw === '22' || mOrdRaw === '5' || mOrdRaw === '4') { ivaRaw = mOrdRaw; mOrdRaw = '0'; }
    let gm = parseFloat(gmRaw.replace(',', '.'));
    let mOrd = parseFloat(mOrdRaw.replace(',', '.'));
    let iva = parseInt(ivaRaw);
    if (isNaN(gm)) gm = 0;
    if (isNaN(mOrd)) mOrd = 0;
    if (isNaN(iva)) iva = 22;
    let stock = parseFloat(stockRaw.replace(',', '.'));
    if (isNaN(stock)) stock = 0;
    if (codice.length === 0 || descrizione.length === 0) return null;
    return { codice, ean, stock, descrizione, um, gm, mOrd, iva };
}

function parseListinoFile(content) {
    const lines = content.split(/\r?\n/);
    const items = [];
    for (let line of lines) {
        const parsed = parseListinoLine(line);
        if (parsed) items.push(parsed);
    }
    return items;
}

// ========== NUOVA FUNZIONE: Salvataggio listino su Firebase ==========
async function salvaListinoAgente(codiceAgente, articoliListino) {
    const listinoRef = db.collection('agenti_dati').doc('listino_' + codiceAgente).collection('articoli');
    const batch = db.batch();
    const existing = await listinoRef.get();
    existing.forEach(doc => batch.delete(doc.ref));
    for (let art of articoliListino) {
        const newDoc = listinoRef.doc(art.codice);
        batch.set(newDoc, art);
    }
    await batch.commit();
    console.log(`Listino agente ${codiceAgente} salvato (${articoliListino.length} articoli)`);
}

// ========== MODIFICATA: caricaFileMulti - ora richiede 3 file ==========
function nomeFileCorrispondeMulti(nomeFile, codiceAgente, tipo) {
    let baseName = nomeFile.replace(/\.[a-zA-Z0-9]+$/, '');
    let match = baseName.match(/^([A-Z]+)(\d+)$/i);
    if (!match) return false;
    if (match[1].toUpperCase() !== tipo) return false;
    return parseInt(match[2],10) === parseInt(codiceAgente,10);
}

async function caricaFileMulti(files) {
    if (!agenteCorrente) { alert("Seleziona un agente!"); return false; }
    if (files.length !== 3) { alert("Servono ESATTAMENTE 3 file: ORDxx.txt, SCAxx.txt, LISTxx.txt"); return false; }
    let codAgente = agenteCorrente.codice;
    let trovati = { ord: false, sca: false, list: false };
    let ordText = null, scaText = null, listText = null;
    let errori = [];
    for (let file of files) {
        let nome = file.name;
        if (nomeFileCorrispondeMulti(nome, codAgente, 'ORD')) { trovati.ord = true; ordText = await file.text(); }
        else if (nomeFileCorrispondeMulti(nome, codAgente, 'SCA')) { trovati.sca = true; scaText = await file.text(); }
        else if (nomeFileCorrispondeMulti(nome, codAgente, 'LIST')) { trovati.list = true; listText = await file.text(); }
        else errori.push(nome);
    }
    if (errori.length) { alert("FILE NON VALIDI: " + errori.join(', ')); return false; }
    if (!trovati.ord || !trovati.sca || !trovati.list) { alert("FILE MANCANTI: sono richiesti ORD" + codAgente + ".txt, SCA" + codAgente + ".txt, LIST" + codAgente + ".txt"); return false; }
    
    let nuoviOrd = parseORD(ordText);
    let nuoviSca = parseSCA(scaText);
    datiOrd = nuoviOrd;
    datiSca = nuoviSca;
    await salvaDatiAgente();
    
    let listinoArticoli = parseListinoFile(listText);
    if (listinoArticoli.length === 0) { alert("Il file LIST.txt non contiene articoli validi."); return false; }
    await salvaListinoAgente(codAgente, listinoArticoli);
    
    aggiornaClienti();
    document.getElementById('fileStatusInline').innerHTML = `ORD:${datiOrd.length} SCA:${datiSca.length} LIST:${listinoArticoli.length}`;
    alert(`Caricamento completato!\nORD: ${datiOrd.length} clienti\nSCA: ${datiSca.length} clienti\nLIST: ${listinoArticoli.length} articoli`);
    return true;
}

// ========== NUOVA FUNZIONE: mostra listino in modale ==========
async function mostraListino() {
    if (!agenteCorrente) { alert("Seleziona prima un agente."); return; }
    const codice = agenteCorrente.codice;
    const listinoRef = db.collection('agenti_dati').doc('listino_' + codice).collection('articoli');
    const snapshot = await listinoRef.get();
    if (snapshot.empty) { alert("Nessun listino trovato per questo agente. Caricare prima il file LIST.txt."); return; }
    let articoli = [];
    snapshot.forEach(doc => articoli.push(doc.data()));
    articoli.sort((a,b) => a.codice.localeCompare(b.codice));
    
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content" style="max-width:1200px;">
            <h3>📋 LISTINO ARTICOLI - Agente ${codice}</h3>
            <div class="listino-search"><input type="text" id="searchListino" placeholder="Cerca per codice o descrizione..."></div>
            <div style="overflow-x:auto;"><table class="listino-table" id="listinoTable"><thead><tr><th>Codice</th><th>EAN</th><th>Stock</th><th>Descrizione</th><th>UM</th><th>Prezzo (GM)</th><th>Min.Ord</th><th>Iva%</th></tr></thead><tbody id="listinoBody"></tbody>}</div>
            <div class="btn-group-modal"><button id="closeListinoBtn" class="btn-primary">CHIUDI</button></div>
        </div>
    `;
    document.body.appendChild(modal);
    
    function renderListino(filter='') {
        const filtered = articoli.filter(a => a.codice.toLowerCase().includes(filter) || a.descrizione.toLowerCase().includes(filter));
        const tbody = document.getElementById('listinoBody');
        if (!tbody) return;
        if (filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="8">Nessun articolo trovato</td></tr>'; return; }
        tbody.innerHTML = filtered.map(a => `
            <tr>
                <td>${escapeHtml(a.codice)}</td>
                <td>${escapeHtml(a.ean || '—')}</td>
                <td>${a.stock.toFixed(4).replace('.',',')}</td>
                <td>${escapeHtml(a.descrizione)}</td>
                <td>${escapeHtml(a.um)}</td>
                <td>${a.gm.toFixed(2)} €</td>
                <td>${a.mOrd}</td>
                <td>${a.iva}%</td>
            </tr>
        `).join('');
    }
    renderListino();
    const searchInput = document.getElementById('searchListino');
    searchInput.addEventListener('input', (e) => renderListino(e.target.value.toLowerCase()));
    document.getElementById('closeListinoBtn').onclick = () => modal.remove();
}

// ========== FUNZIONI ORIGINALI (parseORD, parseSCA, ecc.) ==========
function parseORD(text) { 
    const lines = text.split(/\r?\n/);
    const clienti = new Map();
    let currentCliente = null;
    const reCliente = /^Cliente\s+:\s+(\d+)\s+(.+?)(?:\s{2,}|$)/;
    const reCoppia = /(\d+(?:,\d+)?)\s+(\d{2}\/\d{2}\/\d{4})/g;
    for (let line of lines) {
        line = line.trimEnd();
        if (line === "") continue;
        let mCliente = line.match(reCliente);
        if (mCliente) { 
            currentCliente = { codice: mCliente[1].toString(), ragione: mCliente[2].trim(), articoli: [] }; 
            clienti.set(currentCliente.codice, currentCliente); 
            continue; 
        }
        if (!currentCliente) continue;
        if (line.startsWith("Destinaz.") || line.startsWith("Telefoni") || line.includes("INESISTENTE") || line.includes("ELIMINATO")) continue;
        let coppie = [], match;
        while ((match = reCoppia.exec(line)) !== null) { let qta = parseFloat(match[1].replace(',', '.')); let data = match[2]; coppie.push({ qta, data, start: match.index, end: match.index + match[0].length }); }
        if (coppie.length === 0) continue;
        let firstCoppiaStart = coppie[0].start;
        let descrizioneRaw = line.substring(0, firstCoppiaStart).trim();
        let tokens = descrizioneRaw.split(/\s+/);
        let codice = tokens[0].toString();
        let descrizione = tokens.slice(1).join(" ");
        let lastCoppiaEnd = coppie[coppie.length-1].end;
        let afterCoppie = line.substring(lastCoppiaEnd).trim();
        let numTokens = afterCoppie.split(/\s+/);
        let prezzo = 0, sconto1 = 0;
        if (numTokens.length >= 2) { prezzo = parseFloat(numTokens[0].replace(',', '.')); sconto1 = parseFloat(numTokens[1].replace(',', '.')); }
        coppie.sort((a,b) => new Date(b.data.split('/').reverse().join('-')) - new Date(a.data.split('/').reverse().join('-')));
        currentCliente.articoli.push({ codice, descrizione, coppie, prezzo, sconto1 });
    }
    return Array.from(clienti.values());
}

function parseSCA(text) { 
    const lines = text.split(/\r?\n/);
    const clienti = new Map();
    let currentCliente = null;
    const reCliente = /^CLIENTE:\s+(\d+)\s+(.+?)\s+Saldo\s+[\d\.,]+-?/;
    for (let lineOriginale of lines) {
        let line = lineOriginale.replace(/\uFEFF/g, '').replace(/\f/g, ' ').replace(/\t/g, ' ').replace(/\*/g, ' ').trim();
        if (!line) continue;
        if (/^=+/.test(line)) continue;
        if (/^-+/.test(line)) continue;
        if (line.startsWith("Scadenza")) continue;
        if (line.startsWith("VOSTRO DARE")) continue;
        if (line.startsWith("TOTALE") || line.startsWith("TOT.")) continue;
        if (line.startsWith("AGENTE:")) continue;
        if (line.startsWith("TUTTE")) continue;
        if (line.startsWith("inSAPA")) continue;
        if (line.startsWith("STAMPA")) continue;
        let mCliente = line.match(reCliente);
        if (mCliente) {
            let codice = mCliente[1].toString();
            let ragione = mCliente[2].trim();
            currentCliente = { codice, ragione, scadenze: [] };
            clienti.set(codice, currentCliente);
            continue;
        }
        if (currentCliente) {
            line = line.replace(/\s+/g, ' ').trim();
            let parts = line.split(' ');
            let euroIndex = parts.findIndex(p => p.toLowerCase() === "euro");
            if (euroIndex === -1) continue;
            let scadenza = parts[0] || '';
            if (!/^\d{2}\/\d{2}\/\d{4}$/.test(scadenza)) continue;
            let importoStr = parts[euroIndex + 1] || '0';
            let importo = convertiImportoItaliano(importoStr);
            let dataDoc = parts[euroIndex - 1] || '';
            let numDoc = parts[euroIndex - 2] || '';
            let descrizione = parts.slice(1, euroIndex - 2).join(" ");
            currentCliente.scadenze.push({ scadenza, descrizione, numDoc, dataDoc, importo });
        }
    }
    return Array.from(clienti.values());
}

function convertiImportoItaliano(importoStr) {
    if (!importoStr) return 0;
    let isNegative = importoStr.endsWith('-');
    if (isNegative) importoStr = importoStr.slice(0, -1);
    let importoPulito = importoStr.replace(/\./g, '').replace(',', '.');
    let importo = parseFloat(importoPulito);
    if (isNegative && !isNaN(importo)) importo = -importo;
    return isNaN(importo) ? 0 : importo;
}

async function salvaDatiAgente() { 
    if (!agenteCorrente) return;
    try {
        const ordRef = db.collection('agenti_dati').doc('ord_' + agenteCorrente.codice).collection('clienti');
        const batch = db.batch();
        const vecchiOrd = await ordRef.get();
        vecchiOrd.forEach(doc => batch.delete(doc.ref));
        for (let cliente of datiOrd) { const docRef = ordRef.doc(cliente.codice.toString()); batch.set(docRef, { codice: cliente.codice, ragione: cliente.ragione, articoli: cliente.articoli }); }
        const scaRef = db.collection('agenti_dati').doc('sca_' + agenteCorrente.codice).collection('clienti');
        const vecchiSca = await scaRef.get();
        vecchiSca.forEach(doc => batch.delete(doc.ref));
        for (let cliente of datiSca) { const docRef = scaRef.doc(cliente.codice.toString()); batch.set(docRef, { codice: cliente.codice, ragione: cliente.ragione, scadenze: cliente.scadenze }); }
        await batch.commit();
        resetModificheNonSalvate();
        return true;
    } catch(e) { alert("Errore salvataggio: "+e.message); return false; }
}

function aggiornaClienti() {
    let mappa = new Map();
    for (let c of datiOrd) {
        let codiceNorm = c.codice.toString();
        mappa.set(codiceNorm, { codice: codiceNorm, ragione: c.ragione, hasScadenze: false, scadenze: [], ordini: c.articoli });
    }
    for (let c of datiSca) {
        let codiceNormalizzato = c.codice.toString();
        let match = mappa.get(codiceNormalizzato);
        if (match) { match.hasScadenze = true; match.scadenze = c.scadenze; }
        else { mappa.set(codiceNormalizzato, { codice: codiceNormalizzato, ragione: c.ragione, hasScadenze: true, scadenze: c.scadenze, ordini: [] }); }
    }
    clientiUnici = Array.from(mappa.values());
    filtraClienti();
}

    clientiFiltrati.sort((a,b) => { let aHas = a.hasScadenze && a.scadenze.length; let bHas = b.hasScadenze && b.scadenze.length; if (aHas && !bHas) return -1; if (!aHas && bHas) return 1; return a.ragione.localeCompare(b.ragione); });
    let select = document.getElementById('selectClienteAgenti');
    select.innerHTML = '<option value="">-- Seleziona cliente --</option>';
    for (let c of clientiFiltrati) {
        let opt = document.createElement('option');
        opt.value = c.codice;

        if (hasScad) { opt.style.color = '#c0392b'; opt.style.fontWeight = 'bold'; opt.textContent = "[R] " + c.codice + " - " + c.ragione + " (" + c.scadenze.length + " scad.)"; }

}

function apriModaleOrdine(cliente) {
    if (!cliente) { alert("Seleziona un cliente prima di compilare l'ordine!"); return; }

        let dataB = b.coppie && b.coppie.length ? new Date(b.coppie[0].data.split('/').reverse().join('-')).getTime() : 0;
        return dataB - dataA;
    });
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    const isDesktopDevice = window.matchMedia("(pointer: fine)").matches && window.innerWidth > 768;
    const pulsanteTesto = isDesktopDevice ? "🖨️ STAMPA PDF" : "📧 INVIA EMAIL";
    modal.innerHTML = `
        <div class="modal-content">
            <h3>📝 ORDINE DA CLIENTE</h3>
            <div class="cliente-info-modale"><p><strong>Codice:</strong> ${cliente.codice}</p><p><strong>Ragione Sociale:</strong> ${cliente.ragione}</p></div>
            <div class="ricerca-articolo-ordine"><input type="text" id="ricercaArticoloOrdine" placeholder="🔍 Cerca articolo per codice o descrizione..."></div>
            <div class="lista-articoli-ordine" id="listaArticoliOrdine"></div>
            <div class="btn-group-modal"><button id="btnConfermaOrdine" class="btn-success">${pulsanteTesto}</button><button id="btnAnnullaOrdine" class="btn-primary">ANNULLA</button></div>
        </div>
    `;
    document.body.appendChild(modal);
    let quantitaInputs = {};
    function renderListaArticoliOrdine(searchText = '') {
        const container = document.getElementById('listaArticoliOrdine');
        let filtrati = articoliOrdinati.filter(art => art.codice.toLowerCase().includes(searchText) || art.descrizione.toLowerCase().includes(searchText));
        if (filtrati.length === 0) { container.innerHTML = '<p style="text-align:center; color:#999;">Nessun articolo trovato</p>'; return; }
        let html = '';
        for (let art of filtrati) {
            html += `
                <div class="ordine-articolo-item" data-codice="${art.codice}">
                    <div class="ordine-articolo-info"><div class="ordine-articolo-codice">${art.codice}</div><div class="ordine-articolo-desc">${art.descrizione}</div></div>
                    <div class="ordine-articolo-qta"><label>Quantità:</label><input type="number" id="qta_${art.codice.replace(/[^a-zA-Z0-9]/g, '_')}" min="0" step="1" style="text-align:center;"></div>
                </div>
            `;
        }
        container.innerHTML = html;
        for (let art of filtrati) {
            const inputId = `qta_${art.codice.replace(/[^a-zA-Z0-9]/g, '_')}`;
            const input = document.getElementById(inputId);
            if (input) {
                if (quantitaInputs[art.codice] === undefined) quantitaInputs[art.codice] = 0;
                input.value = '';
                input.placeholder = '0';
                input.addEventListener('blur', function() {
                    let val = this.value.trim();
                    if (val === '' || val === '0') { this.value = ''; quantitaInputs[art.codice] = 0; }
                    else { let num = parseInt(val,10); if (isNaN(num) || num < 0) num = 0; this.value = num; quantitaInputs[art.codice] = num; }
                });
                input.addEventListener('input', function() {
                    let val = this.value.trim();
                    quantitaInputs[art.codice] = (val === '') ? 0 : (parseInt(val,10) || 0);
                });
            }
        }
    }
    renderListaArticoliOrdine();
    document.getElementById('ricercaArticoloOrdine').addEventListener('input', (e) => renderListaArticoliOrdine(e.target.value.toLowerCase()));
    document.getElementById('btnConfermaOrdine').onclick = () => {
        let articoliConQta = [];
        for (let art of articoliOrdinati) {
            let qta = quantitaInputs[art.codice] || 0;
            if (qta > 0) articoliConQta.push({ codice: art.codice, descrizione: art.descrizione, quantita: qta });
        }
        if (articoliConQta.length === 0) { alert("Inserisci almeno una quantità maggiore di zero!"); return; }
        if (isDesktopDevice) {
            const htmlOrdine = generaHtmlOrdine(cliente, articoliConQta);

            let corpo = `ORDINE CLIENTE: ${cliente.codice} - ${cliente.ragione}\n\nARTICOLI ORDINATI:\n`;

            corpo += `Ordine generato da inSAPA Agenti il ${new Date().toLocaleDateString('it-IT')}`;
            window.location.href = `mailto:?subject=${encodeURIComponent(soggetto)}&body=${encodeURIComponent(corpo)}`;
        }

    };
    document.getElementById('btnAnnullaOrdine').onclick = () => modal.remove();

async function caricaAgenti() {
    try {
        const snapshot = await db.collection('agenti_lista').get();
        agentiLista = [];
        snapshot.forEach(doc => { let data = doc.data(); data.codice = data.codice.toString(); agentiLista.push(data); });
        agentiLista.sort((a,b) => a.codice.localeCompare(b.codice));
        let select = document.getElementById('selectAgente');
        let oldValue = select.value;
        select.innerHTML = '<option value="">-- Seleziona agente --</option>';
        for (let a of agentiLista) { let opt = document.createElement('option'); opt.value = a.codice; opt.textContent = a.codice+" - "+a.nome; select.appendChild(opt); }
        const ultimoAgente = localStorage.getItem('ultimoAgenteSelezionato');
        if (ultimoAgente && agentiLista.find(a => a.codice === ultimoAgente)) { document.getElementById('selectAgente').value = ultimoAgente; selezionaAgente(ultimoAgente); }
        else if (oldValue && agentiLista.find(a => a.codice === oldValue)) { select.value = oldValue; selezionaAgente(oldValue); }
    } catch(e) { alert("Errore caricamento agenti: "+e.message); }
}

async function selezionaAgente(codice) {
    agenteCorrente = agentiLista.find(a => a.codice === codice);
    if (!agenteCorrente) return;
    localStorage.setItem('ultimoAgenteSelezionato', codice);
    try {
        const ordSnapshot = await db.collection('agenti_dati').doc('ord_'+codice).collection('clienti').get();
        datiOrd = []; ordSnapshot.forEach(doc => datiOrd.push(doc.data()));
        const scaSnapshot = await db.collection('agenti_dati').doc('sca_'+codice).collection('clienti').get();
        datiSca = []; scaSnapshot.forEach(doc => datiSca.push(doc.data()));
        document.getElementById('fileStatusInline').innerHTML = `ORD:${datiOrd.length} SCA:${datiSca.length}`;
        aggiornaClienti();
        document.getElementById('cercaCliente').value = '';
        document.getElementById('cercaArticoloInline').value = '';
        document.getElementById('dettaglioAgenti').innerHTML = '';
        resetModificheNonSalvate();
    } catch(e) { console.error(e); }
}

    const logoImg = document.getElementById('logoImmagine');
    const logoSpan = document.getElementById('logoSpan');
    fetch('icons/logo.jpg').then(r => { if (r.ok) { logoImg.src = 'icons/logo.jpg'; logoImg.style.display = 'block'; logoSpan.style.display = 'none'; } else { fetch('icons/logo.png').then(r2 => { if (r2.ok) { logoImg.src = 'icons/logo.png'; logoImg.style.display = 'block'; logoSpan.style.display = 'none'; } else { logoImg.style.display = 'none'; logoSpan.style.display = 'block'; } }).catch(() => { logoImg.style.display = 'none'; logoSpan.style.display = 'block'; }); } }).catch(() => { logoImg.style.display = 'none'; logoSpan.style.display = 'block'; });
}

function showToast(msg, isErr) {
    const toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.style.backgroundColor = isErr ? '#e74c3c' : '#27ae60';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => { if(toast.parentNode) toast.remove(); }, 3000);
}

const logoDivElemAgenti = document.getElementById('logoRettangolo');
let lastTapAgenti = 0;
logoDivElemAgenti.addEventListener('click', (e) => {
    const now = new Date().getTime();
    const tapLength = now - lastTapAgenti;
    if (tapLength < 300 && tapLength > 0) { e.stopPropagation(); apriLinkSecondario(); lastTapAgenti = 0; }
    else { lastTapAgenti = now; setTimeout(() => { if (lastTapAgenti !== 0 && (new Date().getTime() - lastTapAgenti) > 300) { apriLinkPrincipale(); lastTapAgenti = 0; } }, 300); }
});

caricaLogoSaved();

document.getElementById('hamburgerBtn').addEventListener('click', (e) => { e.stopPropagation(); document.getElementById('navGrid').classList.toggle('open'); });
document.addEventListener('click', (e) => { const nav = document.getElementById('navGrid'); if (!nav.contains(e.target) && e.target !== document.getElementById('hamburgerBtn')) nav.classList.remove('open'); });

document.getElementById('btnCaricaFileMulti').onclick = () => document.getElementById('fileInput').click();
document.getElementById('btnListinoMobile').onclick = () => mostraListino();
document.getElementById('btnMostraListinoPc').onclick = () => mostraListino();
document.getElementById('btnCompilaOrdine').onclick = () => { let c = document.getElementById('selectClienteAgenti').value; if(c) apriModaleOrdine(clientiUnici.find(cl=>cl.codice===c)); else alert("Seleziona un cliente"); };
document.getElementById('fileInput').onchange = async (e) => { await caricaFileMulti(Array.from(e.target.files)); e.target.value = ''; };
document.getElementById('selectAgente').onchange = (e) => { if(e.target.value) selezionaAgente(e.target.value); };
document.getElementById('selectClienteAgenti').onchange = (e) => { if(e.target.value) mostraDettaglioCliente(e.target.value); };
document.getElementById('cercaCliente').oninput = () => filtraClienti();
document.getElementById('cercaArticoloInline').oninput = () => { let c = document.getElementById('selectClienteAgenti').value; if(c) filtraArticoli(); };

caricaLinkDaFile();
caricaAgenti();
</script>

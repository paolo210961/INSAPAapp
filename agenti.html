    <style>

        .nav-btn.disabled { background: #ecf0f1; color: #95a5a6; cursor: not-allowed; opacity: 0.8; }
        .action-group { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .action-group label { font-weight: bold; color: #2c3e50; margin-right: 5px; }
        .action-group select, .action-group button, .action-group input { margin: 0; width: auto; padding: 6px 12px; }

        .btn-primary { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-ordine-header { background: #e67e22; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; }
        .btn-listino-verde { background: #27ae60; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; }

        /* STILE CAMPO NOTE PC */
        .note-field-container {

            border: 1px solid #dee2e6;

            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .note-field-label {

<script>
// Firebase configuration
const firebaseConfig = {
    apiKey: "AIzaSyBAqGSqRE7xfH5YGgPOmTInv24ESU3jkvQ",
    authDomain: "insapa-database.firebaseapp.com",
    projectId: "insapa-database",
    storageBucket: "insapa-database.firebasestorage.app",
    messagingSenderId: "331230245928",
    appId: "1:331230245928:web:2ee43d9209e43c3c89b11d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let agentiLista = [];
let agenteCorrente = null;
let datiOrd = [];
let datiSca = [];
let clientiUnici = [];
let clienteScadenzeCorrente = null;
let modificheNonSalvate = false;
let notaCorrente = "";

let linkPrincipale = "", linkSecondario = "";

// Gestione modali minimizzabili
let modaliAperti = [];
let nextModalId = 1;

// ------------------ PERSISTENZA ORDINE IN sessionStorage ------------------
const STORAGE_KEY = "ordineInCorso";

function salvaOrdineInStorage(id, cliente, articoli, qMap, nota) {
    if (!cliente) return;
    const ordineData = {
        id: id,
        cliente: {
            codice: cliente.codice,
            ragione: cliente.ragione,
            scadenze: cliente.scadenze ? cliente.scadenze.map(s => ({ ...s })) : []
        },
        articoli: articoli.map(a => ({
            codice: a.codice,
            descrizione: a.descrizione,
            coppie: a.coppie ? a.coppie.map(c => ({ ...c })) : [],
            prezzo: a.prezzo,
            sconto1: a.sconto1
        })),
        qMap: { ...qMap },
        nota: nota
    };
    sessionStorage.setItem(STORAGE_KEY, JSON.stringify(ordineData));
}

function rimuoviOrdineDaStorage() {
    sessionStorage.removeItem(STORAGE_KEY);
}

function caricaOrdineDaStorage() {
    const saved = sessionStorage.getItem(STORAGE_KEY);
    if (!saved) return null;
    try {
        const data = JSON.parse(saved);
        if (!data.cliente || !data.articoli) return null;
        const cliente = {
            codice: data.cliente.codice,
            ragione: data.cliente.ragione,
            scadenze: data.cliente.scadenze || [],
            ordini: data.articoli
        };
        return {
            cliente: cliente,
            articoli: data.articoli,
            qMap: data.qMap || {},
            idSalvato: data.id,
            nota: data.nota || ""
        };
    } catch(e) {
        console.error("Errore nel recupero dell'ordine salvato", e);
        return null;
    }
}

function aggiungiBarrettaMinimizzata(id, titolo) {
    const container = document.getElementById('minimizedBarContainer');
    if (!container) return;
    if (document.getElementById(`minimized-bar-${id}`)) return;
    const bar = document.createElement('div');
    bar.className = 'minimized-bar';
    bar.id = `minimized-bar-${id}`;
    bar.innerHTML = `<span class="bar-title">${titolo}</span><button class="bar-restore" data-id="${id}">↑</button>`;
    bar.onclick = (e) => { if (!e.target.classList.contains('bar-restore')) ripristinaModale(id); };
    bar.querySelector('.bar-restore').onclick = (e) => { e.stopPropagation(); ripristinaModale(id); };
    container.appendChild(bar);
}

function rimuoviBarrettaMinimizzata(id) {
    const bar = document.getElementById(`minimized-bar-${id}`);
    if (bar) bar.remove();
}

function minimizzaModale(id) {
    const modale = modaliAperti.find(m => m.id === id);
    if (!modale || modale.minimizzato) return;
    if (modale.modalElement) modale.modalElement.style.display = 'none';
    let titolo = modale.tipo === 'ordine' ? '📝 Ordine in corso' : '📋 Listino';
    aggiungiBarrettaMinimizzata(id, titolo);
    modale.minimizzato = true;
    
    if (modale.tipo === 'ordine' && modale.cliente && modale.articoli && modale.qMap) {
        salvaOrdineInStorage(id, modale.cliente, modale.articoli, modale.qMap, modale.nota || "");
    }
}

function ripristinaModale(id) {
    const modale = modaliAperti.find(m => m.id === id);
    if (!modale) return;
    if (modale.modalElement) modale.modalElement.style.display = 'flex';
    rimuoviBarrettaMinimizzata(id);
    modale.minimizzato = false;
    if (modale.tipo === 'ordine') {
        rimuoviOrdineDaStorage();
    }
}

function chiudiModale(id) {
    const modale = modaliAperti.find(m => m.id === id);
    if (!modale) return;
    rimuoviBarrettaMinimizzata(id);
    if (modale.modalElement && modale.modalElement.parentNode) modale.modalElement.remove();
    const index = modaliAperti.findIndex(m => m.id === id);
    if (index !== -1) modaliAperti.splice(index, 1);
    if (modale.tipo === 'ordine') {
        rimuoviOrdineDaStorage();
    }
}

async function salvaDatiAgente() {
    if (!agenteCorrente) return;
    try {
        const ordRef = db.collection('agenti_dati').doc('ord_' + agenteCorrente.codice).collection('clienti');
        const batch = db.batch();
        const oldOrd = await ordRef.get();
        oldOrd.forEach(doc => batch.delete(doc.ref));
        for (let cl of datiOrd) { batch.set(ordRef.doc(cl.codice.toString()), { codice: cl.codice, ragione: cl.ragione, articoli: cl.articoli }); }
        const scaRef = db.collection('agenti_dati').doc('sca_' + agenteCorrente.codice).collection('clienti');
        const oldSca = await scaRef.get();
        oldSca.forEach(doc => batch.delete(doc.ref));
        for (let cl of datiSca) { batch.set(scaRef.doc(cl.codice.toString()), { codice: cl.codice, ragione: cl.ragione, scadenze: cl.scadenze }); }
        await batch.commit();
        await pulisciVecchiDocumentiMonolitici(agenteCorrente.codice);
        document.getElementById('fileStatusInline').innerHTML = "OK ORD: "+datiOrd.length+" | SCA: "+datiSca.length;
        resetModificheNonSalvate();
        showToast("Dati salvati!");
        return true;
    } catch(e) { alert("Errore salvataggio: "+e.message); return false; }
}

function convertiImportoItaliano(s) {
    if (!s) return 0;
    let neg = s.endsWith('-');
    if (neg) s = s.slice(0,-1);
    let num = parseFloat(s.replace(/\./g,'').replace(',','.'));
    if (neg && !isNaN(num)) num = -num;
    return isNaN(num) ? 0 : num;
}

function parseORD(text) {
    const lines = text.split(/\r?\n/);
    const clienti = new Map();
    let curr = null;
    const reCliente = /^Cliente\s+:\s+(\d+)\s+(.+?)(?:\s{2,}|$)/;
    const reCoppia = /(\d+(?:,\d+)?)\s+(\d{2}\/\d{2}\/\d{4})/g;
    for (let line of lines) {
        line = line.trimEnd();
        if (!line) continue;
        let m = line.match(reCliente);
        if (m) { curr = { codice: m[1].toString(), ragione: m[2].trim(), articoli: [] }; clienti.set(curr.codice, curr); continue; }
        if (!curr) continue;
        if (line.startsWith("Destinaz.") || line.startsWith("Telefoni") || line.includes("INESISTENTE") || line.includes("ELIMINATO")) continue;
        let coppie = [], match;
        while ((match = reCoppia.exec(line)) !== null) { let qta = parseFloat(match[1].replace(',','.')); let data = match[2]; coppie.push({ qta, data, start: match.index, end: match.index+match[0].length }); }
        if (!coppie.length) continue;
        let first = coppie[0].start;
        let descRaw = line.substring(0, first).trim();
        let tokens = descRaw.split(/\s+/);
        let codice = tokens[0];
        let descrizione = tokens.slice(1).join(" ");
        let lastEnd = coppie[coppie.length-1].end;
        let after = line.substring(lastEnd).trim().split(/\s+/);
        let prezzo = 0, sconto1 = 0;
        if (after.length >= 2) { prezzo = parseFloat(after[0].replace(',','.')); sconto1 = parseFloat(after[1].replace(',','.')); }
        coppie.sort((a,b) => new Date(b.data.split('/').reverse().join('-')) - new Date(a.data.split('/').reverse().join('-')));
        curr.articoli.push({ codice, descrizione, coppie, prezzo, sconto1 });
    }
    return Array.from(clienti.values());
}

function parseSCA(text) {
    const lines = text.split(/\r?\n/);
    const clienti = new Map();
    let curr = null;
    const reCliente = /^CLIENTE:\s+(\d+)\s+(.+?)\s+Saldo\s+[\d\.,]+-?/;
    for (let orig of lines) {
        let line = orig.replace(/\uFEFF/g,'').replace(/\f/g,' ').replace(/\t/g,' ').replace(/\*/g,' ').trim();
        if (!line || /^=+/.test(line) || /^-+/.test(line) || line.startsWith("Scadenza") || line.startsWith("VOSTRO DARE") || line.startsWith("TOTALE") || line.startsWith("TOT.") || line.startsWith("AGENTE:") || line.startsWith("TUTTE") || line.startsWith("inSAPA") || line.startsWith("STAMPA")) continue;
        let m = line.match(reCliente);
        if (m) { curr = { codice: m[1].toString(), ragione: m[2].trim(), scadenze: [] }; clienti.set(curr.codice, curr); continue; }
        if (curr) {
            let parts = line.replace(/\s+/g,' ').split(' ');
            let euroIdx = parts.findIndex(p => p.toLowerCase() === "euro");
            if (euroIdx === -1) continue;
            let scadenza = parts[0];
            if (!/^\d{2}\/\d{2}\/\d{4}$/.test(scadenza)) continue;
            let importo = convertiImportoItaliano(parts[euroIdx+1] || '0');
            let dataDoc = parts[euroIdx-1] || '';
            let numDoc = parts[euroIdx-2] || '';
            let descrizione = parts.slice(1, euroIdx-2).join(" ");
            curr.scadenze.push({ scadenza, descrizione, numDoc, dataDoc, importo });
        }
    }
    return Array.from(clienti.values());
}

                    <button id="modalBtnLink2_${id}" class="modal-link-btn">🔗 Link-02</button>
                </div>
                <div class="ricerca-articolo-ordine">
                    <input type="text" id="ricercaOrd_${id}" placeholder="🔍 Cerca articolo per codice o descrizione...">
                </div>
                <div class="tabella-articoli-container" id="tabellaContainer_${id}">
                    <table class="ordine-tabella" id="tabellaOrdine_${id}">
                        <thead><tr><th>Codice</th><th>Descrizione</th><th>Ultimo acquisto</th><th style="text-align:center">Quantità</th></tr></thead>
                        <tbody id="tabellaBody_${id}"></tbody>
                    </table>
                </div>
                <div class="btn-group-modal">
                    <button id="btnConferma_${id}" class="btn-success">${btnText}</button>
                    <button id="btnApriListino_${id}" class="btn-primary">📋 APRI LISTINO</button>
                </div>
            </div>
        </div>
    `;
    document.body.appendChild(modalDiv);
    
    let qMap = qMapPrestored ? { ...qMapPrestored } : {};
    modaliAperti.push({ id, tipo: 'ordine', modalElement: modalDiv, minimizzato: false, cliente, articoli, qMap, nota: notaCorrente });
    
    // Eventi per i pulsanti Link e NOTE
    document.getElementById(`modalBtnLink1_${id}`).onclick = () => apriLink(1);
    document.getElementById(`modalBtnLink2_${id}`).onclick = () => apriLink(2);
    document.getElementById(`modalBtnNote_${id}`).onclick = () => apriModaleNote();
    
    function renderTabella(search = '') {
        const tbody = document.getElementById(`tabellaBody_${id}`);
        let filtered = articoli;
        if (search) {
            const low = search.toLowerCase();
            filtered = articoli.filter(a => a.codice.toLowerCase().includes(low) || a.descrizione.toLowerCase().includes(low));
        }
        if (!filtered.length) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px;">Nessun articolo trovato</td></tr>';
            return;
        }
        let html = '';
        for (let a of filtered) {
            const ultimo = calcolaUltimaDataArticolo(a);
            const ultimoTesto = ultimo ? ultimo.data : 'Mai acquistato';
            const inputId = `qta_${id}_${a.codice.replace(/[^a-zA-Z0-9]/g, '_')}`;
            const valoreCorrente = (qMap[a.codice] !== undefined && qMap[a.codice] !== null) ? qMap[a.codice] : '';
            html += `
                <tr>
                    <td class="codice-col">${escapeHtml(a.codice)}</td>
                    <td class="descrizione-col">${escapeHtml(a.descrizione)}</td>
                    <td style="font-size:0.75rem; color:#666;">${ultimoTesto}</td>
                    <td style="text-align:center">
                        <input type="number" id="${inputId}" min="0" step="1" value="${valoreCorrente}" placeholder="0" style="text-align:center;">
                    </td>
                </tr>
            `;
        }
        tbody.innerHTML = html;
        for (let a of filtered) {
            const inputId = `qta_${id}_${a.codice.replace(/[^a-zA-Z0-9]/g, '_')}`;
            const input = document.getElementById(inputId);
            if (input) {
                if (qMap[a.codice] === undefined) qMap[a.codice] = 0;
                input.onfocus = () => { if (input.value === '0') input.value = ''; };
                input.onblur = () => {
                    let v = input.value.trim();
                    if (v === '' || v === '0') { input.value = ''; qMap[a.codice] = 0; }
                    else { let n = parseInt(v,10); if (isNaN(n) || n<0) n=0; input.value = n; qMap[a.codice] = n; }
                };
                input.oninput = () => {
                    let v = input.value.trim();
                    if (v === '') qMap[a.codice] = 0;
                    else { let n = parseInt(v,10); if (!isNaN(n) && n>=0) qMap[a.codice] = n; }
                };
            }
        }
    }
    
    renderTabella();
    const searchInput = document.getElementById(`ricercaOrd_${id}`);
    searchInput.addEventListener('input', (e) => renderTabella(e.target.value));
    
    document.getElementById(`btnConferma_${id}`).onclick = () => {
        let selected = [];
        for (let a of articoli) {
            let q = qMap[a.codice] || 0;
            if (q > 0) selected.push({ codice: a.codice, descrizione: a.descrizione, quantita: q });
        }
        if (!selected.length) { alert("Inserisci almeno una quantità > 0"); return; }
        if (isDesktop) stampaPDF(cliente, selected);
        else inviaEmailOrdine(cliente, selected);
        chiudiModale(id);
    };
    document.getElementById(`btnApriListino_${id}`).onclick = () => { apriModaleListinoIframe(); };
    modalDiv.querySelector('.minimize-btn').onclick = () => minimizzaModale(id);
    modalDiv.querySelector('.close-modal-btn').onclick = () => chiudiModale(id);
}

function ripristinaOrdineDaStorageSeNecessario() {
    const ordineSalvato = caricaOrdineDaStorage();
    if (!ordineSalvato) return;
    const { cliente, articoli, qMap, idSalvato, nota } = ordineSalvato;
    const clienteEsistente = clientiUnici.find(c => c.codice === cliente.codice);
    if (!clienteEsistente) {
        rimuoviOrdineDaStorage();
        return;
    }
    const clienteCompleto = {
        ...clienteEsistente,
        ordini: clienteEsistente.ordini,
        scadenze: clienteEsistente.scadenze || []
    };
    let finalId = idSalvato;
    if (modaliAperti.some(m => m.id === finalId)) {
        finalId = nextModalId++;
    } else {
        if (finalId >= nextModalId) nextModalId = finalId + 1;
    }
    apriModaleOrdine(clienteCompleto, qMap, finalId, nota);
    const modaleAppenaAperto = modaliAperti.find(m => m.id === finalId);
    if (modaleAppenaAperto) {
        minimizzaModale(finalId);
    }
    rimuoviOrdineDaStorage();
}

function aggiornaClienti() {
    const map = new Map();
    for (let c of datiOrd) { map.set(c.codice.toString(), { codice: c.codice.toString(), ragione: c.ragione, hasScadenze: false, scadenze: [], ordini: c.articoli }); }
    for (let c of datiSca) {
        let k = c.codice.toString();
        let existing = map.get(k);
        if (existing) { existing.hasScadenze = true; existing.scadenze = c.scadenze; }
        else { map.set(k, { codice: k, ragione: c.ragione, hasScadenze: true, scadenze: c.scadenze, ordini: [] }); }
    }
    clientiUnici = Array.from(map.values());
    filtraClienti();
}

function filtraClienti() {
    let txt = document.getElementById('cercaCliente').value.toLowerCase();
    let filtrati = clientiUnici.filter(c => c.codice.toLowerCase().includes(txt) || c.ragione.toLowerCase().includes(txt));
    filtrati.sort((a,b) => {
        let aHas = a.hasScadenze && a.scadenze.length;
        let bHas = b.hasScadenze && b.scadenze.length;
        if (aHas && !bHas) return -1;
        if (!aHas && bHas) return 1;
        return a.ragione.localeCompare(b.ragione);
    });
    let sel = document.getElementById('selectClienteAgenti');
    sel.innerHTML = '<option value="">-- Seleziona cliente --</option>';
    for (let c of filtrati) {
        let opt = document.createElement('option');
        opt.value = c.codice;
        let has = c.hasScadenze && c.scadenze.length;
        if (has) { opt.style.color = '#c0392b'; opt.style.fontWeight = 'bold'; opt.textContent = "[R] " + c.codice + " - " + c.ragione + " (" + c.scadenze.length + " scad.)"; }
        else opt.textContent = c.codice + " - " + c.ragione;
        sel.appendChild(opt);
    }
    if (!filtrati.length) document.getElementById('dettaglioAgenti').innerHTML = '<div class="scadenze-box">Nessun cliente trovato</div>';
}

function buildScadenzeHtml(cliente) {
    let html = `<div class="scadenze-box"><div class="scadenze-header"><h3 style="margin:0;">📅 Scadenze - ${cliente.codice} ${cliente.ragione}</h3>
                <button class="btn-whatsapp" onclick="inviaScadenzeWhatsApp(clienteScadenzeCorrente)"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.47 3.45 1.35 4.95L2 22l5.25-1.38c1.45.85 3.1 1.3 4.79 1.3 5.46 0 9.91-4.45 9.91-9.91 0-2.66-1.04-5.16-2.93-7.05A9.87 9.87 0 0 0 12.04 2z"/></svg> Invia Scadenze</button></div>
                <table style="width:100%;border-collapse:collapse;"><thead><tr bgcolor="#e9ecef"><th>Scadenza</th><th>Data Doc.</th><th>N.Doc</th><th>Importo</th></tr></thead><tbody>`;
    for (let s of cliente.scadenze) {
        let cls = s.importo < 0 ? 'style="color:#e74c3c"' : '';

    }
    html += `</tbody>}墨</div>`;
    return html;
}

function nomeFileCorrisponde(nome, codice, tipo) {
    let base = nome.replace(/\.[a-zA-Z0-9]+$/, '');
    let m = base.match(/^([A-Z]+)(\d+)$/i);
    if (!m) return false;
    if (m[1].toUpperCase() !== tipo) return false;
    return parseInt(m[2],10) === parseInt(codice,10);
}

async function caricaFile(files) {
    if (!agenteCorrente) { alert("Seleziona un agente!"); return false; }
    if (files.length !== 2) { alert("Servono ESATTAMENTE 2 file (ORD e SCA)!"); return false; }
    let cod = agenteCorrente.codice;
    let trovati = { ord: false, sca: false };
    let ordText = null, scaText = null, errori = [];
    for (let f of files) {
        if (nomeFileCorrisponde(f.name, cod, 'ORD')) { trovati.ord = true; ordText = await f.text(); }
        else if (nomeFileCorrisponde(f.name, cod, 'SCA')) { trovati.sca = true; scaText = await f.text(); }
        else errori.push(f.name);
    }
    if (errori.length) { alert("File non validi: "+errori.join(', ')); return false; }
    if (!trovati.ord || !trovati.sca) { alert("Mancano ORD"+cod+".txt o SCA"+cod+".txt"); return false; }
    datiOrd = ordText ? parseORD(ordText) : [];
    datiSca = scaText ? parseSCA(scaText) : [];
    await salvaDatiAgente();
    aggiornaClienti();
    document.getElementById('fileStatusInline').innerHTML = "ORD: "+datiOrd.length+" | SCA: "+datiSca.length;
    alert("Caricato! ORD: "+datiOrd.length+" clienti, SCA: "+datiSca.length);
    return true;
}

async function caricaListinoGlobale(file) {
    if (!file) { alert("Seleziona file listino.txt"); return false; }
    try {
        const text = await file.text();
        const lines = text.split(/\r?\n/);
        const articoli = [];
        for (let line of lines) {
            line = line.trim();
            if (!line || line.startsWith("===") || line.startsWith("---") || line.startsWith("Codice")) continue;
            const parts = line.split(/\s+/);
            if (parts.length < 5) continue;
            let codice = parts[0];
            let prezzo = parseFloat(parts[1].replace(',', '.'));
            let descrizione = parts.slice(2, -4).join(" ");
            let um = parts[parts.length-4];
            let gm = parts[parts.length-3];
            let mord = parts[parts.length-2];
            let iva = parts[parts.length-1];
            if (isNaN(prezzo)) continue;
            articoli.push({ codice, prezzo, descrizione, um, gm, m_ord: mord, iva });
        }
        if (!articoli.length) { alert("Nessun articolo valido"); return false; }
        await db.collection('listini_generali').doc('listino_globale').set({ articoli, ultimoAggiornamento: new Date().toISOString(), numeroArticoli: articoli.length });
        showToast("Listino caricato! "+articoli.length+" articoli");
        alert("Listino salvato. Ora disponibile a tutti gli agenti.");
        return true;
    } catch(e) { alert("Errore: "+e.message); return false; }
}

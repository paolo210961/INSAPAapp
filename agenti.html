<script>
const firebaseConfig = { apiKey: "AIzaSyBAqGSqRE7xfH5YGgPOmTInv24ESU3jkvQ", authDomain: "insapa-database.firebaseapp.com", projectId: "insapa-database", storageBucket: "insapa-database.firebasestorage.app", messagingSenderId: "331230245928", appId: "1:331230245928:web:2ee43d9209e43c3c89b11d" };

let agentiLista = [], agenteCorrente = null, datiOrd = [], datiSca = [], clientiUnici = [], clienteScadenzeCorrente = null, modificheNonSalvate = false;
let linkPrincipale = "", linkSecondario = "";

    { codiceArtic: "D012", codice: "D012", ean: "8001234567894", stock: "7", descrizione: "Trapano avvitatore 18V", um: "pz", gm: "1.8", mOrd: "1", iva: "22%" }

function isDesktop() { return window.matchMedia("(pointer: fine)").matches && window.innerWidth > 768; }
function showToast(msg, isErr = false) { let t = document.createElement('div'); t.className = 'toast-message'; t.style.backgroundColor = isErr ? '#e74c3c' : '#27ae60'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
function marcaModifiche() { modificheNonSalvate = true; document.getElementById('avvisoModifiche').classList.add('show'); }
function resetModifiche() { modificheNonSalvate = false; document.getElementById('avvisoModifiche').classList.remove('show'); }

// ==================== LISTINO MODALE ====================
function apriListinoModal() {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    const isMobile = !isDesktop();
    modal.innerHTML = `
        <div class="modal-content listino-modal-content">
            <h3>📋 LISTINO PRODOTTI</h3>
            <div class="listino-search"><input type="text" id="searchListino" placeholder="Cerca per codice o descrizione..."></div>
            <div style="overflow-x: auto; max-height: 60vh;">
                <table class="tabella-listino" id="tabellaListino">
                    <thead><tr><th>Codice Artic.</th><th>Codice</th><th>EAN</th><th>S T O K</th><th>Descrizione</th><th>UM</th><th>G.M.</th><th>M.Ord</th><th>Iva</th></tr></thead>
                    <tbody id="listaProdottiBody"></tbody>
                </table>
            </div>
            <div class="btn-group-modal"><button id="btnChiudiListino" class="btn-primary">CHIUDI</button></div>
        </div>
    `;
    document.body.appendChild(modal);
    const tbody = modal.querySelector('#listaProdottiBody');
    function render(filter = '') {
        const filtro = filter.toLowerCase();
        const filtrati = listinoProdotti.filter(p => p.codiceArtic.toLowerCase().includes(filtro) || p.descrizione.toLowerCase().includes(filtro));
        tbody.innerHTML = filtrati.map(p => `
            <tr>
                <td data-label="Codice Artic.">${p.codiceArtic}</td>
                <td data-label="Codice">${p.codice}</td>
                <td data-label="EAN">${p.ean}</td>
                <td data-label="S T O K">${p.stock}</td>
                <td data-label="Descrizione">${p.descrizione}</td>
                <td data-label="UM">${p.um}</td>
                <td data-label="G.M.">${p.gm}</td>
                <td data-label="M.Ord">${p.mOrd}</td>
                <td data-label="Iva">${p.iva}</td>
            </tr>
        `).join('');
    }
    render('');
    const searchInput = modal.querySelector('#searchListino');
    searchInput.addEventListener('input', (e) => render(e.target.value));
    modal.querySelector('#btnChiudiListino').onclick = () => modal.remove();
}

// ==================== FUNZIONI STAMPA/EMAIL CON NOTE ====================
function generaHtmlOrdine(cliente, articoliConQta, note) {
    return `
        <div style="font-family:'Segoe UI',Arial,sans-serif;padding:20px;max-width:800px;margin:0 auto;">
            <h2 style="color:#2c3e50;border-bottom:2px solid #f1c40f;">📝 ORDINE CLIENTE</h2>
            <div style="background:#eef2f5;padding:15px;border-radius:8px;margin-bottom:20px;">
                <p><strong>Codice:</strong> ${cliente.codice}</p><p><strong>Ragione Sociale:</strong> ${cliente.ragione}</p>
                <p><strong>Data Ordine:</strong> ${new Date().toLocaleDateString('it-IT')}</p>
            </div>
            <table style="width:100%;border-collapse:collapse;"><thead><tr style="background:#f1c40f;"><th>Codice</th><th>Descrizione</th><th>Quantità</th></tr></thead><tbody>
                ${articoliConQta.map(a => `<tr><td>${a.codice}</td><td>${a.descrizione}</td><td style="text-align:center">${a.quantita} pz</td></tr>`).join('')}
            </tbody></table>
            ${note ? `<div style="margin-top:20px;padding:12px;background:#fff9e0;border-left:4px solid #f1c40f;"><strong>📌 NOTE:</strong><br>${note.replace(/\n/g,'<br>')}</div>` : ''}
            <div style="margin-top:20px;font-size:12px;color:#999;text-align:center;">Documento generato da inSAPA Agenti</div>
        </div>
    `;
}
function stampaPDF(cliente, articoliConQta, note) {
    const html = generaHtmlOrdine(cliente, articoliConQta, note);
    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html><html><head><title>Ordine_${cliente.codice}</title><meta charset="UTF-8"><style>body{margin:20px;font-family:sans-serif;}</style></head><body>${html}<script>window.onload=function(){window.print();window.onafterprint=function(){window.close();}};<\/script></body></html>`);
    win.document.close();
}
function inviaEmailOrdine(cliente, articoliConQta, note) {
    let corpo = `ORDINE CLIENTE: ${cliente.codice} - ${cliente.ragione}\n\nARTICOLI ORDINATI:\n${articoliConQta.map(a => `📦 ${a.codice} - ${a.descrizione}   Q.tà: ${a.quantita} pz`).join('\n')}\n\n`;
    if (note) corpo += `📝 NOTE:\n${note}\n\n`;
    corpo += `Ordine generato da inSAPA Agenti il ${new Date().toLocaleDateString('it-IT')}`;
    window.location.href = `mailto:?subject=ORDINE ${cliente.codice} - ${cliente.ragione}&body=${encodeURIComponent(corpo)}`;
}
    // ==================== MODALE ORDINE CON NOTE E LISTINO ====================
function apriModaleOrdine(cliente) {
    if (!cliente || !cliente.ordini || cliente.ordini.length === 0) { alert("Nessun articolo disponibile per questo cliente."); return; }
    let quantitaInputs = {};
    let noteCorrente = '';
    const articoliOrdinati = [...cliente.ordini].sort((a,b) => {
        let getDate = (art) => art.coppie?.length ? new Date(art.coppie[0].data.split('/').reverse().join('-')).getTime() : 0;
        return getDate(b) - getDate(a);
    });
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    const isDesktopDevice = isDesktop();
    const pulsanteTesto = isDesktopDevice ? "🖨️ STAMPA PDF" : "📧 INVIA EMAIL";
    modal.innerHTML = `
        <div class="modal-content">
            <h3>📝 ORDINE DA CLIENTE</h3>
            <div class="cliente-info-modale">
                <div><p><strong>${cliente.codice}</strong> - ${cliente.ragione}</p></div>
                <button id="btnListinoModale" class="btn-listino-modale">📋 LISTINO</button>
            </div>
            <div class="ricerca-articolo-ordine"><input type="text" id="ricercaArticoloOrdine" placeholder="🔍 Cerca articolo per codice o descrizione..."></div>
            <div class="lista-articoli-ordine" id="listaArticoliOrdine"></div>
            <div class="note-ordine-area"><textarea id="noteOrdineTextarea" rows="3" placeholder="Inserisci note aggiuntive (es. consegna, riferimenti)..."></textarea></div>
            <div class="btn-group-modal"><button id="btnConfermaOrdine" class="btn-success">${pulsanteTesto}</button><button id="btnAnnullaOrdine" class="btn-primary">ANNULLA</button></div>
        </div>
    `;
    document.body.appendChild(modal);
    function renderLista(search = '') {
        const container = document.getElementById('listaArticoliOrdine');
        const filtrati = articoliOrdinati.filter(a => a.codice.toLowerCase().includes(search) || a.descrizione.toLowerCase().includes(search));
        if (!filtrati.length) { container.innerHTML = '<p style="text-align:center;">Nessun articolo trovato</p>'; return; }
        let html = '';
        filtrati.forEach(art => {
            const ultimo = art.coppie?.length ? `Ultimo acquisto: ${art.coppie[0].data}` : 'Mai acquistato';
            html += `<div class="ordine-articolo-item" data-codice="${art.codice}">
                <div class="ordine-articolo-info"><div class="ordine-articolo-codice">${art.codice}</div><div class="ordine-articolo-desc">${art.descrizione}</div><div style="font-size:0.7rem;color:#888;">${ultimo}</div></div>
                <div class="ordine-articolo-qta"><label>Quantità:</label><input type="number" id="qta_${art.codice.replace(/[^a-z0-9]/gi,'_')}" min="0" step="1" value="${quantitaInputs[art.codice] || 0}" style="width:80px;"></div>
            </div>`;
        });
        container.innerHTML = html;
        filtrati.forEach(art => {
            const inp = document.getElementById(`qta_${art.codice.replace(/[^a-z0-9]/gi,'_')}`);
            if (inp) {
                inp.addEventListener('input', (e) => { let v = parseInt(e.target.value) || 0; if(v<0) v=0; quantitaInputs[art.codice] = v; inp.value = v; });
                if(quantitaInputs[art.codice]) inp.value = quantitaInputs[art.codice];
            }
        });
    }
    renderLista('');
    document.getElementById('ricercaArticoloOrdine').addEventListener('input', (e) => renderLista(e.target.value.toLowerCase()));
    document.getElementById('btnListinoModale').onclick = (e) => { e.stopPropagation(); apriListinoModal(); };
    const noteTextarea = document.getElementById('noteOrdineTextarea');
    noteTextarea.value = noteCorrente;
    noteTextarea.addEventListener('input', (e) => { noteCorrente = e.target.value; });
    document.getElementById('btnConfermaOrdine').onclick = () => {
        let articoliConQta = [];
        for(let art of articoliOrdinati) { let q = quantitaInputs[art.codice] || 0; if(q>0) articoliConQta.push({ codice: art.codice, descrizione: art.descrizione, quantita: q }); }
        if(articoliConQta.length === 0) { alert("Inserire almeno una quantità > 0"); return; }
        const noteFinale = noteCorrente.trim();
        if(isDesktopDevice) stampaPDF(cliente, articoliConQta, noteFinale);
        else inviaEmailOrdine(cliente, articoliConQta, noteFinale);
        modal.remove();
        showToast(isDesktopDevice ? "PDF in stampa..." : "Email aperta...");
    };
    document.getElementById('btnAnnullaOrdine').onclick = () => modal.remove();
}

// ==================== CARICAMENTO DATI (Firebase) ====================
function normalizzaCodiceAgente(c) { return c.toString(); }
async function caricaAgenti() {
    const snap = await db.collection('agenti_lista').get();
    agentiLista = []; snap.forEach(d => { let data = d.data(); data.codice = normalizzaCodiceAgente(data.codice); agentiLista.push(data); });
    agentiLista.sort((a,b)=>a.codice.localeCompare(b.codice));
    let sel = document.getElementById('selectAgente');
    sel.innerHTML = '<option value="">-- Seleziona agente --</option>';
    agentiLista.forEach(a => { let opt = document.createElement('option'); opt.value = a.codice; opt.textContent = `${a.codice} - ${a.nome}`; sel.appendChild(opt); });
    let last = localStorage.getItem('ultimoAgenteSelezionato');
    if(last && agentiLista.find(a=>a.codice===last)) { sel.value = last; selezionaAgente(last); }
}
async function caricaDatiAgente(codice) {
    const ordSnap = await db.collection('agenti_dati').doc('ord_'+codice).collection('clienti').get();
    datiOrd = ordSnap.docs.map(d => d.data());
    const scaSnap = await db.collection('agenti_dati').doc('sca_'+codice).collection('clienti').get();
    datiSca = scaSnap.docs.map(d => d.data());
}
async function selezionaAgente(codice) {
    agenteCorrente = agentiLista.find(a=>a.codice===codice);
    if(!agenteCorrente) return;
    localStorage.setItem('ultimoAgenteSelezionato', codice);
    await caricaDatiAgente(codice);
    aggiornaClienti();
    document.getElementById('cercaCliente').value = '';
    document.getElementById('cercaArticoloInline').value = '';
    document.getElementById('dettaglioAgenti').innerHTML = '';
    resetModifiche();
}
function aggiornaClienti() {
    let m = new Map();
    for(let c of datiOrd) { m.set(c.codice.toString(), { codice:c.codice.toString(), ragione:c.ragione, ordini:c.articoli, scadenze:[], hasScadenze:false }); }
    for(let c of datiSca) { let cod = c.codice.toString(); if(m.has(cod)) { let cl = m.get(cod); cl.scadenze = c.scadenze; cl.hasScadenze = true; } else m.set(cod, { codice:cod, ragione:c.ragione, ordini:[], scadenze:c.scadenze, hasScadenze:true }); }
    clientiUnici = Array.from(m.values());
    filtraClienti();
}
function filtraClienti() {
    let txt = document.getElementById('cercaCliente').value.toLowerCase();
    let filtrati = clientiUnici.filter(c => c.codice.includes(txt) || c.ragione.toLowerCase().includes(txt));
    let sel = document.getElementById('selectClienteAgenti');
    sel.innerHTML = '<option value="">-- Seleziona cliente --</option>';
    filtrati.forEach(c => { let opt = document.createElement('option'); opt.value = c.codice; opt.textContent = `${c.codice} - ${c.ragione}${c.hasScadenze && c.scadenze.length ? ` (${c.scadenze.length} scad.)` : ''}`; if(c.hasScadenze && c.scadenze.length) opt.style.fontWeight='bold'; sel.appendChild(opt); });
}
function mostraDettaglioCliente(codice) {
    let cliente = clientiUnici.find(c=>c.codice===codice);
    if(!cliente) return;
    clienteScadenzeCorrente = cliente;
    let html = `<div class="scadenze-box"><div class="scadenze-header"><h3>📅 Scadenze ${cliente.codice} ${cliente.ragione}</h3><button class="btn-whatsapp" onclick="inviaScadenzeWhatsApp(clienteScadenzeCorrente)">📱 Invia Scadenze</button></div><table><thead><tr><th>Scadenza</th><th>Data Doc</th><th>N.Doc</th><th>Importo</th></tr></thead><tbody>${(cliente.scadenze||[]).map(s=>`<tr><td>${s.scadenza}</td><td>${s.dataDoc||''}</td><td>${s.numDoc}</td><td style="text-align:right">${s.importo.toFixed(2)} €</td></tr>`).join('')}</tbody></table></div>`;
    if(cliente.ordini && cliente.ordini.length) {
        html += `<div class="scadenze-box"><h3>📦 ORD - ${cliente.codice} (${cliente.ordini.length} articoli)</h3>`;
        cliente.ordini.forEach(art => { html += `<div class="articolo-item"><strong>${art.codice} ${art.descrizione}</strong><div>€ ${art.prezzo?.toFixed(2)} - Sc.${art.sconto1}%</div><div class="storico-ordini">${(art.coppie||[]).slice(0,4).map(o=>`<span>${o.data} q.${o.qta}</span>`).join('')}</div></div>`; });
        html += `</div>`;
    }
    document.getElementById('dettaglioAgenti').innerHTML = html;
    document.querySelectorAll('.articolo-item').forEach(el => el.onclick = (e) => { e.stopPropagation(); let s = el.querySelector('.storico-ordini'); if(s) s.classList.toggle('visible'); });
}
function inviaScadenzeWhatsApp(cliente) { if(!cliente?.scadenze?.length) return alert("Nessuna scadenza"); let msg = `SCADENZE ${cliente.codice} ${cliente.ragione}\n`+cliente.scadenze.map(s=>`${s.scadenza} €${s.importo.toFixed(2)}`).join('\n'); window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank'); }
window.inviaScadenzeWhatsApp = inviaScadenzeWhatsApp;
document.getElementById('selectClienteAgenti').onchange = (e) => e.target.value && mostraDettaglioCliente(e.target.value);
document.getElementById('cercaCliente').oninput = () => filtraClienti();
document.getElementById('cercaArticoloInline').oninput = () => { let c = document.getElementById('selectClienteAgenti').value; if(c) mostraDettaglioCliente(c); };
// Pulsante compila ordine (per compatibilità con vecchio layout, ma verrà sovrascritto)
document.getElementById('btnCompilaOrdine') && (document.getElementById('btnCompilaOrdine').onclick = () => { let cod = document.getElementById('selectClienteAgenti').value; if(!cod) alert("Seleziona cliente"); else { let cl = clientiUnici.find(c=>c.codice===cod); cl && apriModaleOrdine(cl); } });

// ==================== GESTIONE BOTTONI PC/MOBILE ====================
function setupHeaderButtons() {
    const container = document.getElementById('headerActionGroup');
    if(!container) return;
    container.innerHTML = '';
    const isPc = isDesktop();
    if(isPc) {
        // PC: pulsante ORD+SCA+LIST (upload file)
        const wrapper = document.createElement('div');
        wrapper.className = 'tooltip-wrapper';
        const btnUpload = document.createElement('button');
        btnUpload.id = 'btnCaricaFilePC';
        btnUpload.className = 'btn-primary';
        btnUpload.innerHTML = '📂 ORD+SCA+LIST';
        btnUpload.style.display = 'inline-flex';
        btnUpload.style.alignItems = 'center';
        btnUpload.style.gap = '5px';
        const tooltipSpan = document.createElement('span');
        tooltipSpan.className = 'tooltip-text';
        tooltipSpan.innerText = 'Carica file ORD{codice}.txt e SCA{codice}.txt';
        wrapper.appendChild(btnUpload);
        wrapper.appendChild(tooltipSpan);
        container.appendChild(wrapper);
        btnUpload.onclick = () => document.getElementById('fileInput').click();
        
        // Pulsante LISTINO
        const btnListino = document.createElement('button');
        btnListino.id = 'btnListinoPC';
        btnListino.className = 'btn-listino-header';
        btnListino.innerHTML = '📋 LISTINO';
        btnListino.onclick = () => apriListinoModal();
        container.appendChild(btnListino);
        
        // Pulsante COMPILA ORDINE
        const btnOrdine = document.createElement('button');
        btnOrdine.id = 'btnCompilaOrdineClone';
        btnOrdine.className = 'btn-ordine-header';
        btnOrdine.innerHTML = '📝 COMPILA ORDINE';
        btnOrdine.onclick = () => { let cod = document.getElementById('selectClienteAgenti').value; if(!cod) alert("Seleziona cliente"); else { let cl = clientiUnici.find(c=>c.codice===cod); cl && apriModaleOrdine(cl); } };
        container.appendChild(btnOrdine);
    } else {
        // Mobile: solo pulsante COMPILA ORDINE (nessun ORD+SCA)
        const btnOrdine = document.createElement('button');
        btnOrdine.id = 'btnCompilaOrdineMobile';
        btnOrdine.className = 'btn-ordine-header';
        btnOrdine.innerHTML = '📝 COMPILA ORDINE';
        btnOrdine.onclick = () => { let cod = document.getElementById('selectClienteAgenti').value; if(!cod) alert("Seleziona cliente"); else { let cl = clientiUnici.find(c=>c.codice===cod); cl && apriModaleOrdine(cl); } };
        container.appendChild(btnOrdine);
    }
    // Input file nascosto globale (per caricamento ORD/SCA)
    if(!document.getElementById('fileInput')) {
        let inp = document.createElement('input');
        inp.type = 'file';
        inp.id = 'fileInput';
        inp.multiple = true;
        inp.accept = '.txt,.csv';
        inp.style.display = 'none';
        document.body.appendChild(inp);
        inp.onchange = async (e) => {
            if(!agenteCorrente) { alert("Seleziona agente"); return; }
            let files = Array.from(e.target.files);
            if(files.length !== 2) { alert("Servono esattamente 2 file: ORD e SCA"); return; }
            let ordTxt=null, scaTxt=null;
            for(let f of files) {
                let name = f.name.replace(/\.[^.]*$/,'');
                if(name.toUpperCase().startsWith('ORD')) ordTxt = await f.text();
                else if(name.toUpperCase().startsWith('SCA')) scaTxt = await f.text();
            }
            if(ordTxt && scaTxt) { datiOrd = parseORD(ordTxt); datiSca = parseSCA(scaTxt); await salvaDatiAgente(); aggiornaClienti(); showToast("Dati ORD/SCA aggiornati"); }
            else alert("File non riconosciuti. Devono iniziare con ORD e SCA");
            e.target.value = '';
        };
    }
}
function parseORD(txt) { const lines=txt.split(/\r?\n/); let map=new Map(); let curr=null; for(let l of lines){ let m=l.match(/^Cliente\s+:\s+(\d+)\s+(.+)/); if(m){ curr={codice:m[1].toString(),ragione:m[2].trim(),articoli:[]}; map.set(curr.codice,curr); continue; } if(!curr) continue; let reCoppia=/(\d+(?:,\d+)?)\s+(\d{2}\/\d{2}\/\d{4})/g, coppie=[]; let match; while((match=reCoppia.exec(l))!==null)coppie.push({qta:parseFloat(match[1].replace(',','.')),data:match[2]}); if(!coppie.length)continue; let desc=l.substring(0,l.indexOf(coppie[0].data)-2).trim().split(/\s+/); let codice=desc[0]; let descrizione=desc.slice(1).join(" "); curr.articoli.push({codice,descrizione,coppie,prezzo:0,sconto1:0}); } return Array.from(map.values()); }
function parseSCA(txt) { const lines=txt.split(/\r?\n/); let map=new Map(); let curr=null; for(let l of lines){ let m=l.match(/^CLIENTE:\s+(\d+)\s+(.+?)\s+Saldo/); if(m){ curr={codice:m[1].toString(),ragione:m[2].trim(),scadenze:[]}; map.set(curr.codice,curr); continue; } if(curr && l.includes("Euro")){ let parts=l.split(/\s+/); let idx=parts.findIndex(p=>p.toLowerCase()==="euro"); if(idx>0){ let scad=parts[0]; if(/^\d{2}\/\d{2}\/\d{4}$/.test(scad)){ let imp=parseFloat(parts[idx+1]?.replace(/\./g,'').replace(',','.')); if(!isNaN(imp)) curr.scadenze.push({scadenza:scad,descrizione:parts.slice(1,idx-2).join(" "),numDoc:parts[idx-2],dataDoc:parts[idx-1],importo:imp}); } } } } return Array.from(map.values()); }
async function salvaDatiAgente() { if(!agenteCorrente) return; try { let batch=db.batch(); let ordRef=db.collection('agenti_dati').doc('ord_'+agenteCorrente.codice).collection('clienti'); let oldOrd=await ordRef.get(); oldOrd.forEach(d=>batch.delete(d.ref)); datiOrd.forEach(c=>{batch.set(ordRef.doc(c.codice.toString()),{codice:c.codice,ragione:c.ragione,articoli:c.articoli});}); let scaRef=db.collection('agenti_dati').doc('sca_'+agenteCorrente.codice).collection('clienti'); let oldSca=await scaRef.get(); oldSca.forEach(d=>batch.delete(d.ref)); datiSca.forEach(c=>{batch.set(scaRef.doc(c.codice.toString()),{codice:c.codice,ragione:c.ragione,scadenze:c.scadenze});}); await batch.commit(); resetModifiche(); showToast("Dati salvati"); return true; } catch(e){alert("Errore salvataggio:"+e.message); return false;} }
function caricaLinkDaFile() { fetch('link.html').then(r=>r.ok?r.text():'').then(t=>{ let lines=t.split(/\r?\n/).filter(l=>l.trim()&&!l.trim().startsWith('<')); if(lines[0]) linkPrincipale=lines[0]; if(lines[1]) linkSecondario=lines[1]; }).catch(e=>{}); }
function caricaLogoSaved() { let img=document.getElementById('logoImmagine'), span=document.getElementById('logoSpan'); fetch('icons/logo.jpg').then(r=>{ if(r.ok){ img.src='icons/logo.jpg'; img.style.display='block'; span.style.display='none'; } else { fetch('icons/logo.png').then(r2=>{if(r2.ok){img.src='icons/logo.png';img.style.display='block';span.style.display='none';} else throw''}).catch(()=>{img.style.display='none';span.style.display='block';}); } }).catch(()=>{img.style.display='none';span.style.display='block';}); }
let lastTap=0; document.getElementById('logoRettangolo').addEventListener('click',(e)=>{ let now=Date.now(); if(now-lastTap<300){ apriLinkSecondario(); lastTap=0; } else { lastTap=now; setTimeout(()=>{ if(lastTap && Date.now()-lastTap>300){ apriLinkPrincipale(); lastTap=0; } },300); } });
function apriLinkPrincipale(){ if(linkPrincipale) window.open(linkPrincipale,'_blank'); else showToast("Link1 mancante",true); }
function apriLinkSecondario(){ if(linkSecondario) window.open(linkSecondario,'_blank'); else showToast("Link2 mancante",true); }
document.getElementById('hamburgerBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('navGrid').classList.toggle('open'); };
document.addEventListener('click', (e) => { let nav=document.getElementById('navGrid'); if(!nav.contains(e.target) && e.target !== document.getElementById('hamburgerBtn')) nav.classList.remove('open'); });
Promise.all([caricaLinkDaFile(), caricaAgenti()]).then(() => { setupHeaderButtons(); caricaLogoSaved(); });
</script>

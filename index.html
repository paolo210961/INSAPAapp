<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Documenti DDT · ORD · SCA - Memoria persistente</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            color: white;
            padding: 20px 30px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 15px; }
        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.02); }
        .btn-drive { background: #4285f4; }
        .btn-danger { background: #e74c3c; }
        .btn-secondary { background: #666; }
        select {
            padding: 10px 15px;
            border-radius: 25px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
        }
        
        /* Sezione memoria */
        .memory-section {
            margin: 20px;
            padding: 15px;
            background: #e8f0fe;
            border-radius: 15px;
        }
        .memory-title {
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .file-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 10px 0;
        }
        .file-btn {
            background: white;
            border: 2px solid #4CAF50;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .file-btn:hover {
            background: #4CAF50;
            color: white;
            transform: scale(1.02);
        }
        .file-btn.active {
            background: #4CAF50;
            color: white;
        }
        .delete-file {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 16px;
            margin-left: 5px;
        }
        .delete-file:hover { color: #e74c3c; }
        
        /* Upload area */
        .upload-area {
            margin: 20px;
            padding: 20px;
            background: #f0f4f8;
            border-radius: 15px;
            text-align: center;
            border: 2px dashed #ccc;
            cursor: pointer;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            background: #2c3e50;
            color: white;
            padding: 12px 10px;
            text-align: left;
            position: sticky;
            top: 0;
        }
        td {
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
        }
        tr:nth-child(even) { background-color: #f8f9fa; }
        tr:nth-child(odd) { background-color: #ffffff; }
        .type-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
        }
        .type-DDT { background: #e74c3c; color: white; }
        .type-ORD { background: #2ecc71; color: white; }
        .type-SCA { background: #3498db; color: white; }
        .detail-btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 750px;
            max-height: 85vh;
            overflow: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 22px;
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            color: white;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 32px;
            color: white;
            cursor: pointer;
        }
        .modal-body { padding: 22px; }
        .modal-body pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
            font-size: 11px;
            white-space: pre-wrap;
        }
        .hidden { display: none !important; }
        .badge-count {
            display: inline-block;
            background: #4CAF50;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
        @media (max-width: 768px) {
            th, td { padding: 8px 5px; font-size: 11px; }
            .controls { flex-direction: column; align-items: stretch; }
            .btn, select { width: 100%; text-align: center; }
            .file-buttons { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 DDT · ORD · SCA <span id="docCount" class="badge-count">0</span></h1>
            <div class="controls">
                <button id="driveBtn" class="btn btn-drive">📁 Apri Drive</button>
                <select id="filterSelect">
                    <option value="all">📌 Tutti</option>
                    <option value="DDT">📦 DDT</option>
                    <option value="ORD">📋 ORD</option>
                    <option value="SCA">💰 SCA</option>
                </select>
                <button id="clearAllBtn" class="btn btn-danger">🗑️ Cancella tutto</button>
            </div>
        </header>

        <!-- MEMORIA FILE SALVATI -->
        <div class="memory-section" id="memorySection">
            <div class="memory-title">
                <span>💾 FILE IN MEMORIA (persistenti)</span>
                <span style="font-size: 12px;">⬇️ Clicca un file per caricarlo</span>
            </div>
            <div id="fileButtonsList" class="file-buttons">
                <span style="color:#999;">Nessun file in memoria. Caricane uno!</span>
            </div>
        </div>

        <!-- AREA CARICAMENTO -->
        <div class="upload-area" id="uploadArea">
            📂 <strong>Clicca qui</strong> per selezionare file TXT<br>
            <span style="font-size: 12px; color:#666;">(DDT-01.txt, ORD-15.txt, SCA-03.txt ...)</span>
            <input type="file" id="fileInput" accept=".txt" multiple style="display:none;">
        </div>

        <!-- TABELLA DATI -->
        <div id="docList" class="documents-list" style="padding:20px">
            <p style="text-align:center; padding:40px; color:#aaa;">✨ Carica un file o clicca un file dalla memoria</p>
        </div>
    </div>

    <!-- MODALE DETTAGLI -->
    <div id="detailModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Dettagli documento</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script>
        const DRIVE_URL = 'https://drive.google.com/drive/folders/1V7BH-_UZzLz7GshRN1ypMtWnvx36NcC4';
        const STORAGE_KEY = 'saved_files_data';
        
        let allDocuments = [];
        let savedFiles = []; // { name, content, tipo }

        // ==================== CARICA DA MEMORIA ====================
        function loadFromLocalStorage() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    savedFiles = JSON.parse(stored);
                    renderFileButtons();
                } catch(e) { console.error(e); }
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(savedFiles));
            renderFileButtons();
        }

        // ==================== PARSER ====================
        function parseDDT(content, nomeFile) {
            const match = nomeFile.match(/(\d+)/);
            const agente = match ? match[1] : '??';
            const records = [];
            const lines = content.split('\n');
            
            for (let line of lines) {
                if (line.match(/\d{2}\/\d{2}\/\d{4}/) && (line.match(/COOP/) || line.match(/SRL/))) {
                    const parts = line.trim().split(/\s+/);
                    let data = '', nDoc = '', totale = '', cliente = '';
                    
                    for (let part of parts) {
                        if (part.match(/\d{2}\/\d{2}\/\d{4}/)) data = part;
                        if (part.match(/^\d{1,5}$/) && part.length >= 2 && part.length <= 5) nDoc = part;
                        if (part.match(/[\d\.,]+$/) && !part.includes('/')) totale = part.replace(',', '.');
                    }
                    
                    const clienteMatch = line.match(/^\s*\d+\s+([A-Z\s\.]+?)\s+\d/);
                    if (clienteMatch) cliente = clienteMatch[1].trim().substring(0, 45);
                    
                    if (nDoc || data) {
                        records.push({
                            tipo: 'DDT', agente: agente, cliente: cliente || 'Cliente',
                            nDoc: nDoc || '-', data: data || '-', importo: totale || '-',
                            fullContent: content
                        });
                    }
                }
            }
            return records.length ? records : [{ tipo: 'DDT', agente: agente, cliente: 'Contenuto grezzo', nDoc: '-', data: '-', importo: '-', fullContent: content }];
        }

        function parseORD(content, nomeFile) {
            const match = nomeFile.match(/(\d+)/);
            const agente = match ? match[1] : '??';
            let cliente = 'Ordine cliente';
            const clienteMatch = content.match(/Cliente\s*:\s*\d+\s+([^\n]+)/);
            if (clienteMatch) cliente = clienteMatch[1].trim().substring(0, 50);
            return [{ tipo: 'ORD', agente: agente, cliente: cliente, nDoc: 'Ordine', data: 'Vedi dettagli', importo: '-', fullContent: content }];
        }

        function parseSCA(content, nomeFile) {
            const match = nomeFile.match(/(\d+)/);
            const agente = match ? match[1] : '??';
            const records = [];
            const lines = content.split('\n');
            let currentCliente = '';
            
            for (let line of lines) {
                const clienteMatch = line.match(/CLIENTE:\s+\d+\s+(.+)/);
                if (clienteMatch) currentCliente = clienteMatch[1].trim().substring(0, 50);
                
                const scadMatch = line.match(/(\d{2}\/\d{2}\/\d{4})\s+.*?\s+(\d+)\s+(\d{2}\/\d{2}\/\d{4})\s+Euro\s+([\d\.,\-]+)/);
                if (scadMatch && currentCliente) {
                    records.push({
                        tipo: 'SCA', agente: agente, cliente: currentCliente,
                        nDoc: scadMatch[2], data: scadMatch[1], importo: scadMatch[4].replace(',', '.'),
                        fullContent: content
                    });
                }
            }
            return records.length ? records : [{ tipo: 'SCA', agente: agente, cliente: currentCliente || 'Scadenziario', nDoc: '-', data: '-', importo: '-', fullContent: content }];
        }

        function processContent(name, content) {
            const upperName = name.toUpperCase();
            let parsed = null;
            if (upperName.includes('DDT')) parsed = parseDDT(content, name);
            else if (upperName.includes('ORD')) parsed = parseORD(content, name);
            else if (upperName.includes('SCA')) parsed = parseSCA(content, name);
            
            if (parsed) {
                if (Array.isArray(parsed)) allDocuments.push(...parsed);
                else allDocuments.push(parsed);
            }
            return parsed;
        }

        // ==================== SALVA FILE IN MEMORIA ====================
        function saveFileToMemory(name, content) {
            // Controlla se esiste già
            const existingIndex = savedFiles.findIndex(f => f.name === name);
            const fileData = { name: name, content: content, tipo: name.toUpperCase().includes('DDT') ? 'DDT' : (name.toUpperCase().includes('ORD') ? 'ORD' : 'SCA') };
            
            if (existingIndex !== -1) {
                savedFiles[existingIndex] = fileData;
            } else {
                savedFiles.push(fileData);
            }
            saveToLocalStorage();
        }

        function deleteFileFromMemory(name) {
            savedFiles = savedFiles.filter(f => f.name !== name);
            saveToLocalStorage();
            // Se il file cancellato era quello attivo, ricarica i rimanenti
            renderFileButtons();
        }

        function loadFileFromMemory(name) {
            const file = savedFiles.find(f => f.name === name);
            if (file) {
                allDocuments = [];
                processContent(file.name, file.content);
                renderTable();
            }
        }

        // ==================== RENDER PULSANTI FILE ====================
        function renderFileButtons() {
            const container = document.getElementById('fileButtonsList');
            if (!savedFiles.length) {
                container.innerHTML = '<span style="color:#999;">📭 Nessun file in memoria. Caricane uno!</span>';
                return;
            }
            
            let html = '';
            savedFiles.forEach(file => {
                let tipoIcon = '';
                if (file.tipo === 'DDT') tipoIcon = '📦';
                else if (file.tipo === 'ORD') tipoIcon = '📋';
                else tipoIcon = '💰';
                
                html += `
                    <div class="file-btn" data-name="${file.name}">
                        ${tipoIcon} ${file.name}
                        <button class="delete-file" data-name="${file.name}" title="Cancella dalla memoria">🗑️</button>
                    </div>
                `;
            });
            container.innerHTML = html;
            
            // Eventi per caricare file
            document.querySelectorAll('.file-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-file')) return;
                    const name = btn.getAttribute('data-name');
                    loadFileFromMemory(name);
                });
            });
            
            // Eventi per cancellare
            document.querySelectorAll('.delete-file').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const name = btn.getAttribute('data-name');
                    deleteFileFromMemory(name);
                });
            });
        }

        // ==================== CARICAMENTO FILE ====================
        async function handleFiles(files) {
            for (let file of files) {
                if (!file.name.endsWith('.txt')) continue;
                const content = await file.text();
                
                // Salva in memoria
                saveFileToMemory(file.name, content);
                
                // Elabora per visualizzazione
                processContent(file.name, content);
            }
            renderTable();
            updateCount();
        }

        function renderTable() {
            const filter = document.getElementById('filterSelect').value;
            let filtered = filter === 'all' ? allDocuments : allDocuments.filter(d => d.tipo === filter);
            const container = document.getElementById('docList');
            
            if (!filtered.length) {
                container.innerHTML = '<p style="text-align:center; padding:40px; color:#aaa;">📭 Nessun documento. Carica un file o clicca un file dalla memoria</p>';
                return;
            }
            
            let html = `<table><thead><tr><th>Tipo</th><th>Agente</th><th>Cliente</th><th>N.Doc</th><th>Data</th><th>Importo</th><th></th></tr></thead><tbody>`;
            filtered.forEach((doc, idx) => {
                html += `<tr>
                    <td><span class="type-badge type-${doc.tipo}">${doc.tipo}</span></td>
                    <td>${doc.agente}</td>
                    <td>${doc.cliente.substring(0, 40)}</td>
                    <td>${doc.nDoc}</td>
                    <td>${doc.data}</td>
                    <td>${doc.importo !== '-' ? '€ ' + doc.importo : '-'}</td>
                    <td><button class="detail-btn" data-idx="${idx}" data-filter="${filter}">📄</button></td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
            
            document.querySelectorAll('.detail-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.dataset.idx);
                    const currentFilter = document.getElementById('filterSelect').value;
                    const currentFiltered = currentFilter === 'all' ? allDocuments : allDocuments.filter(d => d.tipo === currentFilter);
                    showModal(currentFiltered[idx]);
                });
            });
        }

        function showModal(doc) {
            const modal = document.getElementById('detailModal');
            document.getElementById('modalTitle').textContent = `${doc.tipo} - Dettagli`;
            document.getElementById('modalBody').innerHTML = `
                <div style="margin-bottom:15px">
                    <p><strong>Tipo:</strong> ${doc.tipo}</p>
                    <p><strong>Agente:</strong> ${doc.agente}</p>
                    <p><strong>Cliente:</strong> ${doc.cliente}</p>
                    <p><strong>N.Documento:</strong> ${doc.nDoc}</p>
                    <p><strong>Data:</strong> ${doc.data}</p>
                    <p><strong>Importo:</strong> ${doc.importo !== '-' ? '€ ' + doc.importo : '-'}</p>
                </div>
                <hr>
                <h4>Contenuto completo:</h4>
                <pre>${escapeHtml(doc.fullContent)}</pre>
            `;
            modal.classList.remove('hidden');
        }

        function updateCount() {
            document.getElementById('docCount').textContent = allDocuments.length;
        }

        function clearAll() {
            if (confirm('⚠️ Cancellare TUTTI i file dalla memoria? L\'operazione è irreversibile!')) {
                savedFiles = [];
                allDocuments = [];
                saveToLocalStorage();
                renderTable();
                updateCount();
                renderFileButtons();
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }

        // ==================== SETUP ====================
        document.getElementById('driveBtn').onclick = () => window.open(DRIVE_URL, '_blank');
        document.getElementById('filterSelect').onchange = () => renderTable();
        document.getElementById('clearAllBtn').onclick = clearAll;
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        
        uploadArea.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            if (e.target.files.length) {
                handleFiles(Array.from(e.target.files));
                fileInput.value = '';
            }
        };
        
        document.querySelector('.close-btn').onclick = () => document.getElementById('detailModal').classList.add('hidden');
        window.onclick = (e) => { if (e.target === document.getElementById('detailModal')) document.getElementById('detailModal').classList.add('hidden'); };
        
        // Carica memoria all'avvio
        loadFromLocalStorage();
        
        console.log('✅ App pronta! I file rimangono in memoria anche dopo chiusura!');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gestione Documenti - DDT | ORD | SCA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            color: white;
            padding: 20px 30px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .btn-drive {
            background: #4285f4;
        }

        .btn-drive:hover {
            background: #3367d6;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-group select {
            padding: 8px 15px;
            border-radius: 25px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
        }

        .filter-group select option {
            background: #2c3e50;
            color: white;
        }

        .documents-list {
            padding: 20px;
            overflow-x: auto;
        }

        .doc-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .doc-table th {
            background: #2c3e50;
            color: white;
            padding: 12px 10px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        .doc-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
        }

        .doc-table tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        .doc-table tr:nth-child(odd) {
            background-color: #ffffff;
        }

        .doc-table tr:hover {
            background-color: #e3f2fd;
            cursor: pointer;
        }

        .type-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
        }

        .type-DDT { background: #e74c3c; color: white; }
        .type-ORD { background: #2ecc71; color: white; }
        .type-SCA { background: #3498db; color: white; }

        .detail-btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .detail-btn:hover {
            background: #0b7dda;
            transform: scale(1.05);
        }

        .loading {
            text-align: center;
            padding: 50px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            margin: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        /* Modale */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow: auto;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            color: white;
            border-radius: 15px 15px 0 0;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-body pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .detail-section {
            margin-bottom: 20px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .detail-section h4 {
            color: #2c3e50;
            margin-bottom: 10px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }

        .file-input-area {
            margin: 20px;
            padding: 20px;
            background: #f0f4f8;
            border-radius: 15px;
            text-align: center;
        }

        .file-input-area input {
            margin: 10px 0;
            padding: 10px;
        }

        .info-text {
            color: #666;
            font-size: 12px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .doc-table th, .doc-table td {
                padding: 8px 5px;
                font-size: 11px;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .btn-primary, .filter-group {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Gestione Documenti</h1>
            <div class="controls">
                <input type="file" id="fileInput" accept=".txt" multiple style="display: none;">
                <button id="selectFilesBtn" class="btn-primary">📂 Seleziona file TXT</button>
                <button id="openDriveBtn" class="btn-primary btn-drive">📁 Apri cartella Google Drive</button>
                <div class="filter-group">
                    <label>📌 Filtra:</label>
                    <select id="typeFilter">
                        <option value="all">Tutti</option>
                        <option value="DDT">DDT</option>
                        <option value="ORD">ORD</option>
                        <option value="SCA">SCA</option>
                    </select>
                </div>
            </div>
        </header>

        <div class="file-input-area">
            <p>📌 Carica i tuoi file dalla cartella Drive:</p>
            <p style="font-size: 13px; color: #666;">1. Clicca "Apri cartella Google Drive" → 2. Scarica i file → 3. Torna qui e selezionali</p>
        </div>

        <div id="loadingIndicator" class="loading hidden">
            <div class="spinner"></div>
            <p>Caricamento documenti...</p>
        </div>

        <div id="errorMessage" class="error hidden"></div>

        <main>
            <div id="documentsList" class="documents-list">
                <p style="text-align: center; padding: 40px; color: #999;">👆 Seleziona i file TXT per iniziare</p>
            </div>
        </main>
    </div>

    <!-- Modale dettagli -->
    <div id="detailModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Dettagli documento</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURAZIONE ====================
        const DRIVE_FOLDER_URL = 'https://drive.google.com/drive/folders/1V7BH-_UZzLz7GshRN1ypMtWnvx36NcC4';
        
        let currentDocuments = [];

        // ==================== PARSER PER TIPO FILE ====================
        
        function parseDDT(filename, content) {
            const match = filename.match(/^DDT-(\d+)\.txt$/i);
            if (!match) return null;
            
            const numeroAgente = match[1];
            const records = [];
            const lines = content.split('\n');
            
            // Cerca righe con formato DDT (hanno N.Doc. e Data e Tot.D.d.T.)
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                // Pattern per trovare righe DDT: inizio con codice cliente (numeri), poi nome, poi N.Doc., poi Data
                const ddtMatch = line.match(/^\s*(\d+)\s+([A-Z\s\.]+?)\s+(\d+)\s+(\d{2}\/\d{2}\/\d{4})\s+(\d+)\s+\S+\s+\S+\s+\S+\s+\S+\s+\S+\s+\S+\s+\S+\s+([\d\.,]+)/);
                if (ddtMatch) {
                    records.push({
                        tipo: 'DDT',
                        agente: numeroAgente,
                        codiceCliente: ddtMatch[1],
                        cliente: ddtMatch[2].trim(),
                        nDoc: ddtMatch[3],
                        data: ddtMatch[4],
                        totale: ddtMatch[6].replace(',', '.'),
                        fullContent: content,
                        rigaOriginale: line
                    });
                }
            }
            
            return records;
        }

        function parseORD(filename, content) {
            const match = filename.match(/^ORD-(\d+)\.txt$/i);
            if (!match) return null;
            
            const numeroAgente = match[1];
            const records = [];
            const lines = content.split('\n');
            
            // Estrai nome cliente dalla prima riga
            let cliente = '';
            const clienteMatch = content.match(/Cliente\s*:\s*\d+\s+([A-Z\s\.]+)/);
            if (clienteMatch) {
                cliente = clienteMatch[1].trim();
            }
            
            // Cerca righe articoli (hanno codice, descrizione, quantità, prezzo)
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                // Pattern per righe con articoli (esclude quelle con * INESISTENTE)
                if (line.match(/^\s*\d{5,}\s+[A-Z]/) && !line.includes('INESISTENTE')) {
                    const parts = line.split(/\s{2,}/);
                    if (parts.length >= 2) {
                        const codice = parts[0].trim();
                        const descrizione = parts[1]?.trim() || '';
                        // Cerca prezzo alla fine della riga
                        const prezzoMatch = line.match(/([\d\.,]+)\s*$[^\d]*$/);
                        const prezzo = prezzoMatch ? prezzoMatch[1].replace(',', '.') : '';
                        
                        records.push({
                            tipo: 'ORD',
                            agente: numeroAgente,
                            cliente: cliente,
                            codiceArticolo: codice,
                            descrizione: descrizione.substring(0, 50),
                            prezzo: prezzo,
                            fullContent: content,
                            rigaOriginale: line
                        });
                    }
                }
            }
            
            if (records.length === 0) {
                // Se non trova articoli, crea un record riassuntivo
                records.push({
                    tipo: 'ORD',
                    agente: numeroAgente,
                    cliente: cliente || 'Cliente non trovato',
                    codiceArticolo: '-',
                    descrizione: 'Visualizza dettagli completo',
                    prezzo: '-',
                    fullContent: content,
                    rigaOriginale: ''
                });
            }
            
            return records;
        }

        function parseSCA(filename, content) {
            const match = filename.match(/^SCA-(\d+)\.txt$/i);
            if (!match) return null;
            
            const numeroAgente = match[1];
            const records = [];
            const lines = content.split('\n');
            
            let currentCliente = '';
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                
                // Cerca riga cliente
                const clienteMatch = line.match(/CLIENTE:\s+\d+\s+([A-Z\s\.\']+)/);
                if (clienteMatch) {
                    currentCliente = clienteMatch[1].trim();
                }
                
                // Cerca righe scadenze
                const scadenzaMatch = line.match(/^(\d{2}\/\d{2}\/\d{4})\s+(.+?)\s+(\d+)\s+(\d{2}\/\d{2}\/\d{4})\s+Euro\s+([\d\.,\-]+)/);
                if (scadenzaMatch && currentCliente) {
                    records.push({
                        tipo: 'SCA',
                        agente: numeroAgente,
                        cliente: currentCliente,
                        scadenza: scadenzaMatch[1],
                        descrizione: scadenzaMatch[2].trim(),
                        nDoc: scadenzaMatch[3],
                        dataDoc: scadenzaMatch[4],
                        importo: scadenzaMatch[5].replace(',', '.'),
                        fullContent: content,
                        rigaOriginale: line
                    });
                }
            }
            
            return records;
        }

        // ==================== PARSER GENERALE ====================
        
        function parseFile(filename, content) {
            if (filename.match(/^DDT-\d+\.txt$/i)) {
                return parseDDT(filename, content);
            } else if (filename.match(/^ORD-\d+\.txt$/i)) {
                return parseORD(filename, content);
            } else if (filename.match(/^SCA-\d+\.txt$/i)) {
                return parseSCA(filename, content);
            }
            return null;
        }

        // ==================== RENDER TABELLA ====================
        
        function renderDocuments(documents) {
            const container = document.getElementById('documentsList');
            const filter = document.getElementById('typeFilter').value;
            
            let filtered = documents;
            if (filter !== 'all') {
                filtered = documents.filter(doc => doc.tipo === filter);
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="error" style="display:block;">Nessun documento trovato</div>';
                return;
            }
            
            const html = `
                <table class="doc-table">
                    <thead>
                        <tr>
                            <th>Tipo</th>
                            <th>N° Agente</th>
                            <th>Cliente / Descrizione</th>
                            <th>N° Documento</th>
                            <th>Data / Scadenza</th>
                            <th>Importo</th>
                            <th>Dettagli</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filtered.map((doc, idx) => `
                            <tr data-index="${idx}">
                                <td><span class="type-badge type-${doc.tipo}">${doc.tipo}</span></td>
                                <td>${doc.agente || '-'}</td>
                                <td>${doc.cliente || doc.descrizione || '-'}</td>
                                <td>${doc.nDoc || doc.codiceArticolo || doc.scadenza || '-'}</td>
                                <td>${doc.data || doc.dataDoc || doc.scadenza || '-'}</td>
                                <td>${doc.totale || doc.importo || doc.prezzo || '-'}</td>
                                <td><button class="detail-btn" data-index="${idx}">📄 Dettagli</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            container.innerHTML = html;
            
            // Attacca eventi ai pulsanti dettagli
            document.querySelectorAll('.detail-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const index = parseInt(btn.getAttribute('data-index'));
                    showDetails(filtered[index]);
                });
            });
        }
        
        // ==================== MODALE DETTAGLI ====================
        
        function showDetails(doc) {
            const modal = document.getElementById('detailModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            modalTitle.textContent = `${doc.tipo} - Dettagli completi`;
            
            // Costruisci contenuto dettagliato in base al tipo
            let detailsHtml = '<div class="detail-section"><h4>📋 Informazioni principali</h4>';
            detailsHtml += `<p><strong>Tipo:</strong> ${doc.tipo}</p>`;
            detailsHtml += `<p><strong>Agente:</strong> ${doc.agente || '-'}</p>`;
            
            if (doc.tipo === 'DDT') {
                detailsHtml += `<p><strong>Codice Cliente:</strong> ${doc.codiceCliente || '-'}</p>`;
                detailsHtml += `<p><strong>Cliente:</strong> ${doc.cliente || '-'}</p>`;
                detailsHtml += `<p><strong>N. Documento:</strong> ${doc.nDoc || '-'}</p>`;
                detailsHtml += `<p><strong>Data:</strong> ${doc.data || '-'}</p>`;
                detailsHtml += `<p><strong>Totale:</strong> € ${doc.totale || '-'}</p>`;
            } else if (doc.tipo === 'ORD') {
                detailsHtml += `<p><strong>Cliente:</strong> ${doc.cliente || '-'}</p>`;
                detailsHtml += `<p><strong>Codice Articolo:</strong> ${doc.codiceArticolo || '-'}</p>`;
                detailsHtml += `<p><strong>Descrizione:</strong> ${doc.descrizione || '-'}</p>`;
                detailsHtml += `<p><strong>Prezzo:</strong> € ${doc.prezzo || '-'}</p>`;
            } else if (doc.tipo === 'SCA') {
                detailsHtml += `<p><strong>Cliente:</strong> ${doc.cliente || '-'}</p>`;
                detailsHtml += `<p><strong>Scadenza:</strong> ${doc.scadenza || '-'}</p>`;
                detailsHtml += `<p><strong>Descrizione:</strong> ${doc.descrizione || '-'}</p>`;
                detailsHtml += `<p><strong>N. Documento:</strong> ${doc.nDoc || '-'}</p>`;
                detailsHtml += `<p><strong>Data Documento:</strong> ${doc.dataDoc || '-'}</p>`;
                detailsHtml += `<p><strong>Importo:</strong> € ${doc.importo || '-'}</p>`;
            }
            
            detailsHtml += '</div>';
            detailsHtml += '<div class="detail-section"><h4>📄 Contenuto completo del file</h4>';
            detailsHtml += `<pre>${escapeHtml(doc.fullContent || 'Nessun contenuto')}</pre>`;
            detailsHtml += '</div>';
            
            modalBody.innerHTML = detailsHtml;
            modal.classList.remove('hidden');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // ==================== GESTIONE FILE ====================
        
        async function handleFiles(files) {
            const loadingDiv = document.getElementById('loadingIndicator');
            const errorDiv = document.getElementById('errorMessage');
            
            loadingDiv.classList.remove('hidden');
            errorDiv.classList.add('hidden');
            
            const allRecords = [];
            
            for (const file of files) {
                if (!file.name.endsWith('.txt')) continue;
                
                try {
                    const content = await file.text();
                    const parsed = parseFile(file.name, content);
                    
                    if (parsed) {
                        if (Array.isArray(parsed)) {
                            allRecords.push(...parsed);
                        } else {
                            allRecords.push(parsed);
                        }
                    } else {
                        console.warn(`Formato non riconosciuto: ${file.name}`);
                    }
                } catch (err) {
                    console.error(`Errore lettura ${file.name}:`, err);
                    errorDiv.textContent = `Errore lettura ${file.name}`;
                    errorDiv.classList.remove('hidden');
                    setTimeout(() => errorDiv.classList.add('hidden'), 3000);
                }
            }
            
            currentDocuments = allRecords;
            renderDocuments(currentDocuments);
            loadingDiv.classList.add('hidden');
            
            if (allRecords.length === 0) {
                errorDiv.textContent = 'Nessun documento valido trovato. Usa file DDT-XX.txt, ORD-XX.txt o SCA-XX.txt';
                errorDiv.classList.remove('hidden');
                setTimeout(() => errorDiv.classList.add('hidden'), 5000);
            }
        }
        
        // ==================== SETUP EVENTI ====================
        
        function setupEventListeners() {
            const fileInput = document.getElementById('fileInput');
            const selectBtn = document.getElementById('selectFilesBtn');
            const openDriveBtn = document.getElementById('openDriveBtn');
            const filterSelect = document.getElementById('typeFilter');
            
            selectBtn.addEventListener('click', () => {
                fileInput.click();
            });
            
            fileInput.addEventListener('change', (event) => {
                if (event.target.files.length > 0) {
                    handleFiles(Array.from(event.target.files));
                }
                fileInput.value = '';
            });
            
            openDriveBtn.addEventListener('click', () => {
                window.open(DRIVE_FOLDER_URL, '_blank');
            });
            
            filterSelect.addEventListener('change', () => {
                renderDocuments(currentDocuments);
            });
            
            // Chiudi modale
            document.querySelector('.close-btn').addEventListener('click', () => {
                document.getElementById('detailModal').classList.add('hidden');
            });
            
            window.addEventListener('click', (e) => {
                const modal = document.getElementById('detailModal');
                if (e.target === modal) {
                    modal.classList.add('hidden');
                }
            });
        }
        
        // ==================== INIT ====================
        
        setupEventListeners();
        
        console.log('App pronta! Carica i file DDT-XX.txt, ORD-XX.txt, SCA-XX.txt');
    </script>
</body>
</html>

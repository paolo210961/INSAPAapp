<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DDT · ORD · SCA - DIAGNOSTICO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        h1 { font-size: 1.5rem; }
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-drive { background: #4285f4; }
        .btn-gray { background: #666; }
        .filter-row {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin: 15px 20px;
        }
        select, input {
            padding: 10px 15px;
            border-radius: 25px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        .cliente-section {
            margin: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .cliente-header {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .cliente-totale {
            background: #4CAF50;
            padding: 5px 15px;
            border-radius: 25px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        tr:nth-child(even) { background-color: #f8f9fa; }
        .rep-count {
            background: #2196F3;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
        }
        .empty-msg { text-align: center; padding: 40px; color: #999; }
        .debug-panel {
            margin: 20px;
            padding: 15px;
            background: #1e1e1e;
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            border-radius: 10px;
            max-height: 400px;
            overflow: auto;
            white-space: pre-wrap;
        }
        @media (max-width: 768px) {
            header { flex-direction: column; align-items: stretch; }
            .filter-row { flex-direction: column; align-items: stretch; }
            select, input { width: 100%; }
            th, td { font-size: 12px; padding: 6px; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📋 DDT · ORD · SCA (DIAGNOSTICO)</h1>
        <div style="display: flex; gap: 10px;">
            <button id="driveBtn" class="btn btn-drive">📁 Apri Drive</button>
            <button id="loadBtn" class="btn">📂 Carica file</button>
            <button id="clearBtn" class="btn btn-gray">🗑️ Cancella memoria</button>
        </div>
    </header>

    <div class="filter-row">
        <select id="tipoSelect">
            <option value="DDT">📦 DDT</option>
            <option value="ORD">📋 ORD</option>
        </select>
        <select id="clientSelect"><option value="">-- Seleziona cliente --</option></select>
        <input type="text" id="clientSearch" placeholder="🔍 Cerca cliente">
    </div>

    <div id="debugPanel" class="debug-panel">📌 Carica un file DDT per vedere il debug...</div>

    <div id="mainContent" style="padding: 0 20px 20px 20px;">
        <div class="empty-msg">📌 Clicca "Carica file" e seleziona i tuoi file .txt</div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'saved_files_data';
    let currentData = null;
    let savedFiles = [];
    let debugLogs = [];

    function debug(msg) {
        debugLogs.push(msg);
        console.log(msg);
        const panel = document.getElementById('debugPanel');
        panel.innerHTML = debugLogs.slice(-50).join('<br>');
        panel.scrollTop = panel.scrollHeight;
    }

    function parseDDT(content) {
        debug('========== INIZIO PARSER DDT ==========');
        const lines = content.split('\n');
        debug(`Totale righe: ${lines.length}`);
        
        const clienti = new Map();
        const occorrenzeArticoli = new Map();
        
        // Conta occorrenze di ogni codice articolo
        for (let line of lines) {
            const match = line.match(/^\s{5,}([A-Z0-9]{5,})\s/);
            if (match) {
                const codice = match[1];
                occorrenzeArticoli.set(codice, (occorrenzeArticoli.get(codice) || 0) + 1);
            }
        }
        debug(`Occorrenze articoli contate: ${occorrenzeArticoli.size} codici unici`);
        
        let currentCliente = null;
        let rigaNum = 0;
        
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            rigaNum++;
            
            // Rileva intestazione cliente
            const clienteMatch = line.match(/^\s*(\d+)\s+([A-Z\s\.\'\&\(\)\-\/]+?)\s+(\d+)\s+(\d{2}\/\d{2}\/\d{4})/);
            if (clienteMatch && !line.includes('DEST.') && !line.includes('Rif.') && !line.includes('AGENTE')) {
                const nomeCliente = clienteMatch[2].trim();
                let totaleDDT = 0;
                const totaleMatch = line.match(/(\d{1,3}(?:\.\d{3})*,\d{2})\s*$/);
                if (totaleMatch) {
                    totaleDDT = parseFloat(totaleMatch[1].replace(/\./g, '').replace(',', '.'));
                }
                
                if (!clienti.has(nomeCliente)) {
                    clienti.set(nomeCliente, { nome: nomeCliente, totale: 0, articoli: new Map() });
                    debug(`[RIGA ${rigaNum}] NUOVO CLIENTE: "${nomeCliente}" - Totale DDT: ${totaleDDT}`);
                } else {
                    debug(`[RIGA ${rigaNum}] CLIENTE ESISTENTE: "${nomeCliente}" - Aggiunto totale: ${totaleDDT}`);
                }
                const cliente = clienti.get(nomeCliente);
                cliente.totale += totaleDDT;
                currentCliente = cliente;
                continue;
            }
            
            // Rileva articolo
            if (currentCliente) {
                // Cerca pattern articolo
                const artMatch = line.match(/^\s{5,}([A-Z0-9]{5,})\s+([A-Z0-9\s\.\-\(\)\*\+\/\\\&\'\,]+?)\s{2,}([A-Z]{1,3})\s+(\d+)\s+([\d\.,]+)/);
                if (artMatch) {
                    const codice = artMatch[1];
                    const descrizione = artMatch[2].trim().substring(0, 55);
                    const um = artMatch[3];
                    const quantita = parseFloat(artMatch[4]) || 0;
                    const prezzo = parseFloat(artMatch[5].replace(',', '.')) || 0;
                    
                    debug(`[RIGA ${rigaNum}] ARTICOLO: codice=${codice}, descrizione="${descrizione.substring(0, 30)}...", um=${um}, qta=${quantita}, prezzo=${prezzo}`);
                    
                    if (!currentCliente.articoli.has(codice)) {
                        currentCliente.articoli.set(codice, {
                            codice: codice,
                            descrizione: descrizione,
                            um: um,
                            quantita: quantita,
                            prezzo: prezzo,
                            sconto: 0,
                            count: occorrenzeArticoli.get(codice) || 1
                        });
                        debug(`  -> Nuovo articolo aggiunto al cliente ${currentCliente.nome}`);
                    } else {
                        const existing = currentCliente.articoli.get(codice);
                        existing.quantita += quantita;
                        existing.prezzo = prezzo;
                        debug(`  -> Articolo esistente, quantità aggiornata a ${existing.quantita}`);
                    }
                }
            }
        }
        
        debug(`========== TOTALE CLIENTI UNICI: ${clienti.size} ==========`);
        for (let cliente of clienti.values()) {
            debug(`Cliente: "${cliente.nome}" - Totale speso: ${cliente.totale.toFixed(2)} - Articoli unici: ${cliente.articoli.size}`);
        }
        
        const result = [];
        for (let cliente of clienti.values()) {
            if (cliente.articoli.size > 0) {
                result.push({
                    nome: cliente.nome,
                    totale: cliente.totale,
                    articoli: Array.from(cliente.articoli.values())
                });
            } else {
                debug(`ATTENZIONE: Cliente "${cliente.nome}" ha 0 articoli!`);
            }
        }
        return result;
    }

    function parseORD(content) {
        const match = content.match(/Cliente\s*:\s*\d+\s+([^\n]+)/);
        const cliente = match ? match[1].trim() : 'Cliente';
        return [{ nome: cliente, totale: 0, articoli: [] }];
    }

    function detectType(content) {
        const u = content.toUpperCase();
        if (u.includes('STAMPA BROGLIACCIO D.D.T.')) return 'DDT';
        if (u.includes('CLIENTE') && (u.includes('COD. ARTICOLO') || u.includes('DESCRIZIONE'))) return 'ORD';
        return null;
    }

    function processFile(name, content) {
        debug(`\n📄 PROCESSANDO FILE: ${name}`);
        const tipo = detectType(content);
        debug(`Tipo rilevato: ${tipo}`);
        if (tipo === 'DDT') return parseDDT(content);
        if (tipo === 'ORD') return parseORD(content);
        return null;
    }

    async function loadFiles(files) {
        debugLogs = [];
        debug('🔍 Caricamento file in corso...');
        
        for (let file of files) {
            if (!file.name.endsWith('.txt')) continue;
            const content = await file.text();
            const idx = savedFiles.findIndex(f => f.name === file.name);
            if (idx !== -1) savedFiles[idx] = { name: file.name, content };
            else savedFiles.push({ name: file.name, content });
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(savedFiles));
        reloadAllData();
    }

    function reloadAllData() {
        let allRecords = [];
        let firstTipo = null;
        for (let f of savedFiles) {
            const parsed = processFile(f.name, f.content);
            if (parsed && parsed.length > 0) {
                if (!firstTipo) firstTipo = f.name.toUpperCase().includes('DDT') ? 'DDT' : 'ORD';
                allRecords.push(...parsed);
            }
        }
        if (allRecords.length) {
            currentData = { tipo: firstTipo, parsed: allRecords };
            renderClientSelect();
            renderMainContent();
            debug(`✅ Caricamento completato. Clienti visualizzati: ${allRecords.length}`);
        } else {
            document.getElementById('mainContent').innerHTML = '<div class="empty-msg">📭 Nessun file valido. Carica DDT o ORD.</div>';
            document.getElementById('clientSelect').innerHTML = '<option value="">-- Nessun cliente --</option>';
        }
    }

    function renderClientSelect() {
        const sel = document.getElementById('clientSelect');
        if (!currentData || !currentData.parsed || currentData.parsed.length === 0) {
            sel.innerHTML = '<option value="">-- Nessun cliente --</option>';
            return;
        }
        let html = '<option value="">-- Seleziona un cliente --</option>';
        for (let c of currentData.parsed) {
            html += `<option value="${escapeHtml(c.nome)}">${escapeHtml(c.nome)}</option>`;
        }
        sel.innerHTML = html;
    }

    function renderMainContent() {
        const tipo = document.getElementById('tipoSelect').value;
        if (!currentData || currentData.tipo !== tipo) {
            document.getElementById('mainContent').innerHTML = `<div class="empty-msg">📭 Cambia a ${currentData?.tipo || 'DDT'}</div>`;
            return;
        }
        const selected = document.getElementById('clientSelect').value;
        if (!selected) {
            document.getElementById('mainContent').innerHTML = '<div class="empty-msg">👆 Seleziona un cliente dalla tendina</div>';
            return;
        }
        const client = currentData.parsed.find(c => c.nome === selected);
        if (!client || !client.articoli.length) {
            document.getElementById('mainContent').innerHTML = `<div class="empty-msg">Nessun articolo trovato per ${escapeHtml(selected)}</div>`;
            return;
        }
        
        let html = `<div class="cliente-section">
            <div class="cliente-header">
                <span>🏢 ${escapeHtml(client.nome)}</span>
                <span class="cliente-totale">💰 Totale: € ${client.totale.toFixed(2)}</span>
            </div>
            <table class="articoli-table">
                <thead>
                    <tr><th>Codice</th><th>Descrizione</th><th>Um</th><th>Qtà</th><th>Prezzo €</th><th>Sconto %</th><th>Acquisti</th></tr>
                </thead>
                <tbody>`;
        
        for (let art of client.articoli) {
            html += `<tr>
                <td>${escapeHtml(art.codice)}</td>
                <td style="max-width:300px;">${escapeHtml(art.descrizione)}</td>
                <td>${art.um || '-'}</td>
                <td>${art.quantita}</td>
                <td>€ ${art.prezzo.toFixed(4)}</td>
                <td>${art.sconto}%</td>
                <td><span class="rep-count">${art.count} volte</span></td>
            </tr>`;
        }
        html += `</tbody>}</div>`;
        document.getElementById('mainContent').innerHTML = html;
    }

    function escapeHtml(s) { 
        if (!s) return '';
        return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); 
    }

    function clearMemory() {
        if (confirm('Cancellare tutti i file salvati?')) {
            savedFiles = [];
            localStorage.removeItem(STORAGE_KEY);
            currentData = null;
            document.getElementById('mainContent').innerHTML = '<div class="empty-msg">Memoria cancellata. Ricarica i file.</div>';
            document.getElementById('clientSelect').innerHTML = '<option value="">-- Nessun cliente --</option>';
            debugLogs = [];
            document.getElementById('debugPanel').innerHTML = '📌 Memoria cancellata';
        }
    }

    document.getElementById('driveBtn').onclick = () => window.open('https://drive.google.com/drive/folders/1V7BH-_UZzLz7GshRN1ypMtWnvx36NcC4', '_blank');
    document.getElementById('loadBtn').onclick = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.multiple = true;
        input.accept = '.txt';
        input.onchange = (e) => loadFiles(Array.from(e.target.files));
        input.click();
    };
    document.getElementById('clearBtn').onclick = clearMemory;
    document.getElementById('tipoSelect').onchange = () => renderMainContent();
    document.getElementById('clientSelect').onchange = () => renderMainContent();
    document.getElementById('clientSearch').oninput = (e) => {
        const term = e.target.value.toLowerCase();
        const opts = document.getElementById('clientSelect').options;
        for (let i = 1; i < opts.length; i++) {
            opts[i].style.display = opts[i].text.toLowerCase().includes(term) ? '' : 'none';
        }
    };

    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
        try {
            savedFiles = JSON.parse(stored);
            reloadAllData();
        } catch(e) {}
    }
</script>
</body>
</html>

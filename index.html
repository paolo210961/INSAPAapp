<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>inSAPA - Accesso</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: #eef2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-screen {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .logo-login {
            max-width: 200px;
            max-height: 80px;
            margin-bottom: 20px;
            object-fit: contain;
        }
        .login-card h2 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .login-card p {
            color: #7f8c8d;
            margin-bottom: 25px;
        }
        .profile-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .profile-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 12px;
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            flex: 1;
            min-width: 150px;
        }
        .profile-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        .profile-btn.agenti {
            background: #27ae60;
        }
        .footer-login {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #95a5a6;
        }
        .logo-area {
            margin-bottom: 20px;
        }
        .logo-rettangolo {
            width: 100%;
            max-width: 250px;
            height: 80px;
            margin: 0 auto;
            background: transparent;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }
        .logo-rettangolo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .logo-placeholder {
            text-align: center;
            padding: 10px;
        }
        .logo-placeholder span {
            font-size: 0.8rem;
            color: #7f8c8d;
            display: block;
            margin-bottom: 8px;
        }
        .btn-carica-logo {
            background: #3498db;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: bold;
        }
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .password-modal {
            background: white;
            border-radius: 16px;
            padding: 25px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }
        .password-modal input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .btn-group button {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-ok { background: #27ae60; color: white; }
        .btn-cancel { background: #95a5a6; color: white; }
    </style>
</head>
<body>
<div class="login-screen">
    <div class="login-card">
        <div class="logo-area">
            <div id="logoRettangolo" class="logo-rettangolo">
                <div id="logoPlaceholder" class="logo-placeholder">
                    <span>🏢 LOGO AZIENDA</span>
                    <button id="btnCaricaLogo" class="btn-carica-logo">📁 CARICA LOGO</button>
                </div>
                <img id="logoImmagine" style="display: none;" alt="Logo">
            </div>
        </div>
        <h2>🏢 inSAPA s.a.s.</h2>
        <p>Seleziona il tuo profilo</p>
        <div class="profile-buttons">
            <button id="btnContabilita" class="profile-btn">📊 CONTABILITÀ</button>
            <button id="btnAgenti" class="profile-btn agenti">👥 AGENTI</button>
        </div>
        <div class="footer-login">Sistema di Contabilità e Agenti</div>
    </div>
</div>

<script>
// ==================== GESTIONE LOGO CONDIVISO ====================
let ADMIN_PASSWORD = localStorage.getItem('admin_password') || "insapa2026";

function caricaLogoSalvato() {
    const logoSalvato = localStorage.getItem('logo_azienda');
    if (logoSalvato) {
        document.getElementById('logoImmagine').src = logoSalvato;
        document.getElementById('logoImmagine').style.display = 'block';
        document.getElementById('logoPlaceholder').style.display = 'none';
    }
}

function salvaLogo(url) {
    localStorage.setItem('logo_azienda', url);
}

function caricaLogoDaFile() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const logoUrl = ev.target.result;
                document.getElementById('logoImmagine').src = logoUrl;
                document.getElementById('logoImmagine').style.display = 'block';
                document.getElementById('logoPlaceholder').style.display = 'none';
                salvaLogo(logoUrl);
            };
            reader.readAsDataURL(file);
        }
    };
    input.click();
}

document.getElementById('btnCaricaLogo').onclick = (e) => {
    e.stopPropagation();
    caricaLogoDaFile();
};

let pressTimer = null;
const logoDiv = document.getElementById('logoRettangolo');
logoDiv.addEventListener('mousedown', () => {
    pressTimer = setTimeout(() => {
        if (document.getElementById('logoImmagine').style.display === 'block') {
            caricaLogoDaFile();
        }
        pressTimer = null;
    }, 3000);
});
logoDiv.addEventListener('mouseup', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
logoDiv.addEventListener('mouseleave', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });

caricaLogoSalvato();

// ==================== PASSWORD OVERLAY ====================
function mostraPasswordOverlay(callback) {
    const overlay = document.createElement('div');
    overlay.className = 'password-overlay';
    overlay.innerHTML = `
        <div class="password-modal">
            <h3>🔐 Accesso Contabilità</h3>
            <p>Inserisci la password amministratore</p>
            <input type="password" id="pwdInput" placeholder="Password">
            <div class="btn-group">
                <button id="pwdOkBtn" class="btn-ok">OK</button>
                <button id="pwdCancelBtn" class="btn-cancel">ANNULLA</button>
            </div>
        </div>
    `;
    document.body.appendChild(overlay);
    
    document.getElementById('pwdOkBtn').onclick = () => {
        const pwd = document.getElementById('pwdInput').value;
        if (pwd === ADMIN_PASSWORD) {
            overlay.remove();
            callback(true);
        } else {
            alert("Password errata!");
            overlay.remove();
            callback(false);
        }
    };
    document.getElementById('pwdCancelBtn').onclick = () => {
        overlay.remove();
        callback(false);
    };
}

// ==================== NAVIGAZIONE ====================
// Contabilità → chiede password
document.getElementById('btnContabilita').onclick = () => {
    mostraPasswordOverlay((success) => {
        if (success) {
            window.location.href = 'contabilita.html';
        }
    });
};

// Agenti → NON chiede password
document.getElementById('btnAgenti').onclick = () => {
    window.location.href = 'agenti.html';
};
</script>
</body>
</html>

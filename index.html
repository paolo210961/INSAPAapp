<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>AGENTI - Gestione DDT, ORD, SCA</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: #eef2f5;
            min-height: 100vh;
        }
        .header {
            background: white;
            padding: 15px 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .title-area {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        h1 {
            margin: 0;
            font-size: 1.8rem;
            color: #2c3e50;
        }
        .version {
            background: #3498db;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-img {
            max-height: 60px;
            max-width: 200px;
            cursor: pointer;
            transition: transform 0.1s;
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 4px;
            background: white;
        }
        .logo-img:active {
            transform: scale(0.98);
        }
        .btn-logo {
            background: #ecf0f1;
            border: 1px solid #bdc3c7;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-logo:hover {
            background: #dfe6e9;
        }
        .main-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .sidebar {
            width: 280px;
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        .file-upload-section {
            margin-bottom: 25px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 20px;
        }
        .upload-btn {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .upload-btn:hover {
            background: #1a252f;
        }
        .file-status {
            font-size: 0.75rem;
            color: #27ae60;
            margin-top: 8px;
            text-align: center;
        }
        .filter-group {
            margin-bottom: 25px;
        }
        .filter-group label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
        }
        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 0.9rem;
            background: white;
        }
        .cliente-rosso {
            color: #c0392b;
            font-weight: bold;
        }
        .content-area {
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        .scadenze-box {
            background: #f8f9fa;
            border-left: 4px solid #3498db;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 10px;
        }
        .scadenze-box h3 {
            margin-top: 0;
            color: #2c3e50;
        }
        .tabella {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .tabella th, .tabella td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
            vertical-align: top;
        }
        .tabella th {
            background: #e9ecef;
        }
        .articolo-ord {
            margin-bottom: 10px;
            font-family: monospace;
            white-space: pre-wrap;
            border-bottom: 1px solid #eee;
            padding: 5px;
        }
        .info-messaggio {
            color: #7f8c8d;
            font-style: italic;
            padding: 15px;
            text-align: center;
        }
        .error {
            color: #c0392b;
            background: #fae2e2;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
        }
        footer {
            text-align: center;
            margin: 20px;
            font-size: 0.7rem;
            color: #95a5a6;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title-area">
            <h1>AGENTI</h1>
            <span class="version">v1.0</span>
        </div>
        <div class="logo-area" id="logoArea">
            <button id="btnCaricaLogo" class="btn-logo">📁 Carica logo</button>
            <img id="logoImmagine" class="logo-img" style="display: none;" alt="Logo azienda">
        </div>
    </div>

    <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="file-upload-section">
                <button id="btnCaricaFile" class="upload-btn">📂 Carica DDT + ORD + SCA</button>
                <div id="fileStatus" class="file-status">Nessun file caricato</div>
                <input type="file" id="fileInputMulti" multiple accept=".txt,.csv,.text/plain" style="display: none;">
            </div>
            <div class="filter-group">
                <label>👥 Cliente</label>
                <select id="selectCliente" disabled>
                    <option value="">-- Seleziona cliente --</option>
                </select>
            </div>
            <div class="filter-group">
                <label>📄 Tipo documento</label>
                <select id="selectTipo" disabled>
                    <option value="DDT">DDT (Distinta Trasporto)</option>
                    <option value="ORD">ORD (Ordini)</option>
                </select>
            </div>
        </div>

        <!-- Area contenuti: scadenze e articoli sotto le tendine -->
        <div class="content-area">
            <div id="scadenzeContainer"></div>
            <div id="dettaglioContainer"></div>
        </div>
    </div>
    <footer>I file vengono letti localmente nel browser. Premere 3 secondi sul logo per cambiarlo.</footer>

    <script>
        // --------------------------------------------------------------
        // PARSER DDT CONSOLIDATO (funzionante)
        // --------------------------------------------------------------
        function parseDDT(text) {
            const lines = text.split(/\r?\n/);
            const clienti = new Map();
            let currentCliente = null;
            let currentArticolo = null;
            let descrizioneBuffer = "";

            function salvaArticolo() {
                if (!currentArticolo || !currentCliente) return;
                let descrizione = descrizioneBuffer ? currentArticolo.descRaw + " " + descrizioneBuffer : currentArticolo.descRaw;
                descrizione = descrizione.replace(/\s+/g, ' ').trim();
                const existing = currentCliente.articoli.get(currentArticolo.codice);
                if (existing) {
                    existing.quantitaTot += currentArticolo.quantita;
                    existing.conteggio++;
                    existing.ultimoPrezzo = currentArticolo.prezzo;
                } else {
                    currentCliente.articoli.set(currentArticolo.codice, {
                        codice: currentArticolo.codice,
                        descrizione: descrizione,
                        um: currentArticolo.um,
                        quantitaTot: currentArticolo.quantita,
                        ultimoPrezzo: currentArticolo.prezzo,
                        conteggio: 1
                    });
                }
                currentArticolo = null;
                descrizioneBuffer = "";
            }

            const reCliente = /^\s{4,}(\d+)\s+(.+?)\s+\d+\s+\d{2}\/\d{2}\/\d{4}/;
            const reArticolo = /^\s{20,}([A-Z0-9]+)\s+(.+?)\s+([A-Z\.]+)\s+(\d+(?:,\d+)?)\s+(\d+(?:,\d+)?)\s+(\d+(?:,\d+)?)/;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                if (line.trim() === "" || line.startsWith("===") || line.startsWith("----------------------------------------------------------------")) continue;

                let mCliente = line.match(reCliente);
                if (mCliente) {
                    salvaArticolo();
                    const codiceCliente = mCliente[1];
                    let resto = mCliente[2];
                    let numeroDocMatch = resto.match(/\s+(\d+)\s*$/);
                    let ragioneSociale = numeroDocMatch ? resto.substring(0, resto.lastIndexOf(numeroDocMatch[1])).trim() : resto.trim();
                    const key = `${codiceCliente}|${ragioneSociale}`;
                    if (!clienti.has(key)) {
                        clienti.set(key, { codice: codiceCliente, ragione: ragioneSociale, articoli: new Map() });
                    }
                    currentCliente = clienti.get(key);
                    continue;
                }
                if (!currentCliente) continue;

                if (line.includes("Totale") || line.includes("VOSTRO DARE") || line.includes("ELIMINATO") || line.includes("INESISTENTE") ||
                    line.includes("Rif.:") || line.includes("Destinaz.") || line.includes("Telefoni") || line.includes("Ord.") ||
                    line.includes("Riferimento") || line.includes("----") || line.includes("====")) {
                    continue;
                }

                let mArt = line.match(reArticolo);
                if (mArt) {
                    salvaArticolo();
                    currentArticolo = {
                        codice: mArt[1],
                        descRaw: mArt[2].trim(),
                        um: mArt[3].trim(),
                        quantita: parseFloat(mArt[4].replace(',', '.')),
                        prezzo: parseFloat(mArt[5].replace(',', '.')),
                        sconto1: parseFloat(mArt[6].replace(',', '.'))
                    };
                    descrizioneBuffer = "";
                    if (i+1 < lines.length) {
                        let nextLine = lines[i+1];
                        if (nextLine.match(/^\s{30,}/) && !nextLine.match(/^\s{20,}[A-Z0-9]/)) {
                            descrizioneBuffer = nextLine.trim();
                            i++;
                        }
                    }
                } else if (currentArticolo && line.trim() && !line.includes("==") && !line.includes("--")) {
                    if (descrizioneBuffer) descrizioneBuffer += " " + line.trim();
                    else descrizioneBuffer = line.trim();
                }
            }
            salvaArticolo();

            const result = [];
            for (let [_, val] of clienti) {
                result.push({
                    codice: val.codice,
                    ragione: val.ragione,
                    articoli: Array.from(val.articoli.values())
                });
            }
            return result;
        }

        // --------------------------------------------------------------
        // PARSER ORD
        // --------------------------------------------------------------
        function parseORD(text) {
            const lines = text.split(/\r?\n/);
            const clienti = new Map();
            let currentCliente = null;
            const reCliente = /^Cliente\s+:\s+(\d+)\s+(.+?)(?:\s{2,}|$)/;
            const reCoppia = /(\d+(?:,\d+)?)\s+(\d{2}\/\d{2}\/\d{4})/g;

            for (let line of lines) {
                line = line.trimEnd();
                if (line === "") continue;

                let mCliente = line.match(reCliente);
                if (mCliente) {
                    currentCliente = { codice: mCliente[1], ragione: mCliente[2].trim(), articoli: [] };
                    clienti.set(currentCliente.codice, currentCliente);
                    continue;
                }
                if (!currentCliente) continue;
                if (line.startsWith("Destinaz.") || line.startsWith("Telefoni") || line.includes("INESISTENTE") || line.includes("ELIMINATO"))
                    continue;

                let coppie = [];
                let match;
                while ((match = reCoppia.exec(line)) !== null) {
                    let qta = parseFloat(match[1].replace(',', '.'));
                    let data = match[2];
                    coppie.push({ qta, data, start: match.index, end: match.index + match[0].length });
                }
                if (coppie.length === 0) continue;

                let firstCoppiaStart = coppie[0].start;
                let descrizioneRaw = line.substring(0, firstCoppiaStart).trim();
                let tokens = descrizioneRaw.split(/\s+/);
                let codice = tokens[0];
                let descrizione = tokens.slice(1).join(" ");

                let lastCoppiaEnd = coppie[coppie.length-1].end;
                let afterCoppie = line.substring(lastCoppiaEnd).trim();
                let numTokens = afterCoppie.split(/\s+/);
                let prezzo = 0, sconto1 = 0;
                if (numTokens.length >= 2) {
                    prezzo = parseFloat(numTokens[0].replace(',', '.'));
                    sconto1 = parseFloat(numTokens[1].replace(',', '.'));
                }

                coppie.sort((a,b) => new Date(b.data.split('/').reverse().join('-')) - new Date(a.data.split('/').reverse().join('-')));
                currentCliente.articoli.push({ codice, descrizione, coppie, prezzo, sconto1 });
            }
            return Array.from(clienti.values());
        }

        // --------------------------------------------------------------
        // PARSER SCA
        // --------------------------------------------------------------
        function parseSCA(text) {
            const lines = text.split(/\r?\n/);
            const clienti = new Map();
            let currentCliente = null;
            const reCliente = /^CLIENTE:\s+(\d+)\s+(.+?)\s+Saldo\s+[\d\.,]+/;
            const reScadenza = /^(\d{2}\/\d{2}\/\d{4})\s+.*?(\d+)\s+(\d{2}\/\d{2}\/\d{4})\s+Euro\s+([\d\.,]+)/;

            for (let line of lines) {
                line = line.trim();
                if (line === "") continue;

                let mCliente = line.match(reCliente);
                if (mCliente) {
                    currentCliente = { codice: mCliente[1], ragione: mCliente[2].trim(), scadenze: [] };
                    clienti.set(currentCliente.codice, currentCliente);
                    continue;
                }
                if (currentCliente) {
                    let mScad = line.match(reScadenza);
                    if (mScad) {
                        let scadenza = mScad[1];
                        let numDoc = mScad[2];
                        let dataDoc = mScad[3];
                        let importoStr = mScad[4].replace(/\./g, '').replace(',', '.');
                        let importo = parseFloat(importoStr);
                        currentCliente.scadenze.push({ scadenza, numDoc, dataDoc, importo });
                    }
                }
            }
            return Array.from(clienti.values());
        }

        // --------------------------------------------------------------
        // STATO APPLICAZIONE
        // --------------------------------------------------------------
        let dati = {
            ddt: [],      // array clienti DDT
            ord: [],      // array clienti ORD
            sca: []       // array clienti SCA
        };
        let clientiUnici = new Map(); // key: "codice|ragione", value: { codice, ragione, hasScadenze }

        function aggiornaClientiUnici() {
            clientiUnici.clear();
            // Aggiungi clienti DDT
            for (let c of dati.ddt) {
                let key = `${c.codice}|${c.ragione}`;
                if (!clientiUnici.has(key)) {
                    clientiUnici.set(key, { codice: c.codice, ragione: c.ragione, hasScadenze: false });
                }
            }
            // Aggiungi clienti ORD
            for (let c of dati.ord) {
                let key = `${c.codice}|${c.ragione}`;
                if (!clientiUnici.has(key)) {
                    clientiUnici.set(key, { codice: c.codice, ragione: c.ragione, hasScadenze: false });
                }
            }
            // Aggiungi clienti SCA
            for (let c of dati.sca) {
                let key = `${c.codice}|${c.ragione}`;
                if (!clientiUnici.has(key)) {
                    clientiUnici.set(key, { codice: c.codice, ragione: c.ragione, hasScadenze: false });
                }
                if (c.scadenze.length > 0 && c.scadenze.some(s => s.importo !== 0)) {
                    let cli = clientiUnici.get(key);
                    if (cli) cli.hasScadenze = true;
                }
            }
            // Popola select clienti
            const select = document.getElementById('selectCliente');
            select.innerHTML = '<option value="">-- Seleziona cliente --</option>';
            const sorted = Array.from(clientiUnici.values()).sort((a,b) => a.ragione.localeCompare(b.ragione));
            for (let cli of sorted) {
                const option = document.createElement('option');
                option.value = `${cli.codice}|${cli.ragione}`;
                option.textContent = `${cli.codice} - ${cli.ragione}`;
                if (cli.hasScadenze) {
                    option.classList.add('cliente-rosso');
                    option.style.color = '#c0392b';
                    option.style.fontWeight = 'bold';
                }
                select.appendChild(option);
            }
            select.disabled = (sorted.length === 0);
        }

        function mostraScadenze(clienteKey) {
            const container = document.getElementById('scadenzeContainer');
            if (!clienteKey) {
                container.innerHTML = '<div class="info-messaggio">Seleziona un cliente per vedere le scadenze.</div>';
                return;
            }
            const [codice, ragione] = clienteKey.split('|');
            const clienteSCA = dati.sca.find(c => c.codice === codice && c.ragione === ragione);
            if (!clienteSCA || clienteSCA.scadenze.length === 0) {
                container.innerHTML = `<div class="info-messaggio">Nessuna scadenza per il cliente selezionato.</div>`;
                return;
            }
            let html = `<div class="scadenze-box"><h3>📅 Scadenze - ${codice} ${ragione}</h3>`;
            html += `<table class="tabella"><thead><tr><th>Scadenza</th><th>N. Doc.</th><th>Data documento</th><th>Importo</th></tr></thead><tbody>`;
            for (let s of clienteSCA.scadenze) {
                html += `<tr><td>${s.scadenza}</td><td>${s.numDoc}</td><td>${s.dataDoc}</td><td>${s.importo.toFixed(2).replace('.', ',')}</td></tr>`;
            }
            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        function mostraDettaglio(clienteKey, tipo) {
            const container = document.getElementById('dettaglioContainer');
            if (!clienteKey) {
                container.innerHTML = '<div class="info-messaggio">Seleziona un cliente e un tipo documento.</div>';
                return;
            }
            const [codice, ragione] = clienteKey.split('|');
            let cliente = null;
            if (tipo === 'DDT') {
                cliente = dati.ddt.find(c => c.codice === codice && c.ragione === ragione);
            } else {
                cliente = dati.ord.find(c => c.codice === codice && c.ragione === ragione);
            }
            if (!cliente || (tipo === 'DDT' && cliente.articoli.length === 0) || (tipo === 'ORD' && cliente.articoli.length === 0)) {
                container.innerHTML = `<div class="info-messaggio">Nessun dato ${tipo} per il cliente selezionato.</div>`;
                return;
            }
            let html = `<h3>${tipo === 'DDT' ? '📦 DDT - Riepilogo articoli' : '📋 ORD - Storico ordini'}</h3>`;
            if (tipo === 'DDT') {
                html += `<table class="tabella"><thead>——
<th>Codice</th><th>Descrizione</th><th>UM</th><th>Quantità totale</th><th>Ultimo prezzo</th><th>N° acquisti</th>
</thead><tbody>`;
                for (let art of cliente.articoli) {
                    html += `<tr>
                        <td>${art.codice}</td>
                        <td>${art.descrizione.substring(0, 100)}</td>
                        <td>${art.um}</td>
                        <td>${art.quantitaTot}</td>
                        <td>${art.ultimoPrezzo.toFixed(2).replace('.', ',')}</td>
                        <td>${art.conteggio}</td>
                    </tr>`;
                }
                html += `</tbody></table>`;
            } else {
                for (let art of cliente.articoli) {
                    let coppieStr = '';
                    let num = art.coppie.length;
                    for (let c of art.coppie) {
                        coppieStr += `${num}°-${c.qta.toFixed(2).replace('.', ',')} ${c.data} `;
                        num--;
                    }
                    coppieStr = coppieStr.trim();
                    html += `<div class="articolo-ord"><strong>${art.codice}</strong> ${art.descrizione}<br>${coppieStr}<br>prezzo e sconto ${art.prezzo.toFixed(2).replace('.', ',')} ${art.sconto1.toFixed(2).replace('.', ',')}</div>`;
                }
            }
            container.innerHTML = html;
        }

        function aggiornaTutto() {
            const clienteKey = document.getElementById('selectCliente').value;
            const tipo = document.getElementById('selectTipo').value;
            if (!clienteKey) {
                document.getElementById('scadenzeContainer').innerHTML = '<div class="info-messaggio">Seleziona un cliente.</div>';
                document.getElementById('dettaglioContainer').innerHTML = '<div class="info-messaggio">Seleziona un cliente e un tipo documento.</div>';
                return;
            }
            mostraScadenze(clienteKey);
            mostraDettaglio(clienteKey, tipo);
        }

        // Caricamento file multiplo
        document.getElementById('btnCaricaFile').addEventListener('click', () => {
            document.getElementById('fileInputMulti').click();
        });

        document.getElementById('fileInputMulti').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            let loaded = 0;
            let ddtText = null, ordText = null, scaText = null;
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const content = ev.target.result;
                    const nome = file.name.toLowerCase();
                    if (nome.includes('ddt')) ddtText = content;
                    else if (nome.includes('ord')) ordText = content;
                    else if (nome.includes('sca')) scaText = content;
                    loaded++;
                    if (loaded === files.length) {
                        if (ddtText) dati.ddt = parseDDT(ddtText);
                        if (ordText) dati.ord = parseORD(ordText);
                        if (scaText) dati.sca = parseSCA(scaText);
                        aggiornaClientiUnici();
                        document.getElementById('selectTipo').disabled = false;
                        document.getElementById('fileStatus').innerHTML = `✅ Caricati: ${files.length} file(i)`;
                        document.getElementById('selectCliente').value = '';
                        document.getElementById('scadenzeContainer').innerHTML = '<div class="info-messaggio">Seleziona un cliente.</div>';
                        document.getElementById('dettaglioContainer').innerHTML = '<div class="info-messaggio">Seleziona un cliente e un tipo documento.</div>';
                        alert("File caricati e parsati con successo.");
                    }
                };
                reader.readAsText(file, "UTF-8");
            }
            e.target.value = '';
        });

        document.getElementById('selectCliente').addEventListener('change', aggiornaTutto);
        document.getElementById('selectTipo').addEventListener('change', aggiornaTutto);

        // LOGO
        const btnLogo = document.getElementById('btnCaricaLogo');
        const imgLogo = document.getElementById('logoImmagine');
        let pressTimer = null;

        btnLogo.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        imgLogo.src = ev.target.result;
                        imgLogo.style.display = 'block';
                        btnLogo.style.display = 'none';
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        });

        imgLogo.addEventListener('mousedown', () => {
            pressTimer = setTimeout(() => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            imgLogo.src = ev.target.result;
                        };
                        reader.readAsDataURL(file);
                    }
                };
                input.click();
                pressTimer = null;
            }, 3000);
        });
        imgLogo.addEventListener('mouseup', () => {
            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
            }
        });
        imgLogo.addEventListener('mouseleave', () => {
            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
            }
        });
    </script>
</body>
</html>

<style>

footer {

@media (min-width: 700px) {

<body>

<div class="loading-overlay" id="loadingOverlay">⏳ Elaborazione file...</div>

<div class="app-container">

<div class="header">

        <button id="uploadLogoBtn" class="upload-logo-btn">+</button>

    </div>

<div class="upload-area">
    <button id="loadDDTBtn" class="btn btn-primary">📂 Carica DDT</button>
    <button id="loadSCABtn" class="btn btn-secondary">📅 Carica SCA</button>
    <button id="loadSCHEDEBtn" class="btn btn-schede">📋 SCHEDE</button>
    <span class="info-message">📌 RICORDATI DI RINOMINARE I FILE IN: DDT e SCA</span>
    <div class="status" id="statusMsg">Carica il file DDT</div>
    <div class="btn-group" style="display: flex; gap: 0.5rem;">
        <a href="https://sites.google.com/view/insapa/home" target="_blank" class="btn btn-outline" style="background: #e9f3ef; text-decoration: none;">🌐 INSAPA</a>
        <a href="https://drive.google.com/file/d/1MA6M2eGJghd7y2NEGGalTl5vjRWZKVs0/view" target="_blank" class="btn btn-outline" style="background: #e9f3ef; text-decoration: none;">🎥 DISPENDER</a>
    </div>
    <div class="client-search-group">
        <input type="text" id="clientSearchInput" class="search-box" placeholder="Cerca cliente...">
        <button id="clientExportBtn" class="btn btn-primary" style="padding: 0.4rem 1rem;">📤 CLIENTE</button>
    </div>

<footer>🔒 INSAPA 0142 - Esporta ordine cliente cliccando su "CLIENTE"</footer>

</div>

<script>
    // --------------------------------------------------------------
    // PARSER DDT
    // --------------------------------------------------------------
    const articoloRegex = /^\s*([A-Z0-9\-]+)\s+(.+?)\s+(KG|N\.?|LT|PZ|ML|GR|CF|CT|MT)\s+([\d.,]+)\s+([\d.,-]+)\s+([\d.,-]+)/i;

    function cleanImporto(str) {
        if (!str) return 0;
        let cleaned = str.replace(/\./g, '').replace(',', '.');
        let val = parseFloat(cleaned);
        return isNaN(val) ? 0 : val;
    }

    function finalCleanDescription(desc) {
        if (!desc) return '';
        desc = desc.replace(/==\s*Azienda:.*?(?:\n|$)/gi, '');
        desc = desc.replace(/==\s*$.*?(?:\n|$)/g, '');
        desc = desc.replace(/STAMPA BROGLIACCIO.*?(?:\n|$)/gi, '');
        desc = desc.replace(/Pag\.\s*\d+/gi, '');
        desc = desc.replace(/--------------------------------------------------------------------/g, '');
        desc = desc.replace(/\s+/g, ' ').trim();
        return desc.substring(0, 120);
    }

    function isServiceLine(line) {
        if (!line) return true;
        let l = line.trim();
        return l.startsWith('==') || l.includes('Azienda:') || l.includes('STAMPA BROGLIACCIO') ||
               l.includes('Pag.') || l.includes('--------------------------------------------------------------------') ||
               l.includes('Da Data:') || l.includes('Codice Ragione Sociale') ||
               l.includes('Articolo      Descrizione') || l.includes('Tipo D.d.T.') ||
               l.match(/^[\s=]+$/);
    }

    function cleanDescription(desc) {
        desc = desc.replace(/[=\-]{5,}/g, '');
        desc = desc.replace(/\s+attivo\s+\d+%\s+PER\s+PIATTI\s*/gi, '');
        desc = desc.replace(/\s+5kg\s+c\.u\.\s+Pretagliata\s+LISCIA\s*/gi, '');
        desc = desc.replace(/\s+SENZA\s+BOX\s*/gi, '');
        desc = desc.replace(/\s+CHAMPAGNE\s*/gi, '');
        desc = desc.replace(/\s+CACAO\s*/gi, '');
        desc = desc.replace(/\s+BORDEAUX\s*/gi, '');
        desc = desc.replace(/\s+MICROGOFFRATI?\s+2VELI\s*/gi, '');
        desc = desc.replace(/\s+MICROGOFFRATO\s+2\s+VELI\s*/gi, '');
        desc = desc.replace(/\s+[0-9]+(?:[.,][0-9]+)?\s*/g, ' ');
        desc = desc.replace(/\s+/g, ' ').trim();
        return finalCleanDescription(desc);
    }

    function parseDDTFile(text) {
        const lines = text.split(/\r?\n/);
        const clients = new Map();
        let currentClient = null;
        let currentCode = null;
        let pendingArticolo = null;

        function cleanLine(str) {
            return str.replace(/[\x00-\x1F\x7F\x0C→←]/g, ' ').replace(/\s+/g, ' ').trim();
        }

        function parseClientLine(line) {
            const dates = line.match(/\d{2}\/\d{2}\/\d{4}/g);
            if (!dates) return null;
            const date = dates[dates.length - 1];
            const idx = line.lastIndexOf(date);
            const beforeDate = line.substring(0, idx).trim();
            const tokens = beforeDate.split(/\s+/);
            if (tokens.length < 2) return null;
            const code = tokens[0];
            if (!/^\d+$/.test(code)) return null;
            let nameTokens = tokens.slice(1).filter(t => !/^\d+$/.test(t));
            if (nameTokens.length === 0) return null;
            return { code, name: nameTokens.join(' ') };
        }

        for (let rawLine of lines) {
            if (rawLine.trim() === '') continue;
            const cleaned = cleanLine(rawLine);
            const clientInfo = parseClientLine(cleaned);
            if (clientInfo) {
                if (pendingArticolo && currentClient) {
                    clients.get(currentClient).items.push(pendingArticolo);
                }
                currentClient = clientInfo.name;
                currentCode = clientInfo.code;
                if (!clients.has(currentClient)) {
                    clients.set(currentClient, { codice: currentCode, items: [], saldoScadenze: 0, scadenzeDettaglio: [] });
                }
                pendingArticolo = null;
                continue;
            }
            if (currentClient) {
                const artMatch = rawLine.match(articoloRegex);
                if (artMatch) {
                    if (pendingArticolo) {
                        clients.get(currentClient).items.push(pendingArticolo);
                    }
                    const quantity = parseFloat(artMatch[4].replace(/\./g, '').replace(',', '.'));
                    const price = parseFloat(artMatch[5].replace(/\./g, '').replace(',', '.'));
                    let discount = parseFloat(artMatch[6].replace(/\./g, '').replace(',', '.').replace('-', ''));
                    if (isNaN(discount)) discount = 0;
                    const gross = quantity * price;
                    const net = gross * (1 - discount / 100);
                    pendingArticolo = {
                        code: artMatch[1],
                        description: cleanDescription(artMatch[2]),
                        quantity, price,
                        discountPercent: discount,
                        grossAmount: gross,
                        netAmount: net
                    };
                } else {
                    if (pendingArticolo && pendingArticolo.description.length < 300) {
                        let extra = rawLine.trim();
                        if (!isServiceLine(extra)) {
                            pendingArticolo.description += ' ' + extra;
                            pendingArticolo.description = cleanDescription(pendingArticolo.description);
                        }
                    }
                }
            }
        }
        if (pendingArticolo && currentClient) {
            clients.get(currentClient).items.push(pendingArticolo);
        }
        return clients;
    }

    // PARSER SCA
    function parseSCAFile(text, clientsMap) {
        for (let [, data] of clientsMap.entries()) {
            data.saldoScadenze = 0;
            data.scadenzeDettaglio = [];
        }

        const lines = text.split(/\r?\n/);
        let i = 0;
        while (i < lines.length) {
            let line = lines[i].trim();
            if (line.startsWith('CLIENTE:')) {
                let rest = line.substring(8).trim();
                let saldoIndex = rest.lastIndexOf('Saldo');
                if (saldoIndex === -1) { i++; continue; }
                let codeAndName = rest.substring(0, saldoIndex).trim();
                let saldoPart = rest.substring(saldoIndex + 5).trim();
                let tokens = codeAndName.split(/\s+/);
                let codeRaw = tokens[0];
                let codeClean = codeRaw.replace(/^0+/, '');
                if (codeClean === '') codeClean = '0';
                let nomeCompleto = tokens.slice(1).join(' ');
                let saldo = cleanImporto(saldoPart);
                if (saldoPart.endsWith('-')) saldo = -saldo;

                let target = null;
                for (let [cliName, cliData] of clientsMap.entries()) {
                    if (cliData.codice === codeClean) {
                        target = { name: cliName, data: cliData };
                        break;
                    }
                }
                if (!target) {
                    let nomeSCA = nomeCompleto.toLowerCase().substring(0, 40);
                    for (let [cliName, cliData] of clientsMap.entries()) {
                        let nomeCli = cliName.toLowerCase().substring(0, 40);
                        if (nomeCli.includes(nomeSCA) || nomeSCA.includes(nomeCli)) {
                            target = { name: cliName, data: cliData };
                            break;
                        }
                    }
                }
                if (!target && nomeCompleto.trim() !== '') {
                    let newName = nomeCompleto.trim();
                    clientsMap.set(newName, {
                        codice: codeClean,
                        items: [],
                        saldoScadenze: 0,
                        scadenzeDettaglio: []
                    });
                    target = { name: newName, data: clientsMap.get(newName) };
                }
                if (target) {
                    target.data.saldoScadenze = saldo;
                    let j = i + 1;
                    while (j < lines.length && !lines[j].includes('Scadenza')) j++;
                    if (j < lines.length) {
                        j++;
                        while (j < lines.length && (lines[j].trim() === '' || lines[j].includes('--------------------------------------------------------------------------------') || lines[j].includes('================================================================'))) j++;
                        let dettagli = [];
                        while (j < lines.length) {
                            let detLine = lines[j].trim();
                            if (detLine === '') { j++; continue; }
                            if (detLine.startsWith('VOSTRO DARE') || detLine.startsWith('CLIENTE:') ||
                                detLine.includes('--------------------------------------------------------------------------------') || detLine.includes('================================================================')) break;
                            if (detLine.match(/^\d{2}\/\d{2}\/\d{4}/) || detLine.match(/^\d{2}\/\d{2}\/\d{4}\*/)) {
                                let parts = detLine.split(/\s+/);
                                let dataScad = parts[0].replace('*', '');
                                let registrazione = '';
                                for (let k = 0; k < parts.length; k++) {
                                    if (parts[k] === 'R.D.' || parts[k] === 'R.D' || parts[k] === 'NOTA') {
                                        if (k + 1 < parts.length) registrazione = parts[k + 1];
                                        break;
                                    }
                                }
                                let dataDocumento = '';
                                for (let k = 1; k < parts.length; k++) {
                                    if (parts[k].match(/^\d{2}\/\d{2}\/\d{4}/)) {
                                        dataDocumento = parts[k];
                                        break;
                                    }
                                }
                                let numeroFattura = '';
                                for (let k = 0; k < parts.length; k++) {
                                    if (parts[k].match(/^\d{2}\/\d{2}\/\d{4}/)) {
                                        for (let m = k + 1; m < parts.length; m++) {
                                            if (parts[m].match(/^\d+$/)) {
                                                numeroFattura = parts[m];
                                                break;
                                            }
                                        }
                                        break;
                                    }
                                }
                                let importo = 0;
                                let euroIdx = parts.findIndex(p => p === 'Euro');
                                if (euroIdx !== -1 && euroIdx + 1 < parts.length) {
                                    importo = cleanImporto(parts[euroIdx + 1]);
                                } else {
                                    importo = cleanImporto(parts[parts.length - 1]);
                                }
                                if (importo !== 0) {
                                    dettagli.push({ dataScadenza: dataScad, registrazione, dataDocumento, numeroFattura, importo });
                                }
                            }
                            j++;
                        }
                        target.data.scadenzeDettaglio = dettagli;
                        i = j;
                    } else i++;
                } else i++;
            } else i++;
        }
        return clientsMap;
    }

    // ==============================================================
    // PARSER SCHEDE COMPLETO - Estrae TUTTE le 4 coppie + sconti
    // ==============================================================
    function parseSCHEDEFile(text, clientsMap) {
        const lines = text.split(/\r?\n/);
        let currentClient = null;
        let currentData = null;
        let insideTable = false;
        
        function parseClientHeader(line) {
            // Formato: "Cliente   : 030275 LA MANDRAGOLA DI MARCO GIANASSI ..."
            let match = line.match(/Cliente\s*:\s*(\d+)\s+(.+?)(?:\s*-|$)/);
            if (match) {
                return { code: match[1], name: match[2].trim() };
            }
            return null;
        }
        
        function parseArticoloRow(line) {
            // Pattern per codice e descrizione (almeno 4 caratteri per il codice)
            let match = line.match(/^(\S{4,})\s+(.+?)\s+(\d+[,.]?\d*)\s+(\d{2}\/\d{2}\/\d{4})/);
            if (!match) return null;
            
            const code = match[1];
            let description = match[2];
            // Pulisci la descrizione rimuovendo le quantità e date che seguono
            description = description.replace(/\s+\d+[,.]?\d*\s+\d{2}\/\d{2}\/\d{4}.*$/, '');
            description = description.substring(0, 120).trim();
            
            // Estrai TUTTE le coppie quantità/data (fino a 4)
            const qtyDatePairs = [];
            const qtyDatePattern = /(\d+[,.]?\d*)\s+(\d{2}\/\d{2}\/\d{4})/g;
            let pairMatch;
            while ((pairMatch = qtyDatePattern.exec(line)) !== null) {
                let qty = parseFloat(pairMatch[1].replace(',', '.'));
                let date = pairMatch[2];
                qtyDatePairs.push({ quantity: qty, date: date });
            }
            
            // Estrai prezzo, sconto1, sconto2 (gli ultimi 3 numeri della riga)
            // Formato: ... Prezzo Sco1 Sco2
            const priceDiscountMatch = line.match(/(\d+[,.]?\d*)\s+(\d+[,.]?\d*)\s+(\d+[,.]?\d*)$/);
            let price = 0;
            let discount1 = 0;
            let discount2 = 0;
            if (priceDiscountMatch) {
                price = parseFloat(priceDiscountMatch[1].replace(',', '.'));
                discount1 = parseFloat(priceDiscountMatch[2].replace(',', '.'));
                discount2 = parseFloat(priceDiscountMatch[3].replace(',', '.'));
            }
            
            return {
                code: code,
                description: description,
                qtyDatePairs: qtyDatePairs,
                price: price,
                discount1: discount1,
                discount2: discount2
            };
        }
        
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line === '') continue;
            
            // Rilevazione inizio nuovo cliente
            if (line.startsWith('Cliente')) {
                const clientInfo = parseClientHeader(line);
                if (clientInfo) {
                    let existingClientName = null;
                    for (let [cName, cData] of clientsMap.entries()) {
                        if (cData.codice === clientInfo.code || cName === clientInfo.name) {
                            existingClientName = cName;
                            break;
                        }
                    }
                    
                    if (existingClientName) {
                        currentClient = existingClientName;
                        currentData = clientsMap.get(currentClient);
                    } else {
                        currentClient = clientInfo.name;
                        currentData = { 
                            codice: clientInfo.code, 
                            items: [], 
                            saldoScadenze: 0, 
                            scadenzeDettaglio: [] 
                        };
                        clientsMap.set(currentClient, currentData);
                    }
                    insideTable = false;
                }
                continue;
            }
            
            // Rilevazione inizio tabella
            if (line.includes('Cod. Articolo Descrizione') || (line.includes('Cod. Articolo') && line.includes('Descrizione'))) {
                insideTable = true;
                continue;
            }
            
            // Se siamo dentro la tabella e la riga inizia con un codice (almeno 4 cifre/lettere)
            if (insideTable && line.match(/^\d{4,}/)) {
                const art = parseArticoloRow(line);
                if (art && art.qtyDatePairs.length > 0) {
                    // Per OGNI coppia quantità/data, crea un movimento separato
                    for (let pair of art.qtyDatePairs) {
                        const grossAmount = pair.quantity * art.price;
                        const netAmount = grossAmount * (1 - art.discount1 / 100);
                        
                        // Verifica se esiste già un articolo con stesso codice e prezzo
                        let existingItem = currentData.items.find(item => 
                            item.code === art.code && 
                            Math.abs(item.price - art.price) < 0.01
                        );
                        
                        if (existingItem) {
                            existingItem.quantity += pair.quantity;
                            existingItem.netAmount += netAmount;
                            existingItem.grossAmount += grossAmount;
                            existingItem.occurrences = (existingItem.occurrences || 1) + 1;
                            if (pair.date > (existingItem.lastDate || '')) {
                                existingItem.lastDate = pair.date;
                            }
                        } else {
                            currentData.items.push({
                                code: art.code,
                                description: art.description,
                                quantity: pair.quantity,
                                price: art.price,
                                discountPercent: art.discount1,
                                discountPercent2: art.discount2,
                                grossAmount: grossAmount,
                                netAmount: netAmount,
                                occurrences: 1,
                                date: pair.date,
                                lastDate: pair.date
                            });
                        }
                    }
                }
            }
            
            if (line.startsWith('Cliente') && i > 0) {
                insideTable = false;
            }
        }
        
        return clientsMap;
    }

    function aggregateItems(items) {
        const map = new Map();
        for (let it of items) {
            if (map.has(it.code)) {
                const ex = map.get(it.code);
                ex.quantity += it.quantity;
                ex.netAmount += it.netAmount;
                ex.grossAmount += it.grossAmount;
                ex.occurrences++;
            } else {
                let desc = cleanDescription(it.description);
                map.set(it.code, { ...it, description: desc, occurrences: it.occurrences || 1 });
            }
        }
        return Array.from(map.values()).sort((a, b) => b.netAmount - a.netAmount);
    }

        }

        return `<!DOCTYPE html>

                .scadenze-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
                .scadenze-table th, .scadenze-table td { padding: 6px 8px; border-bottom: 1px solid #dce4e0; }
                .send-btn, .email-btn { display: block; width: 90%; margin: 1rem auto; color: white; text-align: center; font-size: 1.2rem; padding: 0.8rem; border-radius: 60px; border: none; cursor: pointer; font-weight: bold; }

                <button id="emailOrderBtn" class="email-btn">✉️ INVIO PER EMAIL</button>
                <footer>INSAPA 0142 - Ordine generato per il cliente</footer>
            </div>
            <div id="toastMsg" class="toast-msg"></div>
            <script>
                (function() {
                    const STORAGE_KEY = "insapa_ordine_${clientData.codice}";

                    function salvaStato() {
                        const qtyInputs = document.querySelectorAll('.qty-input');
                        const quantita = {};
                        qtyInputs.forEach(inp => {
                            const code = inp.getAttribute('data-code');
                            if (code) quantita[code] = inp.value;
                        });
                        const note = document.getElementById('clientNotes') ? document.getElementById('clientNotes').value : '';
                        const stato = { quantita: quantita, note: note };
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(stato));
                    }

                    function caricaStato() {
                        const saved = localStorage.getItem(STORAGE_KEY);
                        if (!saved) return;
                        try {
                            const stato = JSON.parse(saved);
                            if (stato.quantita) {
                                for (let code in stato.quantita) {
                                    const inp = document.querySelector('.qty-input[data-code="' + code + '"]');
                                    if (inp) inp.value = stato.quantita[code];
                                }
                            }
                            if (stato.note !== undefined) {
                                const notesArea = document.getElementById('clientNotes');
                                if (notesArea) notesArea.value = stato.note;
                            }
                        } catch(e) {}
                    }

                    function resetStato() {
                        const qtyInputs = document.querySelectorAll('.qty-input');
                        qtyInputs.forEach(inp => inp.value = '');
                        const notesArea = document.getElementById('clientNotes');
                        if (notesArea) notesArea.value = '';
                        localStorage.removeItem(STORAGE_KEY);
                        showToast("✅ Quantità e note azzerate");
                    }

                    function showToast(msg) {
                        let toast = document.getElementById('toastMsg');
                        if (!toast) return;
                        toast.textContent = msg;
                        toast.style.opacity = '1';
                        setTimeout(function() { toast.style.opacity = '0'; }, 2000);
                    }

                    function getOrderText() {
                        let items = [];
                        let rows = document.querySelectorAll('tbody tr');
                        let hasError = false;
                        rows.forEach((row, idx) => {
                            const codeCell = row.cells[0];
                            const descCell = row.cells[1];
                            const code = codeCell ? codeCell.innerText.trim() : '';
                            const desc = descCell ? descCell.innerText.trim() : '';
                            const qtyInput = row.querySelector('.qty-input');
                            if (!qtyInput) return;
                            const rawValue = qtyInput.value.trim();
                            if (rawValue !== "") {
                                let qty = Number(rawValue);
                                if (isNaN(qty) || !Number.isInteger(qty) || qty <= 0) {
                                    alert("Per l'articolo " + code + " inserire un numero intero positivo (es. 1, 2, 3...).");
                                    hasError = true;
                                    return;
                                }
                                items.push(code + " - " + desc + " : " + qty);
                            }
                        });
                        if (hasError) return null;
                        if (items.length === 0) {
                            alert("Nessun articolo con quantità inserita. Inserisci almeno una quantità > 0.");
                            return null;
                        }
                        let clientName = "${escapeHtml(clientName)}";
                        let clientCode = "${escapeHtml(clientData.codice)}";
                        let orderText = "INSAPA\\n";
                        orderText += "RIEPILOGO ACQUISTO CLIENTI\\n\\n";
                        orderText += clientName + " - Cod. " + clientCode + "\\n\\n";
                        orderText += items.join("\\n\\n");
                        let notes = document.getElementById('clientNotes').value.trim();
                        if (notes !== "") {
                            orderText += "\\n\\nNOTE DEL CLIENTE:\\n" + notes;
                        }
                        return orderText;
                    }

                    const qtyInputs = document.querySelectorAll('.qty-input');
                    qtyInputs.forEach(inp => inp.addEventListener('input', salvaStato));
                    const notesArea = document.getElementById('clientNotes');
                    if (notesArea) notesArea.addEventListener('input', salvaStato);

                    const resetBtn = document.getElementById('resetQtyBtn');
                    if (resetBtn) resetBtn.addEventListener('click', resetStato);

                    const sendBtn = document.getElementById('sendOrderBtn');
                    if (sendBtn) {
                        sendBtn.addEventListener('click', function(e) {
                            e.preventDefault();
                            let text = getOrderText();
                            if (text === null) return;
                            salvaStato();
                            let encoded = encodeURIComponent(text);
                            window.open('https://wa.me/?text=' + encoded, '_blank');
                        });
                    }

                    const emailBtn = document.getElementById('emailOrderBtn');
                    if (emailBtn) {
                        emailBtn.addEventListener('click', function(e) {
                            e.preventDefault();
                            let text = getOrderText();
                            if (text === null) return;
                            salvaStato();
                            let subject = "Ordine da " + "${escapeHtml(clientName)}";
                            window.location.href = "mailto:?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(text);
                        });
                    }

                    caricaStato();
                })();
            <\/script>
        </body>
        </html>`;
    }

    // --------------------------------------------------------------
    // ESPORTAZIONE MAIN
    // --------------------------------------------------------------
    function exportOrderForClient() {
        if (!currentClientsMap || currentClientsMap.size === 0) {
            document.getElementById('warningArea').style.display = 'block';
            document.getElementById('warningArea').innerHTML = 'Nessun cliente caricato. Carica prima un file DDT.';
            return;
        }
        let clientName = getCurrentSelectedClient();
        if (!clientName || !currentClientsMap.has(clientName)) {
            document.getElementById('warningArea').style.display = 'block';
            document.getElementById('warningArea').innerHTML = 'Cliente non trovato. Seleziona un cliente dalle tab o inserisci il nome esatto nella ricerca.';
            return;
        }
        const clientData = currentClientsMap.get(clientName);
        let logoDataURL = localStorage.getItem('logo_data') || '';
        const htmlContent = generateOrderHTML(clientName, clientData, logoDataURL);
        const fileName = `ORDINE INSAPA_${clientData.codice}.html`;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function getCurrentSelectedClient() {
        const activeTab = document.querySelector('.tab-btn.active');
        if (activeTab) return activeTab.textContent;
        const searchVal = document.getElementById('clientSearchInput').value.trim();
        if (searchVal) return searchVal;
        return null;
    }

    // --------------------------------------------------------------
    // RENDER
    // --------------------------------------------------------------
    function renderAllTabs(clientsMap) {
        const tabsDiv = document.getElementById('tabsContainer');
        const panelsDiv = document.getElementById('panelsContainer');
        tabsDiv.innerHTML = '';
        panelsDiv.innerHTML = '';
        const names = Array.from(clientsMap.keys()).sort();
        document.getElementById('clientCountBadge').innerHTML = `${names.length} clienti`;
        document.getElementById('statusMsg').innerHTML = `✅ Caricato`;
        
        names.forEach(name => {
            const data = clientsMap.get(name);
            const saldo = data.saldoScadenze || 0;
            const tab = document.createElement('button');
            tab.className = 'tab-btn';
            if (saldo > 0) tab.classList.add('overdue');
            tab.textContent = name;
            const panelId = `panel-${data.codice}-${name.replace(/[^a-zA-Z0-9]/g, '_')}`;
            tab.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(panelId).classList.add('active');
            };
            tabsDiv.appendChild(tab);
            const panel = document.createElement('div');
            panel.className = 'tab-content';
            panel.id = panelId;
            const items = aggregateItems(data.items);
            let totQty = 0, totNet = 0;
            items.forEach(i => { totQty += i.quantity; totNet += i.netAmount; });
            let html = `
                <div class="client-summary">
                    <div class="stat">🏷️ COD. CLIENTE: ${data.codice}</div>
                    <div class="stat">📦 Quantità: ${totQty.toFixed(2)}</div>
                    <div class="stat">💰 Netto: ${totNet.toFixed(2)} €</div>
                </div>
            `;
            if (data.scadenzeDettaglio && data.scadenzeDettaglio.length > 0) {
                html += `<div class="scadenze-box">
                            <div class="scadenze-header">
                                <strong>📌 Dettaglio fatture (Scadenzario):</strong>
                                <span class="scadenze-totale">📅 Scadenze: ${(data.saldoScadenze || 0).toFixed(2)} €</span>
                            </div>
                            <table class="scadenze-table">
                                <thead><tr><th>Data fattura</th><th>N° fattura</th><th>Importo fattura (€)</th><th>Scadenza</th></tr></thead>
                                <tbody>`;
                for (let s of data.scadenzeDettaglio) {
                    html += `<tr>
                                <td>${escapeHtml(s.dataDocumento || '')}</td>
                                <td>${escapeHtml(s.numeroFattura || '')}</td>
                                <td style="text-align:right; font-weight:bold">${s.importo.toFixed(2)} €</td>
                                <td>${escapeHtml(s.dataScadenza || '')}</td>
                              </tr>`;
                }
                html += `</tbody>
                            </table>
                        </div>`;
            }
            html += `<div class="table-wrapper">
                        <table>
                            <thead>
                                <tr><th>Codice</th><th>Descrizione</th><th>Prezzo €</th><th>Q.tà</th><th>Sconto %</th><th>Rip.</th></tr>
                            </thead>
                            <tbody>`;
            items.forEach(it => {
                html += `<tr>
                            <td style="font-family:monospace">${escapeHtml(it.code)}</td>
                            <td>${escapeHtml(it.description)}</td>
                            <td class="num" style="font-weight:bold">${it.price.toFixed(2)}</td>
                            <td class="num" style="font-weight:bold">${it.quantity.toFixed(2)}</td>
                            <td class="num">${it.discountPercent.toFixed(2)}%</td>
                            <td class="num"><span class="repeat-badge">${it.occurrences}×</span></td>
                          </tr>`;
            });
            html += `</tbody>
                      </table>
                    </div>`;
            panel.innerHTML = html;
            panelsDiv.appendChild(panel);
        });
        const firstTab = document.querySelector('.tab-btn');
        const firstPanel = document.querySelector('.tab-content');
        if (firstTab) firstTab.classList.add('active');
        if (firstPanel) firstPanel.classList.add('active');
        saveToLocalStorage(clientsMap);
    }

    function escapeHtml(str) {
        return String(str || '').replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function saveToLocalStorage(clientsMap) {
        const obj = {};
        for (let [name, data] of clientsMap.entries()) {
            obj[name] = {
                codice: data.codice,
                items: data.items.map(it => ({ ...it })),
                saldoScadenze: data.saldoScadenze || 0,
                scadenzeDettaglio: data.scadenzeDettaglio || []
            };
        }
        localStorage.setItem('ddt_data', JSON.stringify(obj));
    }

    function loadFromLocalStorage() {
        const data = localStorage.getItem('ddt_data');
        if (data) {
            try {
                const obj = JSON.parse(data);
                const map = new Map();
                for (let name in obj) {
                    map.set(name, {
                        codice: obj[name].codice,
                        items: obj[name].items,
                        saldoScadenze: obj[name].saldoScadenze || 0,
                        scadenzeDettaglio: obj[name].scadenzeDettaglio || []
                    });
                }
                return map;
            } catch (e) { console.warn(e); }
        }
        return null;
    }

    function clearDDTData() {
        localStorage.removeItem('ddt_data');
    }

    function saveLogoToLocalStorage(dataUrl) {
        if (dataUrl) localStorage.setItem('logo_data', dataUrl);
        else localStorage.removeItem('logo_data');
    }

    function loadLogoFromLocalStorage() {
        const url = localStorage.getItem('logo_data');
        if (url) {
            logoImg.src = url;
            logoImg.style.display = 'block';
            logoPlaceholder.style.display = 'none';
        }
    }

    let currentClientsMap = new Map();

    function loadDDT() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.txt';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            clearDDTData();
            currentClientsMap.clear();
            document.getElementById('tabsContainer').innerHTML = '';
            document.getElementById('panelsContainer').innerHTML = '';
            document.getElementById('warningArea').style.display = 'none';
            const loading = document.getElementById('loadingOverlay');
            loading.style.display = 'flex';
            const reader = new FileReader();
            reader.onload = (ev) => {
                setTimeout(() => {
                    try {
                        const map = parseDDTFile(ev.target.result);
                        currentClientsMap = map;
                        renderAllTabs(map);
                    } catch (err) {
                        document.getElementById('warningArea').style.display = 'block';
                        document.getElementById('warningArea').innerHTML = err.message;
                    }
                    loading.style.display = 'none';
                }, 10);
            };
            reader.readAsText(file, 'UTF-8');
        };
        input.click();
    }

    function loadSCA() {
        if (!currentClientsMap || currentClientsMap.size === 0) {
            document.getElementById('warningArea').style.display = 'block';
            document.getElementById('warningArea').innerHTML = 'Carica prima il file DDT.';
            return;
        }
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.txt';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const loading = document.getElementById('loadingOverlay');
            loading.style.display = 'flex';
            const reader = new FileReader();
            reader.onload = (ev) => {
                setTimeout(() => {
                    try {
                        const newMap = new Map();
                        for (let [name, data] of currentClientsMap.entries()) {
                            newMap.set(name, {
                                codice: data.codice,
                                items: data.items.map(it => ({ ...it })),
                                saldoScadenze: data.saldoScadenze || 0,
                                scadenzeDettaglio: data.scadenzeDettaglio || []
                            });
                        }
                        parseSCAFile(ev.target.result, newMap);
                        currentClientsMap = newMap;
                        renderAllTabs(newMap);
                    } catch (err) {
                        document.getElementById('warningArea').style.display = 'block';
                        document.getElementById('warningArea').innerHTML = err.message;
                    }
                    loading.style.display = 'none';
                }, 10);
            };
            reader.readAsText(file, 'UTF-8');
        };
        input.click();
    }

    function loadSCHEDE() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.txt';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const loading = document.getElementById('loadingOverlay');
            loading.style.display = 'flex';
            const reader = new FileReader();
            reader.onload = (ev) => {
                setTimeout(() => {
                    try {
                        if (!currentClientsMap || currentClientsMap.size === 0) {
                            currentClientsMap = new Map();
                        }
                        parseSCHEDEFile(ev.target.result, currentClientsMap);
                        renderAllTabs(currentClientsMap);
                        document.getElementById('statusMsg').innerHTML = '✅ DDT + SCHEDE caricato';
                        document.getElementById('warningArea').style.display = 'none';
                    } catch (err) {
                        document.getElementById('warningArea').style.display = 'block';
                        document.getElementById('warningArea').innerHTML = 'Errore nel file SCHEDE: ' + err.message;
                    }
                    loading.style.display = 'none';
                }, 10);
            };
            reader.readAsText(file, 'UTF-8');
        };
        input.click();
    }

    function filterClients() {
        const searchText = document.getElementById('clientSearchInput').value.toLowerCase();
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(tab => {
            const clientName = tab.textContent.toLowerCase();
            tab.style.display = clientName.includes(searchText) ? '' : 'none';
        });
    }

    // Logo
    const logoInput = document.getElementById('logoFileInput');
    const logoImg = document.getElementById('logoImg');
    const logoPlaceholder = document.getElementById('logoPlaceholder');
    document.getElementById('uploadLogoBtn').onclick = () => logoInput.click();
    logoInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const url = ev.target.result;
                logoImg.src = url;
                logoImg.style.display = 'block';
                logoPlaceholder.style.display = 'none';
                saveLogoToLocalStorage(url);
            };
            reader.readAsDataURL(file);
        }
    };

    document.getElementById('clientExportBtn').addEventListener('click', exportOrderForClient);
    document.getElementById('loadDDTBtn').addEventListener('click', loadDDT);
    document.getElementById('loadSCABtn').addEventListener('click', loadSCA);
    document.getElementById('loadSCHEDEBtn').addEventListener('click', loadSCHEDE);
    document.getElementById('clientSearchInput').addEventListener('input', filterClients);

    loadLogoFromLocalStorage();
    const savedData = loadFromLocalStorage();
    if (savedData && savedData.size > 0) {
        currentClientsMap = savedData;
        renderAllTabs(savedData);
    } else {
        document.getElementById('statusMsg').innerHTML = 'Carica il file DDT o SCHEDE.';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AGENTI - Gestione ORD e SCA</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: #eef2f5;
            min-height: 100vh;
        }
        /* Header */
        .header {
            background: white;
            padding: 12px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .title-area {
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
        }
        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #2c3e50;
        }
        .version {
            background: #3498db;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-img {
            max-height: 50px;
            max-width: 150px;
            cursor: pointer;
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 4px;
            background: white;
        }
        .btn-logo {
            background: #ecf0f1;
            border: 1px solid #bdc3c7;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        /* Layout principale */
        .main-container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        .file-upload-section {
            margin-bottom: 25px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 20px;
        }
        .upload-group {
            margin-bottom: 15px;
        }
        .upload-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .upload-btn:hover {
            opacity: 0.85;
        }
        .file-status {
            font-size: 0.7rem;
            color: #27ae60;
            margin-top: 5px;
            text-align: center;
        }
        .filter-group {
            margin-bottom: 25px;
        }
        .filter-group label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
        }
        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 0.9rem;
            background: white;
        }
        .cliente-rosso {
            color: #c0392b;
            font-weight: bold;
        }
        /* Area contenuti */
        .content-area {
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        .scadenze-box {
            background: #f8f9fa;
            border-left: 4px solid #3498db;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 10px;
            overflow-x: auto;
        }
        .scadenze-box h3 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 1.1rem;
        }
        .tabella {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 400px;
        }
        .tabella th, .tabella td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
            vertical-align: top;
        }
        .tabella th {
            background: #e9ecef;
        }
        /* Articolo ORD - due righe con pulsante sulla destra */
        .ord-item {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 12px;
            padding: 10px 12px;
        }
        .ord-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .ord-codice-desc {
            font-weight: bold;
            font-size: 0.9rem;
            word-break: break-word;
            flex: 1;
        }
        .btn-dettaglio {
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.75rem;
            white-space: nowrap;
        }
        .btn-dettaglio:hover {
            background: #2c3e50;
        }
        .ord-prezzo {
            font-family: monospace;
            font-size: 0.8rem;
            color: #2c3e50;
            margin-top: 6px;
            padding-left: 4px;
        }
        /* Modal per dettaglio coppie */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: white;
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            animation: fadeIn 0.2s;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .modal-header h3 {
            margin: 0;
            font-size: 1.2rem;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #888;
        }
        .close-modal:hover {
            color: #c0392b;
        }
        .coppie-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .coppie-list li {
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            font-family: monospace;
            font-size: 0.9rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .info-messaggio {
            color: #7f8c8d;
            font-style: italic;
            padding: 15px;
            text-align: center;
        }
        footer {
            text-align: center;
            margin: 20px;
            font-size: 0.7rem;
            color: #95a5a6;
        }
        /* Responsive */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                position: static;
            }
            h1 {
                font-size: 1.2rem;
            }
            .content-area {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title-area">
            <h1>AGENTI</h1>
            <span class="version">v1.4</span>
        </div>
        <div class="logo-area" id="logoArea">
            <button id="btnCaricaLogo" class="btn-logo">📁 Carica logo</button>
            <img id="logoImmagine" class="logo-img" style="display: none;" alt="Logo azienda">
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="file-upload-section">
                <div class="upload-group">
                    <button id="btnCaricaFile" class="upload-btn">📂 Carica ORD + SCA</button>
                    <div id="fileStatus" class="file-status"></div>
                </div>
                <input type="file" id="fileInputMulti" multiple accept=".txt,.csv,.text/plain" style="display: none;">
            </div>
            <div class="filter-group">
                <label>👥 Cliente</label>
                <select id="selectCliente" disabled>
                    <option value="">-- Seleziona cliente --</option>
                </select>
            </div>
        </div>

        <div class="content-area">
            <div id="scadenzeContainer"></div>
            <div id="dettaglioContainer"></div>
        </div>
    </div>

    <!-- Modal per i dettagli delle coppie -->
    <div id="modalCoppie" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📦 Dettaglio ordini</h3>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <footer>Premere 3 secondi sul logo per cambiarlo. Selezionare ORD e SCA insieme (Ctrl/Cmd).</footer>

    <script>
        // --------------------------------------------------------------
        // PARSER ORD
        // --------------------------------------------------------------
        function parseORD(text) {
            const lines = text.split(/\r?\n/);
            const clienti = new Map();
            let currentCliente = null;
            const reCliente = /^Cliente\s+:\s+(\d+)\s+(.+?)(?:\s{2,}|$)/;
            const reCoppia = /(\d+(?:,\d+)?)\s+(\d{2}\/\d{2}\/\d{4})/g;

            for (let line of lines) {
                line = line.trimEnd();
                if (line === "") continue;

                let mCliente = line.match(reCliente);
                if (mCliente) {
                    currentCliente = { codice: mCliente[1], ragione: mCliente[2].trim(), articoli: [] };
                    clienti.set(currentCliente.codice, currentCliente);
                    continue;
                }
                if (!currentCliente) continue;
                if (line.startsWith("Destinaz.") || line.startsWith("Telefoni") || line.includes("INESISTENTE") || line.includes("ELIMINATO"))
                    continue;

                let coppie = [];
                let match;
                while ((match = reCoppia.exec(line)) !== null) {
                    let qta = parseFloat(match[1].replace(',', '.'));
                    let data = match[2];
                    coppie.push({ qta, data, start: match.index, end: match.index + match[0].length });
                }
                if (coppie.length === 0) continue;

                let firstCoppiaStart = coppie[0].start;
                let descrizioneRaw = line.substring(0, firstCoppiaStart).trim();
                let tokens = descrizioneRaw.split(/\s+/);
                let codice = tokens[0];
                let descrizione = tokens.slice(1).join(" ");

                let lastCoppiaEnd = coppie[coppie.length-1].end;
                let afterCoppie = line.substring(lastCoppiaEnd).trim();
                let numTokens = afterCoppie.split(/\s+/);
                let prezzo = 0, sconto1 = 0;
                if (numTokens.length >= 2) {
                    prezzo = parseFloat(numTokens[0].replace(',', '.'));
                    sconto1 = parseFloat(numTokens[1].replace(',', '.'));
                }

                coppie.sort((a,b) => new Date(b.data.split('/').reverse().join('-')) - new Date(a.data.split('/').reverse().join('-')));
                currentCliente.articoli.push({ codice, descrizione, coppie, prezzo, sconto1 });
            }
            return Array.from(clienti.values());
        }

        // --------------------------------------------------------------
        // PARSER SCA
        // --------------------------------------------------------------
        function parseSCA(text) {
            const lines = text.split(/\r?\n/);
            const clienti = new Map();
            let currentCliente = null;
            const reCliente = /^CLIENTE:\s+(\d+)\s+(.+?)\s+Saldo\s+[\d\.,]+/;
            const reScadenza = /^(\d{2}\/\d{2}\/\d{4})\s+.*?(\d+)\s+(\d{2}\/\d{2}\/\d{4})\s+Euro\s+([\d\.,]+)/;

            for (let line of lines) {
                line = line.trim();
                if (line === "") continue;

                let mCliente = line.match(reCliente);
                if (mCliente) {
                    currentCliente = { codice: mCliente[1], ragione: mCliente[2].trim(), scadenze: [] };
                    clienti.set(currentCliente.codice, currentCliente);
                    continue;
                }
                if (currentCliente) {
                    let mScad = line.match(reScadenza);
                    if (mScad) {
                        let scadenza = mScad[1];
                        let numDoc = mScad[2];
                        let dataDoc = mScad[3];
                        let importoStr = mScad[4].replace(/\./g, '').replace(',', '.');
                        let importo = parseFloat(importoStr);
                        currentCliente.scadenze.push({ scadenza, numDoc, dataDoc, importo });
                    }
                }
            }
            return Array.from(clienti.values());
        }

        // --------------------------------------------------------------
        // STATO APPLICAZIONE
        // --------------------------------------------------------------
        let dati = { ord: [], sca: [] };

        function aggiornaClientiUnici() {
            const clientiUnici = new Map();
            for (let c of dati.ord) {
                let key = `${c.codice}|${c.ragione}`;
                if (!clientiUnici.has(key)) clientiUnici.set(key, { codice: c.codice, ragione: c.ragione, hasScadenze: false });
            }
            for (let c of dati.sca) {
                let key = `${c.codice}|${c.ragione}`;
                if (!clientiUnici.has(key)) clientiUnici.set(key, { codice: c.codice, ragione: c.ragione, hasScadenze: false });
                if (c.scadenze.length > 0 && c.scadenze.some(s => s.importo !== 0)) {
                    let cli = clientiUnici.get(key);
                    if (cli) cli.hasScadenze = true;
                }
            }
            const select = document.getElementById('selectCliente');
            select.innerHTML = '<option value="">-- Seleziona cliente --</option>';
            const sorted = Array.from(clientiUnici.values()).sort((a,b) => a.ragione.localeCompare(b.ragione));
            for (let cli of sorted) {
                const option = document.createElement('option');
                option.value = `${cli.codice}|${cli.ragione}`;
                option.textContent = `${cli.codice} - ${cli.ragione}`;
                if (cli.hasScadenze) {
                    option.style.color = '#c0392b';
                    option.style.fontWeight = 'bold';
                }
                select.appendChild(option);
            }
            select.disabled = (sorted.length === 0);
        }

        function mostraScadenze(clienteKey) {
            const container = document.getElementById('scadenzeContainer');
            if (!clienteKey) {
                container.innerHTML = '<div class="info-messaggio">Seleziona un cliente.</div>';
                return;
            }
            const [codice, ragione] = clienteKey.split('|');
            const clienteSCA = dati.sca.find(c => c.codice === codice && c.ragione === ragione);
            if (!clienteSCA || clienteSCA.scadenze.length === 0) {
                container.innerHTML = `<div class="info-messaggio">Nessuna scadenza per ${ragione}</div>`;
                return;
            }
            let html = `<div class="scadenze-box"><h3>📅 Scadenze - ${codice} ${ragione}</h3>
                        <table class="tabella"><thead>——
<th>Scadenza</th><th>N. Doc.</th><th>Data documento</th><th>Importo</th>
</thead><tbody>`;
            for (let s of clienteSCA.scadenze) {
                html += `<tr><td>${s.scadenza}</td><td>${s.numDoc}</td><td>${s.dataDoc}</td><td>${s.importo.toFixed(2).replace('.', ',')}</td></tr>`;
            }
            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        // Modal
        const modal = document.getElementById('modalCoppie');
        const modalBody = document.getElementById('modalBody');
        const closeModalBtn = document.getElementById('closeModalBtn');

        function mostraModal(coppie, codice, descrizione) {
            if (!coppie || coppie.length === 0) return;
            let html = `<p><strong>${codice}</strong> ${descrizione}</p><ul class="coppie-list">`;
            let num = coppie.length;
            for (let c of coppie) {
                html += `<li>${num}° - ${c.qta.toFixed(2).replace('.', ',')} ${c.data}</li>`;
                num--;
            }
            html += `</ul>`;
            modalBody.innerHTML = html;
            modal.style.display = 'flex';
        }

        function mostraDettaglio(clienteKey) {
            const container = document.getElementById('dettaglioContainer');
            if (!clienteKey) {
                container.innerHTML = '<div class="info-messaggio">Seleziona un cliente.</div>';
                return;
            }
            const [codice, ragione] = clienteKey.split('|');
            const clienteORD = dati.ord.find(c => c.codice === codice && c.ragione === ragione);
            if (!clienteORD || clienteORD.articoli.length === 0) {
                container.innerHTML = `<div class="info-messaggio">Nessun ordine per ${ragione}</div>`;
                return;
            }
            let html = `<h3>📋 ORD - ${codice} ${ragione}</h3>`;
            for (let art of clienteORD.articoli) {
                html += `<div class="ord-item">
                            <div class="ord-header">
                                <div class="ord-codice-desc"><strong>${art.codice}</strong> ${art.descrizione}</div>
                                <button class="btn-dettaglio" data-codice="${art.codice}" data-descrizione="${art.descrizione.replace(/"/g, '&quot;')}" data-coppie='${JSON.stringify(art.coppie)}'>📋 Dettaglio</button>
                            </div>
                            <div class="ord-prezzo">prezzo e sconto ${art.prezzo.toFixed(2).replace('.', ',')} ${art.sconto1.toFixed(2).replace('.', ',')}</div>
                        </div>`;
            }
            container.innerHTML = html;

            document.querySelectorAll('.btn-dettaglio').forEach(btn => {
                btn.removeEventListener('click', dettaglioHandler);
                btn.addEventListener('click', dettaglioHandler);
            });
        }

        function dettaglioHandler(e) {
            const btn = e.currentTarget;
            const codice = btn.getAttribute('data-codice');
            const descrizione = btn.getAttribute('data-descrizione');
            const coppieJson = btn.getAttribute('data-coppie');
            try {
                const coppie = JSON.parse(coppieJson);
                mostraModal(coppie, codice, descrizione);
            } catch(err) {
                alert("Errore nel visualizzare i dettagli.");
            }
        }

        function aggiornaTutto() {
            const clienteKey = document.getElementById('selectCliente').value;
            if (!clienteKey) {
                document.getElementById('scadenzeContainer').innerHTML = '<div class="info-messaggio">Seleziona un cliente.</div>';
                document.getElementById('dettaglioContainer').innerHTML = '<div class="info-messaggio">Seleziona un cliente.</div>';
                return;
            }
            mostraScadenze(clienteKey);
            mostraDettaglio(clienteKey);
        }

        // --------------------------------------------------------------
        // CARICAMENTO MULTIPLO ORD + SCA
        // --------------------------------------------------------------
        const btnCarica = document.getElementById('btnCaricaFile');
        const fileInputMulti = document.getElementById('fileInputMulti');
        const statusDiv = document.getElementById('fileStatus');

        btnCarica.addEventListener('click', () => fileInputMulti.click());
        fileInputMulti.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            let loaded = 0;
            let ordText = null, scaText = null;
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const content = ev.target.result;
                    const nome = file.name.toLowerCase();
                    if (nome.includes('ord')) ordText = content;
                    else if (nome.includes('sca')) scaText = content;
                    loaded++;
                    if (loaded === files.length) {
                        if (ordText) dati.ord = parseORD(ordText);
                        if (scaText) dati.sca = parseSCA(scaText);
                        aggiornaClientiUnici();
                        statusDiv.innerHTML = `✅ Caricati: ${files.length} file (ORD: ${dati.ord.length} clienti, SCA: ${dati.sca.length} clienti)`;
                        if (document.getElementById('selectCliente').options.length > 1) {
                            document.getElementById('selectCliente').value = document.getElementById('selectCliente').options[1].value;
                        }
                        aggiornaTutto();
                    }
                };
                reader.readAsText(file, "UTF-8");
            }
            fileInputMulti.value = '';
        });

        document.getElementById('selectCliente').addEventListener('change', aggiornaTutto);

        // Chiusura modal
        closeModalBtn.addEventListener('click', () => modal.style.display = 'none');
        window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

        // LOGO (3 secondi premuto per cambiare)
        const btnLogo = document.getElementById('btnCaricaLogo');
        const imgLogo = document.getElementById('logoImmagine');
        let pressTimer = null;
        btnLogo.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        imgLogo.src = ev.target.result;
                        imgLogo.style.display = 'block';
                        btnLogo.style.display = 'none';
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        });
        imgLogo.addEventListener('mousedown', () => {
            pressTimer = setTimeout(() => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (ev) => { imgLogo.src = ev.target.result; };
                        reader.readAsDataURL(file);
                    }
                };
                input.click();
                pressTimer = null;
            }, 3000);
        });
        imgLogo.addEventListener('mouseup', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
        imgLogo.addEventListener('mouseleave', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
    </script>
</body>
</html>

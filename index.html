<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>INSAPA 0142 - Gestione Clienti</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

:root {
    --primary: #1a5d3a;
    --primary-dark: #0f3d26;
    --primary-light: #2c7a4b;
    --accent: #ff6b35;
    --danger: #dc3545;
    --light: #f5f5fa;
    --white: #ffffff;
    --text: #1a1a2e;
    --text-light: #6c757d;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--light);
    padding: 0;
    margin: 0;
    color: var(--text);
}

.app-container {
    max-width: 1600px;
    margin: 0 auto;
    background: var(--white);
    min-height: 100vh;
}

.header {
    background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
    color: white;
    padding: 1rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--accent);
}

.logo-area {
    display: flex;
    align-items: center;
    gap: .7rem;
    background: rgba(255,255,255,0.12);
    padding: .5rem 1rem;
    border-radius: 60px;
}

.upload-logo-btn {
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
}

.logo-img {
    max-height: 60px;
    max-width: 140px;
    object-fit: contain;
    display: none;
}

.logo-placeholder {
    color: rgba(255,255,255,0.7);
}

.title-area {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
}

h1 {
    font-size: 1.2rem;
}

.version {
    font-size: 0.7rem;
    background: rgba(255,255,255,0.2);
    padding: 0.2rem 0.6rem;
    border-radius: 30px;
}

.upload-area {
    padding: 1rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: .8rem;
    background: var(--white);
    border-bottom: 1px solid #e0e0e0;
    align-items: center;
    position: sticky;
    top: 70px;
    z-index: 99;
}

.btn {
    border: none;
    border-radius: 40px;
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    font-weight: 700;
    color: white;
    font-size: 0.8rem;
    transition: all 0.2s;
}

.btn:hover {
    transform: translateY(-2px);
}

.btn-primary { background: var(--primary-light); }
.btn-secondary { background: #4a5568; }
.btn-schede { background: #8b5cf6; }

.client-search-group {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    background: white;
    padding: 0.2rem 0.5rem 0.2rem 1rem;
    border-radius: 40px;
    border: 1px solid #e2e8f0;
    margin-left: auto;
}

.client-search-group .search-box {
    border: none;
    padding: 0.5rem 0;
    min-width: 180px;
    background: transparent;
    outline: none;
}

.view-buttons {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    padding: 1rem 1.5rem;
    background: #f8fafc;
    border-bottom: 1px solid #e2e8f0;
    flex-wrap: wrap;
}

.view-btn {
    border: none;
    border-radius: 40px;
    padding: 0.7rem 1.5rem;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.9rem;
    background: #e2e8f0;
    color: var(--text);
}

.view-btn.active {
    background: var(--primary-light);
    color: white;
}

.client-selection {
    padding: 1rem 1.5rem;
    background: var(--white);
    border-bottom: 1px solid #e2e8f0;
}

.client-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    max-height: 120px;
    overflow-y: auto;
    padding: 8px 0;
}

.client-chip {
    background: #f1f5f9;
    border: none;
    border-radius: 40px;
    padding: 0.5rem 1rem;
    cursor: pointer;
    font-size: 0.8rem;
}

.client-chip.active {
    background: var(--primary-light);
    color: white;
}

.selected-client {
    margin-top: 12px;
    padding: 10px;
    background: #f0fdf4;
    border-radius: 12px;
    border-left: 4px solid var(--primary-light);
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
}

.content-area {
    padding: 1.5rem;
}

.client-summary {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid #e2e8f0;
}

.stat {
    background: #f1f5f9;
    padding: 0.5rem 1rem;
    border-radius: 40px;
    font-size: 0.85rem;
    font-weight: 600;
}

@media (min-width: 769px) {
    .table-wrapper {
        overflow-x: auto;
        border-radius: 16px;
        border: 1px solid #e2e8f0;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
        background: white;
    }
    th, td {
        padding: 12px 10px;
        border-bottom: 1px solid #e2e8f0;
        text-align: left;
    }
    th {
        background: #f8fafc;
        font-weight: 700;
    }
    .num {
        text-align: right;
    }
}

@media (max-width: 768px) {
    .table-wrapper {
        display: block;
    }
    table, thead, tbody, th, td, tr {
        display: block;
    }
    thead {
        display: none;
    }
    tr {
        background: var(--white);
        border-radius: 16px;
        margin-bottom: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        border: 1px solid #e2e8f0;
    }
    td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid #f1f5f9;
    }
    td:before {
        content: attr(data-label);
        font-weight: 700;
        color: var(--text-light);
    }
}

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    border-radius: 20px;
    max-width: 500px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
}

.modal-header {
    padding: 1rem;
    background: var(--primary);
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 20px 20px 0 0;
}

.modal-close {
    background: none;
    border: none;
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
}

.modal-body {
    padding: 1rem;
}

.history-list {
    list-style: none;
    padding: 0;
}

.history-list li {
    padding: 10px;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
}

.warning {
    margin: 1rem;
    padding: 1rem;
    border-radius: 12px;
    background: #fee2e2;
    color: var(--danger);
    display: none;
}

.loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    color: white;
}

footer {
    padding: 1rem;
    text-align: center;
    color: var(--text-light);
    font-size: .7rem;
    border-top: 1px solid #e2e8f0;
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">⏳ Elaborazione file...</div>

<div class="app-container">

<div class="header">
    <div class="logo-area">
        <button id="uploadLogoBtn" class="upload-logo-btn">+</button>
        <img id="logoImg" class="logo-img">
        <div id="logoPlaceholder" class="logo-placeholder">🏢 Logo</div>
        <input type="file" id="logoFileInput" accept="image/*" hidden>
    </div>
    <div class="title-area">
        <h1>📊 INSAPA 0142</h1>
        <span class="version">VERSIONE 0142</span>
    </div>
</div>

<div class="upload-area">
    <button id="loadDDTBtn" class="btn btn-primary">📂 Carica DDT</button>
    <button id="loadSCABtn" class="btn btn-secondary">📅 Carica SCA</button>
    <button id="loadSCHEDEBtn" class="btn btn-schede">📋 Carica SCHEDE</button>
    <div class="client-search-group">
        <input type="text" id="clientSearchInput" class="search-box" placeholder="Cerca cliente...">
    </div>
</div>

<div class="view-buttons">
    <button id="viewDDT" class="view-btn">📦 DDT</button>
    <button id="viewSCA" class="view-btn">📅 SCA</button>
    <button id="viewSCHEDE" class="view-btn active">📋 SCHEDE</button>
</div>

<div class="client-selection">
    <div class="client-list" id="clientList"></div>
    <div class="selected-client" id="selectedClientDisplay">
        <span>📌 Nessun cliente selezionato</span>
    </div>
</div>

<div class="content-area" id="contentArea">
    <div id="warningArea" class="warning"></div>
    <div id="contentWrapper"></div>
</div>

<footer>🔒 INSAPA 0142 - Carica i file DDT, SCA e SCHEDE</footer>

</div>

<div id="historyModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Storico articolo</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
    // ==============================================================
    // VARIABILI
    // ==============================================================
    let ddtData = new Map();
    let scaData = new Map();
    let schedeData = new Map();
    let currentView = 'SCHEDE';
    let currentClient = null;

    // ==============================================================
    // UTILITY
    // ==============================================================
    function escapeHtml(str) {
        return String(str || '').replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function cleanImporto(str) {
        if (!str) return 0;
        let cleaned = str.replace(/\./g, '').replace(',', '.');
        return parseFloat(cleaned) || 0;
    }

    function pulisciDescrizione(desc) {
        if (!desc) return '';
        desc = desc.replace(/[=\-]{5,}/g, '');
        desc = desc.replace(/\s+attivo\s+\d+%\s+PER\s+PIATTI\s*/gi, '');
        desc = desc.replace(/\s+5kg\s+c\.u\.\s+Pretagliata\s+LISCIA\s*/gi, '');
        desc = desc.replace(/\s+SENZA\s+BOX\s*/gi, '');
        desc = desc.replace(/\s+CHAMPAGNE\s*/gi, '');
        desc = desc.replace(/\s+CACAO\s*/gi, '');
        desc = desc.replace(/\s+BORDEAUX\s*/gi, '');
        desc = desc.replace(/\s+MICROGOFFRATI?\s+2VELI\s*/gi, '');
        desc = desc.replace(/\s+MICROGOFFRATO\s+2\s+VELI\s*/gi, '');
        desc = desc.replace(/\s+[0-9]+(?:[.,][0-9]+)?\s*/g, ' ');
        desc = desc.replace(/\s+/g, ' ').trim();
        return desc.substring(0, 120);
    }

    // ==============================================================
    // PARSER UNICO PER DDT E SCHEDE (stesso formato)
    // ==============================================================
    function parseFileGenerico(text, targetMap) {
        const lines = text.split(/\r?\n/);
        const clients = new Map();
        let currentClient = null;
        let currentCode = null;
        
        // Pattern per riga cliente: es "Cliente   : 030275 LA MANDRAGOLA..."
        function estraiCliente(line) {
            let match = line.match(/Cliente\s*:\s*(\d+)\s+(.+?)(?:\s*-|$)/i);
            if (match) {
                return { code: match[1], name: match[2].trim() };
            }
            return null;
        }
        
        // Pattern per riga articolo: inizia con codice (almeno 4 caratteri)
        function estraiArticolo(line) {
            let match = line.match(/^(\S{4,})\s+(.+?)\s+(\d+[,.]?\d*)\s+(\d{2}\/\d{2}\/\d{4})/);
            if (!match) return null;
            
            const code = match[1];
            let desc = match[2];
            desc = desc.replace(/\s+\d+[,.]?\d*\s+\d{2}\/\d{2}\/\d{4}.*$/, '');
            desc = desc.substring(0, 120).trim();
            
            // Estrai tutte le coppie quantità/data
            const coppie = [];
            const patternCoppie = /(\d+[,.]?\d*)\s+(\d{2}\/\d{2}\/\d{4})/g;
            let m;
            while ((m = patternCoppie.exec(line)) !== null) {
                let qty = parseFloat(m[1].replace(',', '.'));
                let date = m[2];
                coppie.push({ quantity: qty, date: date });
            }
            
            // Estrai prezzo e sconto (ultimi 2-3 numeri)
            const prezzoMatch = line.match(/(\d+[,.]?\d*)\s+(\d+[,.]?\d*)\s+(\d+[,.]?\d*)$/);
            let price = 0;
            let discount = 0;
            if (prezzoMatch) {
                price = parseFloat(prezzoMatch[1].replace(',', '.'));
                discount = parseFloat(prezzoMatch[2].replace(',', '.'));
            }
            
            return { code, desc, coppie, price, discount };
        }
        
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line === '') continue;
            
            const clienteInfo = estraiCliente(line);
            if (clienteInfo) {
                currentClient = clienteInfo.name;
                currentCode = clienteInfo.code;
                if (!clients.has(currentClient)) {
                    clients.set(currentClient, { 
                        codice: currentCode, 
                        items: [], 
                        saldoScadenze: 0, 
                        scadenzeDettaglio: [] 
                    });
                }
                continue;
            }
            
            if (currentClient && line.match(/^\d{4,}/)) {
                const articolo = estraiArticolo(line);
                if (articolo && articolo.coppie.length > 0) {
                    for (let coppia of articolo.coppie) {
                        const client = clients.get(currentClient);
                        client.items.push({
                            code: articolo.code,
                            description: pulisciDescrizione(articolo.desc),
                            quantity: coppia.quantity,
                            price: articolo.price,
                            discountPercent: articolo.discount,
                            netAmount: coppia.quantity * articolo.price * (1 - articolo.discount / 100),
                            date: coppia.date
                        });
                    }
                }
            }
        }
        
        targetMap.clear();
        for (let [name, data] of clients) {
            targetMap.set(name, data);
        }
        salvaSuLocalStorage();
        return targetMap;
    }

    // ==============================================================
    // PARSER SCA (scadenze)
    // ==============================================================
    function parseSCAFile(text, targetMap) {
        const lines = text.split(/\r?\n/);
        const clients = new Map();
        
        for (let [name, data] of targetMap) {
            clients.set(name, {
                codice: data.codice,
                items: data.items || [],
                saldoScadenze: 0,
                scadenzeDettaglio: []
            });
        }
        
        let i = 0;
        while (i < lines.length) {
            let line = lines[i].trim();
            if (line.startsWith('CLIENTE:')) {
                let rest = line.substring(8).trim();
                let saldoIndex = rest.lastIndexOf('Saldo');
                if (saldoIndex === -1) { i++; continue; }
                let codeAndName = rest.substring(0, saldoIndex).trim();
                let saldoPart = rest.substring(saldoIndex + 5).trim();
                let tokens = codeAndName.split(/\s+/);
                let codeRaw = tokens[0];
                let codeClean = codeRaw.replace(/^0+/, '');
                let nomeCompleto = tokens.slice(1).join(' ');
                let saldo = cleanImporto(saldoPart);
                if (saldoPart.endsWith('-')) saldo = -saldo;
                
                let target = null;
                for (let [cliName, cliData] of clients.entries()) {
                    if (cliData.codice === codeClean) {
                        target = { name: cliName, data: cliData };
                        break;
                    }
                }
                if (!target && nomeCompleto.trim() !== '') {
                    clients.set(nomeCompleto, {
                        codice: codeClean,
                        items: [],
                        saldoScadenze: 0,
                        scadenzeDettaglio: []
                    });
                    target = { name: nomeCompleto, data: clients.get(nomeCompleto) };
                }
                if (target) {
                    target.data.saldoScadenze = saldo;
                    let j = i + 1;
                    while (j < lines.length && !lines[j].includes('Scadenza')) j++;
                    if (j < lines.length) {
                        j++;
                        while (j < lines.length && (lines[j].trim() === '' || lines[j].includes('---'))) j++;
                        let dettagli = [];
                        while (j < lines.length) {
                            let detLine = lines[j].trim();
                            if (detLine === '') { j++; continue; }
                            if (detLine.startsWith('VOSTRO DARE') || detLine.startsWith('CLIENTE:') ||
                                detLine.includes('---')) break;
                            if (detLine.match(/^\d{2}\/\d{2}\/\d{4}/)) {
                                let parts = detLine.split(/\s+/);
                                let dataScad = parts[0].replace('*', '');
                                let dataDocumento = '';
                                for (let k = 1; k < parts.length; k++) {
                                    if (parts[k].match(/^\d{2}\/\d{2}\/\d{4}/)) {
                                        dataDocumento = parts[k];
                                        break;
                                    }
                                }
                                let numeroFattura = '';
                                for (let k = 0; k < parts.length; k++) {
                                    if (parts[k].match(/^\d+$/)) {
                                        numeroFattura = parts[k];
                                        break;
                                    }
                                }
                                let importo = 0;
                                let euroIdx = parts.findIndex(p => p === 'Euro');
                                if (euroIdx !== -1 && euroIdx + 1 < parts.length) {
                                    importo = cleanImporto(parts[euroIdx + 1]);
                                } else {
                                    importo = cleanImporto(parts[parts.length - 1]);
                                }
                                if (importo !== 0) {
                                    dettagli.push({ dataScadenza: dataScad, dataDocumento, numeroFattura, importo });
                                }
                            }
                            j++;
                        }
                        target.data.scadenzeDettaglio = dettagli;
                        i = j;
                    } else i++;
                } else i++;
            } else i++;
        }
        
        targetMap.clear();
        for (let [name, data] of clients) {
            targetMap.set(name, data);
        }
        salvaSuLocalStorage();
        return targetMap;
    }

    // ==============================================================
    // AGGREGAZIONE ARTICOLI
    // ==============================================================
    function aggregaArticoli(items) {
        const map = new Map();
        for (let it of items) {
            if (map.has(it.code)) {
                const ex = map.get(it.code);
                ex.quantity += it.quantity;
                ex.netAmount += it.netAmount;
                ex.occurrences++;
                ex.history.push({
                    date: it.date || 'N/D',
                    quantity: it.quantity,
                    price: it.price,
                    discount: it.discountPercent || 0
                });
                if (it.date && (!ex.lastDate || it.date > ex.lastDate)) {
                    ex.lastDate = it.date;
                    ex.price = it.price;
                    ex.discountPercent = it.discountPercent;
                }
            } else {
                map.set(it.code, {
                    code: it.code,
                    description: pulisciDescrizione(it.description),
                    quantity: it.quantity,
                    price: it.price,
                    discountPercent: it.discountPercent || 0,
                    netAmount: it.netAmount,
                    lastDate: it.date || 'N/D',
                    history: [{
                        date: it.date || 'N/D',
                        quantity: it.quantity,
                        price: it.price,
                        discount: it.discountPercent || 0
                    }],
                    occurrences: 1
                });
            }
        }
        for (let [_, item] of map) {
            item.history.sort((a, b) => {
                if (a.date === 'N/D') return 1;
                if (b.date === 'N/D') return -1;
                return (b.date || '').localeCompare(a.date || '');
            });
        }
        return Array.from(map.values()).sort((a, b) => {
            const aNum = parseInt(a.code);
            const bNum = parseInt(b.code);
            if (!isNaN(aNum) && !isNaN(bNum)) return aNum - bNum;
            if (!isNaN(aNum)) return -1;
            if (!isNaN(bNum)) return 1;
            return a.code.localeCompare(b.code);
        });
    }

    // ==============================================================
    // PERSISTENZA
    // ==============================================================
    function salvaSuLocalStorage() {
        const toSave = {
            ddt: Array.from(ddtData.entries()),
            sca: Array.from(scaData.entries()),
            schede: Array.from(schedeData.entries()),
            currentView: currentView,
            currentClient: currentClient
        };
        localStorage.setItem('insapa_data', JSON.stringify(toSave));
    }

    function caricaDaLocalStorage() {
        const saved = localStorage.getItem('insapa_data');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                ddtData = new Map(data.ddt);
                scaData = new Map(data.sca);
                schedeData = new Map(data.schede);
                currentView = data.currentView || 'SCHEDE';
                currentClient = data.currentClient || null;
                
                document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
                if (currentView === 'DDT') document.getElementById('viewDDT').classList.add('active');
                else if (currentView === 'SCA') document.getElementById('viewSCA').classList.add('active');
                else document.getElementById('viewSCHEDE').classList.add('active');
                
                aggiornaUI();
                return true;
            } catch(e) {}
        }
        return false;
    }

    // ==============================================================
    // RENDER UI
    // ==============================================================
    function aggiornaListaClienti() {
        let tuttiClienti = new Map();
        for (let [nome, dati] of ddtData) tuttiClienti.set(nome, dati);
        for (let [nome, dati] of scaData) if (!tuttiClienti.has(nome)) tuttiClienti.set(nome, dati);
        for (let [nome, dati] of schedeData) if (!tuttiClienti.has(nome)) tuttiClienti.set(nome, dati);
        
        const container = document.getElementById('clientList');
        container.innerHTML = '';
        
        const nomiOrdinati = Array.from(tuttiClienti.keys()).sort();
        for (let nome of nomiOrdinati) {
            const chip = document.createElement('button');
            chip.className = 'client-chip';
            if (currentClient === nome) chip.classList.add('active');
            chip.textContent = nome;
            chip.onclick = () => {
                currentClient = nome;
                aggiornaListaClienti();
                aggiornaVistaCorrente();
                salvaSuLocalStorage();
            };
            container.appendChild(chip);
        }
        
        const displayDiv = document.getElementById('selectedClientDisplay');
        if (currentClient) {
            let clientData = ddtData.get(currentClient) || scaData.get(currentClient) || schedeData.get(currentClient);
            displayDiv.innerHTML = `<span>📌 Cliente: <strong>${escapeHtml(currentClient)}</strong></span>
                                   <span class="stat">🏷️ Codice: ${clientData ? clientData.codice : 'N/D'}</span>`;
        } else {
            displayDiv.innerHTML = '<span>📌 Nessun cliente selezionato</span>';
        }
    }
    
    function apriModale(titolo, storico) {
        const modal = document.getElementById('historyModal');
        document.getElementById('modalTitle').textContent = titolo;
        let html = '<ul class="history-list">';
        for (let h of storico) {
            html += `<li><span>📅 ${h.date || 'N/D'}</span><span>📊 ${h.quantity.toFixed(2)} pz</span><span>💰 ${h.price.toFixed(2)} €</span><span>🏷️ ${(h.discount || 0).toFixed(0)}%</span></li>`;
        }
        const totQty = storico.reduce((s, h) => s + h.quantity, 0);
        const totNet = storico.reduce((s, h) => s + (h.quantity * h.price * (1 - (h.discount||0)/100)), 0);
        html += `<li style="background:#f0fdf4;font-weight:bold;margin-top:8px;"><span>📦 Totale: ${totQty.toFixed(2)} pz</span><span>💰 Netto: ${totNet.toFixed(2)} €</span></li></ul>`;
        document.getElementById('modalBody').innerHTML = html;
        modal.style.display = 'flex';
    }
    
    window.closeModal = function() {
        document.getElementById('historyModal').style.display = 'none';
    };
    
    function aggiornaVistaCorrente() {
        if (!currentClient) {
            document.getElementById('contentWrapper').innerHTML = '<div class="warning">Seleziona un cliente</div>';
            return;
        }
        
        let dati = null;
        let titolo = '';
        if (currentView === 'DDT') { dati = ddtData.get(currentClient); titolo = 'DDT'; }
        else if (currentView === 'SCA') { dati = scaData.get(currentClient); titolo = 'SCA'; }
        else { dati = schedeData.get(currentClient); titolo = 'SCHEDE'; }
        
        if (!dati) {
            document.getElementById('contentWrapper').innerHTML = `<div class="warning">Nessun dato ${titolo} per questo cliente. Carica il file corrispondente.</div>`;
            return;
        }
        
        // Vista SCA
        if (currentView === 'SCA') {
            const scadenze = dati.scadenzeDettaglio || [];
            const saldo = dati.saldoScadenze || 0;
            if (scadenze.length === 0) {
                document.getElementById('contentWrapper').innerHTML = '<div class="warning">Nessuna scadenza</div>';
                return;
            }
            let html = `<div class="client-summary"><div class="stat">💰 Saldo: ${saldo.toFixed(2)} €</div><div class="stat">📄 Fatture: ${scadenze.length}</div></div>`;
            html += `<div class="table-wrapper"><table><thead><tr><th>Data fattura</th><th>N° fattura</th><th>Importo</th><th>Scadenza</th></tr></thead><tbody>`;
            for (let s of scadenze) {
                html += `<tr><td>${escapeHtml(s.dataDocumento || 'N/D')}</td><td>${escapeHtml(s.numeroFattura || 'N/D')}</td><td class="num">${(s.importo || 0).toFixed(2)} €</td><td>${escapeHtml(s.dataScadenza || 'N/D')}</td></tr>`;
            }
            html += `</tbody></table></div>`;
            document.getElementById('contentWrapper').innerHTML = html;
            return;
        }
        
        // Vista DDT o SCHEDE
        const articoli = aggregaArticoli(dati.items);
        if (articoli.length === 0) {
            document.getElementById('contentWrapper').innerHTML = '<div class="warning">Nessun articolo</div>';
            return;
        }
        
        let totQty = 0, totNet = 0;
        articoli.forEach(a => { totQty += a.quantity; totNet += a.netAmount; });
        
        let html = `<div class="client-summary"><div class="stat">📦 Quantità: ${totQty.toFixed(2)}</div><div class="stat">💰 Netto: ${totNet.toFixed(2)} €</div></div>`;
        html += `<div class="table-wrapper"><table><thead><tr><th>Codice</th><th>Descrizione</th><th>Prezzo</th><th>Q.tà</th><th>Sconto</th><th>Ultimo</th><th></th></tr></thead><tbody>`;
        
        for (let a of articoli) {
            const storicoJson = JSON.stringify(a.history).replace(/"/g, '&quot;');
            html += `<tr>
                        <td>${escapeHtml(a.code)}</td>
                        <td>${escapeHtml(a.description)}</td>
                        <td class="num">${a.price.toFixed(2)} €</td>
                        <td class="num">${a.quantity.toFixed(2)}</td>
                        <td class="num">${(a.discountPercent || 0).toFixed(0)}%</td>
                        <td>📅 ${a.lastDate}</td>
                        <td style="text-align:center;cursor:pointer;" onclick="apriModale('${escapeHtml(a.code)} - ${escapeHtml(a.description.substring(0,30))}', ${storicoJson})">📜</td>
                      </tr>`;
        }
        html += `</tbody></table></div>`;
        document.getElementById('contentWrapper').innerHTML = html;
    }
    
    function aggiornaUI() {
        aggiornaListaClienti();
        aggiornaVistaCorrente();
    }
    
    // ==============================================================
    // CARICAMENTO FILE
    // ==============================================================
    function caricaDDT() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.txt';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const loading = document.getElementById('loadingOverlay');
            loading.style.display = 'flex';
            const reader = new FileReader();
            reader.onload = (ev) => {
                setTimeout(() => {
                    try {
                        parseFileGenerico(ev.target.result, ddtData);
                        aggiornaUI();
                        document.getElementById('warningArea').style.display = 'none';
                    } catch (err) {
                        document.getElementById('warningArea').style.display = 'block';
                        document.getElementById('warningArea').innerHTML = 'Errore DDT: ' + err.message;
                    }
                    loading.style.display = 'none';
                }, 10);
            };
            reader.readAsText(file, 'UTF-8');
        };
        input.click();
    }
    
    function caricaSCA() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.txt';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const loading = document.getElementById('loadingOverlay');
            loading.style.display = 'flex';
            const reader = new FileReader();
            reader.onload = (ev) => {
                setTimeout(() => {
                    try {
                        parseSCAFile(ev.target.result, scaData);
                        aggiornaUI();
                        document.getElementById('warningArea').style.display = 'none';
                    } catch (err) {
                        document.getElementById('warningArea').style.display = 'block';
                        document.getElementById('warningArea').innerHTML = 'Errore SCA: ' + err.message;
                    }
                    loading.style.display = 'none';
                }, 10);
            };
            reader.readAsText(file, 'UTF-8');
        };
        input.click();
    }
    
    function caricaSCHEDE() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.txt';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const loading = document.getElementById('loadingOverlay');
            loading.style.display = 'flex';
            const reader = new FileReader();
            reader.onload = (ev) => {
                setTimeout(() => {
                    try {
                        parseFileGenerico(ev.target.result, schedeData);
                        aggiornaUI();
                        document.getElementById('warningArea').style.display = 'none';
                    } catch (err) {
                        document.getElementById('warningArea').style.display = 'block';
                        document.getElementById('warningArea').innerHTML = 'Errore SCHEDE: ' + err.message;
                    }
                    loading.style.display = 'none';
                }, 10);
            };
            reader.readAsText(file, 'UTF-8');
        };
        input.click();
    }
    
    function filtraClienti() {
        const testo = document.getElementById('clientSearchInput').value.toLowerCase();
        const chips = document.querySelectorAll('.client-chip');
        chips.forEach(chip => {
            chip.style.display = chip.textContent.toLowerCase().includes(testo) ? '' : 'none';
        });
    }
    
    // ==============================================================
    // INIT
    // ==============================================================
    document.getElementById('loadDDTBtn').addEventListener('click', caricaDDT);
    document.getElementById('loadSCABtn').addEventListener('click', caricaSCA);
    document.getElementById('loadSCHEDEBtn').addEventListener('click', caricaSCHEDE);
    document.getElementById('clientSearchInput').addEventListener('input', filtraClienti);
    document.getElementById('viewDDT').addEventListener('click', () => {
        currentView = 'DDT';
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('viewDDT').classList.add('active');
        aggiornaVistaCorrente();
        salvaSuLocalStorage();
    });
    document.getElementById('viewSCA').addEventListener('click', () => {
        currentView = 'SCA';
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('viewSCA').classList.add('active');
        aggiornaVistaCorrente();
        salvaSuLocalStorage();
    });
    document.getElementById('viewSCHEDE').addEventListener('click', () => {
        currentView = 'SCHEDE';
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('viewSCHEDE').classList.add('active');
        aggiornaVistaCorrente();
        salvaSuLocalStorage();
    });
    
    // Logo
    const logoInput = document.getElementById('logoFileInput');
    const logoImg = document.getElementById('logoImg');
    const logoPlaceholder = document.getElementById('logoPlaceholder');
    document.getElementById('uploadLogoBtn').onclick = () => logoInput.click();
    logoInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const url = ev.target.result;
                logoImg.src = url;
                logoImg.style.display = 'block';
                logoPlaceholder.style.display = 'none';
                localStorage.setItem('logo_data', url);
            };
            reader.readAsDataURL(file);
        }
    };
    
    const savedLogo = localStorage.getItem('logo_data');
    if (savedLogo) {
        logoImg.src = savedLogo;
        logoImg.style.display = 'block';
        logoPlaceholder.style.display = 'none';
    }
    
    if (!caricaDaLocalStorage()) {
        console.log('Nessun dato salvato');
    }
</script>
</body>
